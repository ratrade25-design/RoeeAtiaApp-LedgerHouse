*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;font-variant-numeric:tabular-nums;background:#080C15;color:#E2E8F0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* Grain overlay */
body::after{content:'';position:fixed;inset:0;opacity:.012;pointer-events:none;z-index:9998;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:rgba(201,168,76,.08);border-radius:2px}
.main::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,.2)}

.view{display:none;min-height:100%}.view.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

.zone .zone-inner{opacity:0;transform:translateY(22px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
.zone.visible .zone-inner{opacity:1;transform:none}

.ca{opacity:0;transform:translateY(14px);transition:all .6s cubic-bezier(.16,1,.3,1)}
.zone.visible .ca,.view.active .ca{opacity:1;transform:none}
.zone.visible .ca:nth-child(1){transition-delay:.07s}
.zone.visible .ca:nth-child(2){transition-delay:.14s}
.zone.visible .ca:nth-child(3){transition-delay:.21s}
.zone.visible .ca:nth-child(4){transition-delay:.28s}

.pa{opacity:0;transform:translateY(14px);transition:all .7s cubic-bezier(.16,1,.3,1)}
.zone.visible .pa,.view.active .pa{opacity:1;transform:none}
.zone.visible .pa:nth-child(1){transition-delay:.12s}
.zone.visible .pa:nth-child(2){transition-delay:.24s}

.zone-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.25}
.bar{transition:height 1s cubic-bezier(.16,1,.3,1)}

.toast{transform:translateX(-50%) translateY(100px);transition:transform .5s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(-50%) translateY(0)}

.halo{position:fixed;pointer-events:none;z-index:9997;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.04) 0%,rgba(201,168,76,.01) 40%,transparent 70%);transform:translate(-50%,-50%);transition:opacity .4s}

input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}

.sb-item.active .sb-bar{opacity:1;transform:scaleY(1)}

.card-glow{position:absolute;top:0;left:0;right:0;height:1px;opacity:.7}
.card-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.015) 0%,transparent 50%);pointer-events:none;border-radius:inherit}

@media(max-width:768px){
  .mob-1{grid-template-columns:1fr!important}
  .mob-p{padding-left:16px!important;padding-right:16px!important}
  .mob-py{padding-top:24px!important;padding-bottom:24px!important}
  .mob-text{font-size:26px!important}
  .mob-gap{gap:12px!important}
  .mob-ring{flex-direction:column!important}
  .mob-ring>div:first-child{width:180px!important;height:180px!important;margin:0 auto!important}
}
@media(max-width:540px){
  .sidebar{width:48px!important}
  .sb-logo{width:32px!important;height:32px!important;font-size:10px!important}
  .sb-item,.sb-item-s{width:36px!important;height:36px!important}
}

<script>
(function(){
const DEFAULT_CATS=[
  {key:'food',name:'Food & Groceries',he:'מזון ומכולת',color:'#34D399'},
  {key:'housing',name:'Housing & Utilities',he:'דיור ושירותים',color:'#818CF8'},
  {key:'invest',name:'Investments',he:'השקעות',color:'#C9A84C'},
  {key:'savings',name:'Savings',he:'חיסכון',color:'#22D3EE'},
  {key:'car',name:'Car & Transport',he:'רכב ותחבורה',color:'#FB923C'},
  {key:'telecom',name:'Telecom',he:'תקשורת',color:'#A78BFA'},
];
let CATS=JSON.parse(localStorage.getItem('lh_cats')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS));
function saveCats(){localStorage.setItem('lh_cats',JSON.stringify(CATS))}

const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const MO_HE_S=['ינו׳','פבר׳','מרץ','אפר׳','מאי','יוני','יולי','אוג׳','ספט׳','אוק׳','נוב׳','דצמ׳'];
function heMonth(k){const p=k.split(' ');return MO_HE[MO.indexOf(p[0])]+' '+p[1]}
function heMonthS(k){return MO_HE_S[MO.indexOf(k.split(' ')[0])]}

const DEFAULT_DATA={
  months:{
    'Jan 2026':{income:20000,expenses:{food:3000,housing:6200,invest:3500,savings:3000,car:2000,telecom:480}},
    'Feb 2026':{income:20500,expenses:{food:3100,housing:6300,invest:3600,savings:3100,car:1900,telecom:460}},
    'Mar 2026':{income:21000,expenses:{food:2900,housing:6400,invest:3800,savings:3200,car:2200,telecom:440}},
    'Apr 2026':{income:21200,expenses:{food:3050,housing:6450,invest:3900,savings:3300,car:2050,telecom:430}},
    'May 2026':{income:21500,expenses:{food:3200,housing:6500,invest:4000,savings:3500,car:2100,telecom:450}},
    'Jun 2026':{income:22000,expenses:{food:2800,housing:6800,invest:4500,savings:3200,car:1900,telecom:420}},
    'Jul 2026':{income:22800,expenses:{food:2950,housing:6700,invest:5000,savings:3800,car:2300,telecom:380}}
  },
  netWorth:[{month:'Jan',value:235000},{month:'Feb',value:242000},{month:'Mar',value:248000},{month:'Apr',value:252000},{month:'May',value:258000},{month:'Jun',value:265000},{month:'Jul',value:273000}],
  liquidSavings:95000,manualEntries:[]
};

let S=loadLocal()||JSON.parse(JSON.stringify(DEFAULT_DATA));
if(!S.manualEntries)S.manualEntries=[];
let GAS=ls('lh_gas')||'https://script.google.com/macros/s/AKfycbwMDQpxmLCiXM62_imOz6p63DwQvT6A7kyJ_59qps8SwrELidbQ4KZQDicUDn1qZlzd/exec';
let curView='dashboard',curMonthIdx=-1;

function ls(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}
function loadLocal(){try{return JSON.parse(ls('lh_state'))}catch(e){return null}}
function save(){ls('lh_state',JSON.stringify(S))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
const fmt=n=>'₪'+n.toLocaleString('en-IL');
const fmtK=n=>n>=1e3?'₪'+(n/1e3).toFixed(0)+'K':fmt(n);
function totE(d){return CATS.reduce((a,c)=>a+(d.expenses[c.key]||0),0)}
function mKeys(){return Object.keys(S.months)}
function sortMonths(){const sorted=Object.entries(S.months).sort((a,b)=>{const[mA,yA]=a[0].split(' '),[mB,yB]=b[0].split(' ');return(+yA-+yB)||(MO.indexOf(mA)-MO.indexOf(mB))});S.months=Object.fromEntries(sorted)}

async function syncCloud(){if(!GAS)return;try{await fetch(GAS+'?action=save',{method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain'}});setSyncBadge('ok','מסונכרן')}catch(e){setSyncBadge('err','נכשל')}}
async function loadCloud(){if(!GAS)return;try{const r=await fetch(GAS+'?action=get');const d=await r.json();if(d&&d.months){S=d;if(!S.manualEntries)S.manualEntries=[];save();setSyncBadge('ok','נטען')}}catch(e){setSyncBadge('err','טעינה נכשלה')}}
function setSyncBadge(s,t){document.querySelectorAll('.sync-badge').forEach(b=>{b.className='sync-badge flex items-center gap-2 text-[10px] px-3 py-1.5 rounded-lg bg-white/[0.02] border backdrop-blur-2xl transition-all duration-500 '+(s==='ok'?'text-emerald-400/80 border-emerald-500/15':'text-red-400/80 border-red-500/15');b.querySelector('.st').textContent=t})}

function switchView(v){
  curView=v;
  document.querySelectorAll('.sb-item').forEach(i=>{const a=i.dataset.view===v;i.classList.toggle('active',a);i.classList.toggle('text-gold',a);i.classList.toggle('bg-gold/[0.04]',a);i.classList.toggle('text-slate-600',!a)});
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
  document.getElementById('mainScroll').scrollTop=0;
  if(v==='dashboard')renderDashboard();else if(v==='monthly')renderMonthly();else if(v==='annual')renderAnnual();else renderSettings();
}

const CC='group relative bg-white/[0.02] backdrop-blur-2xl border border-white/[0.03] rounded-2xl p-6 overflow-hidden transition-all duration-500 hover:bg-white/[0.035] hover:border-white/[0.06] hover:shadow-[0_12px_48px_-12px_rgba(0,0,0,.35)] hover:-translate-y-[2px]';
const PP='bg-white/[0.02] backdrop-blur-2xl border border-white/[0.03] rounded-2xl p-7 shadow-[0_2px_16px_-4px_rgba(0,0,0,.15)] transition-all duration-500';
const INP='w-full bg-white/[0.02] border border-white/[0.04] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none transition-all duration-500 focus:border-gold/20 focus:shadow-[0_0_0_3px_rgba(201,168,76,0.05)] placeholder-slate-700';
const LBL='block text-[9px] uppercase tracking-[0.25em] text-slate-500/80 font-semibold mb-2';
const BTNG='bg-gradient-to-l from-gold to-gold-dark text-brand-950 font-bold text-sm rounded-xl px-7 py-3 transition-all duration-500 hover:shadow-[0_4px_24px_-4px_rgba(201,168,76,0.2)] hover:scale-[1.02] active:scale-[0.98]';

function renderDashboard(){
  const mk=mKeys(),cur=S.months[mk[mk.length-1]],prev=S.months[mk[mk.length-2]];
  const curM=mk[mk.length-1],prevM=mk[mk.length-2];
  const cT=totE(cur),pT=totE(prev),cfr=((cur.income/cT)*100).toFixed(1);
  const nwC=S.netWorth[S.netWorth.length-1].value,nwP=S.netWorth[S.netWorth.length-2].value,nwD=((nwC-nwP)/nwP*100).toFixed(1);
  const avgE=Math.round(mk.reduce((a,k)=>a+totE(S.months[k]),0)/mk.length);
  const rw=(S.liquidSavings/avgE).toFixed(1),surplus=cur.income-cT;
  const barMax=Math.max(...mk.map(k=>Math.max(S.months[k].income,totE(S.months[k]))));
  const last6=mk.slice(-6);
  const expD=((cT-pT)/pT*100).toFixed(1);

  document.getElementById('v-dashboard').innerHTML=`
  <div class="sticky top-0 z-10 px-8 mob-p py-5 flex items-center gap-4 flex-wrap bg-brand-900/80 backdrop-blur-3xl border-b border-white/[0.025]">
    <h2 class="text-[22px] font-extrabold tracking-[-0.5px]">לוח בקרה</h2>
    <div class="ml-auto flex items-center gap-3">
      <div class="flex items-center gap-2 text-[10px] text-slate-600 font-mono px-3 py-1.5 rounded-lg bg-white/[0.015] border border-white/[0.03]">
        <span class="w-[5px] h-[5px] rounded-full bg-emerald-400/80 shadow-[0_0_8px_rgba(52,211,153,.4)]" style="animation:pulse 2.5s ease-in-out infinite"></span>
        <span id="clock">--:--:--</span>

function bindDashboardEvents(){
  document.querySelectorAll('.qe-tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.qe-tab').forEach(x=>{x.classList.remove('active','bg-white/[0.04]','text-slate-100','shadow-lg','border','border-white/[0.05]');x.classList.add('text-slate-600')});
    document.querySelectorAll('.qe-form').forEach(x=>x.style.display='none');
    t.classList.add('active','bg-white/[0.04]','text-slate-100','shadow-lg','border','border-white/[0.05]');t.classList.remove('text-slate-600');
    document.getElementById('qf-'+t.dataset.t).style.display='block'});
  const qeAdd=document.getElementById('qeAdd');if(qeAdd)qeAdd.onclick=()=>{
    const a=+document.getElementById('qeAmt').value;if(!a||a<=0)return;
    const cat=document.getElementById('qeCat').value,note=document.getElementById('qeNote').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].expenses[cat]=(S.months[cm].expenses[cat]||0)+a;
    S.manualEntries.push({type:'expense',cat,amount:a,note,month:cm,ts:Date.now()});save();syncCloud();toast('הוצאה נוספה: '+fmt(a));renderDashboard()};
  const qiAdd=document.getElementById('qiAdd');if(qiAdd)qiAdd.onclick=()=>{
    const a=+document.getElementById('qiAmt').value;if(!a||a<=0)return;
    const src=document.getElementById('qiSrc').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].income+=a;S.manualEntries.push({type:'income',amount:a,source:src,month:cm,ts:Date.now()});save();syncCloud();toast('הכנסה נוספה: +'+fmt(a));renderDashboard()};
  document.querySelectorAll('.re-del').forEach(btn=>btn.onclick=()=>{
    const i=+btn.dataset.idx,e=S.manualEntries[i];if(!e)return;
    const m=e.month||mKeys()[mKeys().length-1];
    if(S.months[m]){if(e.type==='expense'){S.months[m].expenses[e.cat]=Math.max(0,(S.months[m].expenses[e.cat]||0)-e.amount)}else{S.months[m].income=Math.max(0,S.months[m].income-e.amount)}}
    S.manualEntries.splice(i,1);save();syncCloud();toast('הרשומה נמחקה');renderDashboard()});
  document.querySelectorAll('.re-edit').forEach(btn=>btn.onclick=()=>{
    const i=+btn.dataset.idx,e=S.manualEntries[i];if(!e)return;
    const m=e.month||mKeys()[mKeys().length-1];
    if(S.months[m]){if(e.type==='expense'){S.months[m].expenses[e.cat]=Math.max(0,(S.months[m].expenses[e.cat]||0)-e.amount)}else{S.months[m].income=Math.max(0,S.months[m].income-e.amount)}}
    S.manualEntries.splice(i,1);save();renderDashboard();
    setTimeout(()=>{
      if(e.type==='expense'){
        document.querySelectorAll('.qe-tab').forEach(x=>{x.classList.remove('active','bg-white/[0.04]','text-slate-100','shadow-lg','border','border-white/[0.05]');x.classList.add('text-slate-600')});
        document.querySelectorAll('.qe-form').forEach(x=>x.style.display='none');
        const expTab=document.querySelector('.qe-tab[data-t="exp"]');expTab.classList.add('active','bg-white/[0.04]','text-slate-100','shadow-lg','border','border-white/[0.05]');expTab.classList.remove('text-slate-600');
        document.getElementById('qf-exp').style.display='block';
        document.getElementById('qeAmt').value=e.amount;document.getElementById('qeCat').value=e.cat;document.getElementById('qeNote').value=e.note||'';
      }else{
        document.querySelectorAll('.qe-tab').forEach(x=>{x.classList.remove('active','bg-white/[0.04]','text-slate-100','shadow-lg','border','border-white/[0.05]');x.classList.add('text-slate-600')});

function ringArcs(data,r,w,cx,cy){const total=CATS.reduce((a,c)=>a+(data[c.key]||0),0);if(!total)return'';let ang=-90,paths='';CATS.forEach(cat=>{const val=data[cat.key]||0,pct=val/total,sweep=pct*360,gap=3;if(sweep>gap){const sA=(ang+gap/2)*Math.PI/180,eA=(ang+sweep-gap/2)*Math.PI/180;const x1=cx+r*Math.cos(sA),y1=cy+r*Math.sin(sA),x2=cx+r*Math.cos(eA),y2=cy+r*Math.sin(eA),large=sweep-gap>180?1:0;paths+=`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${cat.color}" stroke-width="${w}" stroke-linecap="round" opacity="0.8"/>`}ang+=sweep});return paths}
function animVal(el,s,e,dur,pre,suf){if(!el)return;const range=e-s;let t0=null;function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),ease=1-Math.pow(1-p,3);el.textContent=(pre||'')+Math.round(s+range*ease).toLocaleString('en-IL')+(suf||'');if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step)}
function updateClock(){const el=document.getElementById('clock');if(el)el.textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(updateClock,1000);

function drawZoneCanvases(){drawGrid('zc0');drawCandlesticks('zc1');drawCoins('zc2');const main=document.getElementById('mainScroll');main.addEventListener('scroll',()=>{document.querySelectorAll('.zone-canvas').forEach(c=>{const r=c.parentElement.getBoundingClientRect();c.style.transform='translateY('+(r.top*-.06)+'px)'})},{passive:true});observeZones()}
function observeZones(){const root=document.getElementById('mainScroll');function check(){document.querySelectorAll('.zone:not(.visible)').forEach(z=>{const r=z.getBoundingClientRect();if(r.top<window.innerHeight+100)z.classList.add('visible')})}setTimeout(()=>{document.querySelector('.zone')?.classList.add('visible');check()},120);root.addEventListener('scroll',check,{passive:true})}
function sizeCanvas(id){const c=document.getElementById(id);if(!c)return null;const p=c.parentElement;c.width=p.offsetWidth;c.height=p.offsetHeight;return c}
function drawGrid(id){const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');ctx.strokeStyle='rgba(201,168,76,.01)';ctx.lineWidth=.5;for(let x=0;x<c.width;x+=65){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}for(let y=0;y<c.height;y+=45){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke()}}
function drawCandlesticks(id){const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');const count=Math.floor(c.width/15);let price=100+Math.random()*50;for(let i=0;i<count;i++){const open=price;price+=(Math.random()-.47)*7;const close=price;const high=Math.max(open,close)+Math.random()*5,low=Math.min(open,close)-Math.random()*5;const bull=close>open,x=i*15+7,bw=5,scale=c.height/80,base=c.height*.1;const oY=c.height-base-(open-60)*scale,cY=c.height-base-(close-60)*scale,hY=c.height-base-(high-60)*scale,lY=c.height-base-(low-60)*scale;ctx.strokeStyle=bull?'rgba(52,211,153,.1)':'rgba(248,113,113,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,hY);ctx.lineTo(x,lY);ctx.stroke();ctx.fillStyle=bull?'rgba(52,211,153,.03)':'rgba(248,113,113,.02)';ctx.fillRect(x-bw/2,Math.min(oY,cY),bw,Math.abs(cY-oY)||1)}}
function drawCoins(id){const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');for(let i=0;i<14;i++){const x=Math.random()*c.width,y=Math.random()*c.height,r=5+Math.random()*14;ctx.save();ctx.globalAlpha=.015+Math.random()*.015;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);const cg=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);cg.addColorStop(0,'#C9A84C');cg.addColorStop(1,'#6E5B26');ctx.fillStyle=cg;ctx.fill();ctx.restore()}}

const halo=document.getElementById('halo');let hx=-100,hy=-100,cx2=-100,cy2=-100;
document.addEventListener('mousemove',e=>{hx=e.clientX;hy=e.clientY});
function animHalo(){cx2+=(hx-cx2)*.08;cy2+=(hy-cy2)*.08;halo.style.left=cx2+'px';halo.style.top=cy2+'px';requestAnimationFrame(animHalo)}
animHalo();document.addEventListener('mouseleave',()=>halo.style.opacity='0');document.addEventListener('mouseenter',()=>halo.style.opacity='1');
document.querySelectorAll('.sb-item').forEach(item=>item.onclick=()=>switchView(item.dataset.view));
function renderAll(){if(curView==='dashboard')renderDashboard();else if(curView==='monthly')renderMonthly();else if(curView==='annual')renderAnnual();else renderSettings()}
document.getElementById('app').style.display='block';renderAll();
if(GAS)loadCloud().then(()=>renderAll());
})();
</script>
