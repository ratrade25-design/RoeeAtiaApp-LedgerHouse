<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#F5F2EB">
<title>LedgerHouse — מרכז פיננסי</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{
  fontFamily:{heebo:['Heebo','sans-serif']},
  colors:{
    sand:{50:'#FAF8F3',100:'#F5F2EB',200:'#EBE6DA',300:'#E2DED4',400:'#C4BFB2',500:'#8E9490',600:'#6B706C',700:'#4A4F4B',800:'#2C3630',900:'#1A1F1C',950:'#111513'},
    sage:{DEFAULT:'#2E5E4E',light:'#4A8A72',dark:'#1E3F35',50:'#EEFAF4',100:'#D0F0E0',200:'#A3E0C2',400:'#4A8A72',500:'#2E5E4E',600:'#1E3F35',700:'#162E27'},
    copper:{DEFAULT:'#C8956C',light:'#DDB892',dark:'#A67548',50:'#FDF6EF',100:'#F9E8D6'},
    warmWhite:'#FFFFFF',
  }
}}}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F2EB;--surface:#FFFFFF;--surface2:#FAF8F3;--border:#E2DED4;--border2:#EBE6DA;
  --text:#2C3630;--text2:#4A4F4B;--text3:#6B706C;--text4:#8E9490;--text5:#C4BFB2;
  --sage:#2E5E4E;--sage-light:#4A8A72;--sage-bg:rgba(46,94,78,.06);--sage-border:rgba(46,94,78,.12);
  --copper:#C8956C;--copper-bg:rgba(200,149,108,.08);--copper-border:rgba(200,149,108,.15);
  --income:#3B8C5C;--income-bg:rgba(59,140,92,.06);--expense:#C95D4F;--expense-bg:rgba(201,93,79,.06);
  --shadow-sm:0 1px 3px rgba(44,54,48,.04),0 1px 2px rgba(44,54,48,.03);
  --shadow:0 4px 16px rgba(44,54,48,.06),0 1px 3px rgba(44,54,48,.04);
  --shadow-lg:0 12px 40px rgba(44,54,48,.08),0 4px 12px rgba(44,54,48,.04);
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111513;--surface:#1A1F1C;--surface2:#1E2420;--border:#2A302C;--border2:#232A26;
  --text:#E8E4DD;--text2:#C4C0B8;--text3:#8E9490;--text4:#6B706C;--text5:#4A4F4B;
  --sage:#4A8A72;--sage-light:#6AB894;--sage-bg:rgba(74,138,114,.1);--sage-border:rgba(74,138,114,.2);
  --copper:#DDB892;--copper-bg:rgba(221,184,146,.08);--copper-border:rgba(221,184,146,.15);
  --income:#5CB87A;--income-bg:rgba(92,184,122,.08);--expense:#E07A5F;--expense-bg:rgba(224,122,95,.08);
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow:0 4px 16px rgba(0,0,0,.25);--shadow-lg:0 12px 40px rgba(0,0,0,.35);
}}
:root[data-theme="dark"]{
  --bg:#111513;--surface:#1A1F1C;--surface2:#1E2420;--border:#2A302C;--border2:#232A26;
  --text:#E8E4DD;--text2:#C4C0B8;--text3:#8E9490;--text4:#6B706C;--text5:#4A4F4B;
  --sage:#4A8A72;--sage-light:#6AB894;--sage-bg:rgba(74,138,114,.1);--sage-border:rgba(74,138,114,.2);
  --copper:#DDB892;--copper-bg:rgba(221,184,146,.08);--copper-border:rgba(221,184,146,.15);
  --income:#5CB87A;--income-bg:rgba(92,184,122,.08);--expense:#E07A5F;--expense-bg:rgba(224,122,95,.08);
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow:0 4px 16px rgba(0,0,0,.25);--shadow-lg:0 12px 40px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#F5F2EB;--surface:#FFFFFF;--surface2:#FAF8F3;--border:#E2DED4;--border2:#EBE6DA;
  --text:#2C3630;--text2:#4A4F4B;--text3:#6B706C;--text4:#8E9490;--text5:#C4BFB2;
  --sage:#2E5E4E;--sage-light:#4A8A72;--sage-bg:rgba(46,94,78,.06);--sage-border:rgba(46,94,78,.12);
  --copper:#C8956C;--copper-bg:rgba(200,149,108,.08);--copper-border:rgba(200,149,108,.15);
  --income:#3B8C5C;--income-bg:rgba(59,140,92,.06);--expense:#C95D4F;--expense-bg:rgba(201,93,79,.06);
  --shadow-sm:0 1px 3px rgba(44,54,48,.04),0 1px 2px rgba(44,54,48,.03);
  --shadow:0 4px 16px rgba(44,54,48,.06),0 1px 3px rgba(44,54,48,.04);
  --shadow-lg:0 12px 40px rgba(44,54,48,.08),0 4px 12px rgba(44,54,48,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;font-variant-numeric:tabular-nums;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}

.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.main::-webkit-scrollbar-thumb:hover{background:var(--text5)}

.view{display:none;min-height:100%}.view.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;
  box-shadow:var(--shadow-sm);transition:all .3s ease}
.card:hover{box-shadow:var(--shadow)}
.card-lg{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-sm)}

.ff{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 14px;color:var(--text);outline:none;font-size:13px;transition:all .25s;width:100%;font-family:inherit}
.ff:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-bg)}
.ff::placeholder{color:var(--text5)}
.ff-copper:focus{border-color:var(--copper);box-shadow:0 0 0 3px var(--copper-bg)}

.btn-primary{background:var(--sage);color:#fff;font-weight:700;border:none;
  border-radius:var(--radius-sm);padding:10px 24px;cursor:pointer;font-size:12px;
  transition:all .25s;font-family:inherit}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-primary:active{transform:scale(.98)}

.btn-secondary{background:var(--surface2);color:var(--text2);font-weight:600;border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 24px;cursor:pointer;font-size:12px;
  transition:all .25s;font-family:inherit}
.btn-secondary:hover{background:var(--surface);border-color:var(--sage-border);color:var(--sage);box-shadow:var(--shadow-sm)}
.btn-secondary:active{transform:scale(.98)}

.btn-copper{background:var(--copper);color:#fff;font-weight:700;border:none;
  border-radius:var(--radius-sm);padding:10px 24px;cursor:pointer;font-size:12px;transition:all .25s;font-family:inherit}
.btn-copper:hover{opacity:.9;transform:translateY(-1px);box-shadow:var(--shadow)}

.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;margin-bottom:6px;color:var(--text4);text-transform:uppercase}

.bar{transition:height .8s cubic-bezier(.16,1,.3,1)}
.toast{transform:translateX(-50%) translateY(100px);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(-50%) translateY(0)}

.nav-item{position:relative;display:flex;align-items:center;justify-content:center;width:42px;height:42px;
  border-radius:var(--radius-sm);color:var(--text4);cursor:pointer;transition:all .25s}
.nav-item:hover{background:var(--sage-bg);color:var(--sage)}
.nav-item.active{color:var(--sage);background:var(--sage-bg)}
.nav-item.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:16px;height:2px;border-radius:1px;background:var(--sage)}

.stat-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.03em}
.stat-up{background:var(--income-bg);color:var(--income)}
.stat-down{background:var(--expense-bg);color:var(--expense)}

input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}
select{font-family:inherit}

@media(max-width:768px){
  .mob-1{grid-template-columns:1fr!important}
  .mob-p{padding-left:16px!important;padding-right:16px!important}
  .mob-text{font-size:22px!important}
  .mob-ring{flex-direction:column!important}
  .mob-ring>div:first-child{width:180px!important;height:180px!important;margin:0 auto!important}
}
</style>
</head>
<body class="font-heebo antialiased overflow-hidden h-screen">

<div id="app" class="h-screen overflow-hidden relative">
<div class="flex flex-col h-full">

<header class="flex-shrink-0 h-[56px] flex items-center px-6 mob-p border-b" style="border-color:var(--border);background:var(--surface)">
  <div class="flex items-center gap-2.5 mr-auto">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center font-black text-[11px] text-white" style="background:var(--sage)">LH</div>
    <span class="text-[15px] font-extrabold tracking-tight" style="color:var(--text)">LedgerHouse</span>
  </div>
  <nav class="flex items-center gap-1 mx-auto">
    <div class="nav-item active" data-view="dashboard" title="דשבורד">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <div class="nav-item" data-view="monthly" title="חודשי">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <div class="nav-item" data-view="annual" title="שנתי">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </div>
    <div class="nav-item" data-view="settings" title="הגדרות">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </nav>
  <div class="flex items-center gap-2 ml-auto">
    <div class="flex items-center gap-1.5 text-[10px] font-mono px-2.5 py-1.5 rounded-lg" style="color:var(--text4);background:var(--surface2);border:1px solid var(--border)">
      <span class="w-[5px] h-[5px] rounded-full" style="background:var(--sage);animation:pulse 2.5s ease-in-out infinite"></span>
      <span id="clock">--:--</span>
    </div>
  </div>
</header>

<div class="main flex-1 overflow-y-auto overflow-x-hidden scroll-smooth" id="mainScroll" style="background:var(--bg)">
  <div class="view active" id="v-dashboard"></div>
  <div class="view" id="v-monthly"></div>
  <div class="view" id="v-annual"></div>
  <div class="view" id="v-settings"></div>
</div>
</div>
</div>

<div class="fixed inset-0 z-[100] items-center justify-center p-5" id="addMonthModal" style="display:none;background:rgba(0,0,0,.4);backdrop-filter:blur(8px)">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:500px;box-shadow:var(--shadow-lg);animation:modalIn .3s ease-out">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-lg font-bold" style="color:var(--text)">עריכת מחזור</h3>
      <button class="w-8 h-8 rounded-lg flex items-center justify-center text-lg transition-all" style="background:var(--surface2);border:1px solid var(--border);color:var(--text4)" onclick="closeModal('addMonthModal')" onmouseover="this.style.color='var(--expense)'" onmouseout="this.style.color='var(--text4)'">&times;</button>
    </div>
    <div class="mb-4"><label class="lbl">מחזור</label><select id="amMonth" class="ff ff-copper w-full"></select></div>
    <div class="mb-4"><label class="lbl">כניסות (₪)</label><input type="number" id="amIncome" placeholder="0" class="ff ff-copper" dir="ltr"></div>
    <div id="amCatFields"></div>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div><label class="lbl">שווי נטו</label><input type="number" id="amNetWorth" placeholder="0" class="ff ff-copper" dir="ltr"></div>
      <div><label class="lbl">רזרבה נזילה</label><input type="number" id="amLiquid" placeholder="0" class="ff ff-copper" dir="ltr"></div>
    </div>
    <div class="flex gap-3"><button class="btn-primary" id="amSave">אשר</button><button class="btn-secondary" onclick="closeModal('addMonthModal')">בטל</button></div>
  </div>
</div>

<div class="fixed inset-0 z-[100] items-center justify-center p-5" id="importModal" style="display:none;background:rgba(0,0,0,.4);backdrop-filter:blur(8px)">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:780px;box-shadow:var(--shadow-lg);max-height:85vh;overflow-y:auto;animation:modalIn .3s ease-out">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-lg font-bold" style="color:var(--text)">ייבוא דוח ישראכרט</h3>
      <button class="w-8 h-8 rounded-lg flex items-center justify-center text-lg transition-all" style="background:var(--surface2);border:1px solid var(--border);color:var(--text4)" onclick="closeModal('importModal')" onmouseover="this.style.color='var(--expense)'" onmouseout="this.style.color='var(--text4)'">&times;</button>
    </div>
    <div id="importArea">
      <label class="block w-full py-14 border-2 border-dashed rounded-2xl cursor-pointer text-center transition-all" id="importDropZone" style="border-color:var(--border);background:var(--surface2)" onmouseover="this.style.borderColor='var(--sage)';this.style.background='var(--sage-bg)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface2)'">
        <input type="file" accept=".pdf" id="pdfInput" class="hidden">
        <div class="text-3xl mb-3">📄</div>
        <div class="text-[12px] font-medium" style="color:var(--text3)">לחץ לבחירת קובץ PDF של ישראכרט</div>
        <div class="text-[10px] mt-1" style="color:var(--text5)">או גרור קובץ לכאן</div>
      </label>
    </div>
    <div id="importLoading" style="display:none" class="text-center py-14">
      <div class="text-2xl mb-3" style="animation:pulse 1.5s infinite">📊</div>
      <div class="text-[12px] font-medium" style="color:var(--sage)">מפענח את הדוח...</div>
    </div>
    <div id="importPreview" style="display:none"></div>
    <div id="importActions" style="display:none" class="flex gap-3 mt-6">
      <button class="btn-primary" id="confirmImport">אשר ייבוא</button>
      <button class="btn-secondary" onclick="closeModal('importModal')">בטל</button>
    </div>
  </div>
</div>

<div class="toast fixed bottom-6 left-1/2 rounded-xl px-6 py-3.5 text-[13px] font-semibold z-[200]" id="toast" style="background:var(--sage);color:#fff;box-shadow:var(--shadow-lg)"></div>

<script>
(function(){
const DEFAULT_CATS=[
  {key:'food',name:'Food & Groceries',he:'מזון ומכולת',color:'#3B8C5C'},
  {key:'housing',name:'Housing & Utilities',he:'דיור ושירותים',color:'#6366F1'},
  {key:'invest',name:'Investments',he:'השקעות',color:'#C8956C'},
  {key:'savings',name:'Savings',he:'חיסכון',color:'#0EA5E9'},
  {key:'car',name:'Car & Transport',he:'רכב ותחבורה',color:'#F59E0B'},
  {key:'telecom',name:'Telecom',he:'תקשורת',color:'#8B5CF6'},
];
let CATS=JSON.parse(localStorage.getItem('lh_cats')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS));
function saveCats(){localStorage.setItem('lh_cats',JSON.stringify(CATS))}
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const MO_HE_S=['ינו׳','פבר׳','מרץ','אפר׳','מאי','יוני','יולי','אוג׳','ספט׳','אוק׳','נוב׳','דצמ׳'];
function heMonth(k){const p=k.split(' ');return MO_HE[MO.indexOf(p[0])]+' '+p[1]}
function heMonthS(k){return MO_HE_S[MO.indexOf(k.split(' ')[0])]}

const DEFAULT_DATA={months:{},netWorth:[],liquidSavings:0,manualEntries:[]};

const _freshReset=!ls('lh_v2');
if(_freshReset){localStorage.removeItem('lh_state');ls('lh_v2','1')}
let S=loadLocal()||JSON.parse(JSON.stringify(DEFAULT_DATA));
if(!S.manualEntries)S.manualEntries=[];
let GAS=ls('lh_gas')||'https://script.google.com/macros/s/AKfycbwMDQpxmLCiXM62_imOz6p63DwQvT6A7kyJ_59qps8SwrELidbQ4KZQDicUDn1qZlzd/exec';
let curView='dashboard',curMonthIdx=-1;

function ls(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}
function loadLocal(){try{return JSON.parse(ls('lh_state'))}catch(e){return null}}
function save(){ls('lh_state',JSON.stringify(S))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
const fmt=n=>'₪'+n.toLocaleString('en-IL');
const fmtK=n=>n>=1e3?'₪'+(n/1e3).toFixed(0)+'K':fmt(n);
function totE(d){return CATS.reduce((a,c)=>a+(d.expenses[c.key]||0),0)}
function mKeys(){return Object.keys(S.months)}
function sortMonths(){const sorted=Object.entries(S.months).sort((a,b)=>{const[mA,yA]=a[0].split(' '),[mB,yB]=b[0].split(' ');return(+yA-+yB)||(MO.indexOf(mA)-MO.indexOf(mB))});S.months=Object.fromEntries(sorted)}

async function syncCloud(){if(!GAS)return;try{await fetch(GAS+'?action=save',{method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain'}});setSyncBadge('ok','מסונכרן')}catch(e){setSyncBadge('err','ניתוק')}}
async function loadCloud(){if(!GAS)return;try{const r=await fetch(GAS+'?action=get');const d=await r.json();if(d&&d.months){S=d;if(!S.manualEntries)S.manualEntries=[];save();setSyncBadge('ok','נטען')}}catch(e){setSyncBadge('err','שגיאה')}}
function setSyncBadge(s,t){document.querySelectorAll('.sync-badge').forEach(b=>{
  b.style.color=s==='ok'?'var(--income)':'var(--expense)';
  b.style.background=s==='ok'?'var(--income-bg)':'var(--expense-bg)';
  b.querySelector('.st').textContent=t})}

function deltaStyle(pct){const up=pct>0;return up?'color:var(--expense)':'color:var(--income)'}
function deltaBadge(pct){return`<span class="stat-badge ${+pct>=0?'stat-down':'stat-up'}">${+pct>=0?'+':''}${pct}%</span>`}

function switchView(v){
  curView=v;
  document.querySelectorAll('.nav-item').forEach(i=>{i.classList.toggle('active',i.dataset.view===v)});
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
  document.getElementById('mainScroll').scrollTop=0;

function drawPie(expenses,curM){
  const c=document.getElementById('pieCanvas');if(!c)return;
  const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h/2,r=160;
  const total=CATS.reduce((a,cat)=>a+(expenses[cat.key]||0),0);
  if(!total)return;
  ctx.clearRect(0,0,w,h);
  let ang=-Math.PI/2;
  CATS.forEach(cat=>{
    const val=expenses[cat.key]||0;if(!val)return;
    const sweep=(val/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,ang,ang+sweep);ctx.closePath();
    ctx.fillStyle=cat.color;ctx.fill();
    ang+=sweep;
  });
  ctx.beginPath();ctx.arc(cx,cy,r*.6,0,Math.PI*2);
  const cs=getComputedStyle(document.documentElement);
  ctx.fillStyle=cs.getPropertyValue('--surface').trim()||'#FFFFFF';ctx.fill();
  ctx.font='800 36px Heebo';ctx.fillStyle=cs.getPropertyValue('--text').trim()||'#2C3630';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('₪'+total.toLocaleString('en-IL'),cx,cy-6);
  ctx.font='400 16px Heebo';ctx.fillStyle=cs.getPropertyValue('--text4').trim()||'#8E9490';
  ctx.fillText(heMonth(curM),cx,cy+18);
}

function fillAddMonth(){
  const s=document.getElementById('amMonth').value;
  if(S.months[s]){const m=S.months[s];document.getElementById('amIncome').value=m.income;CATS.forEach(c=>{const el=document.getElementById('am_'+c.key);if(el)el.value=m.expenses[c.key]||0})}
  else{document.getElementById('amIncome').value='';CATS.forEach(c=>{const el=document.getElementById('am_'+c.key);if(el)el.value=''})}
  const nw=S.netWorth.find(n=>n.month===document.getElementById('amMonth').value.split(' ')[0]);
  document.getElementById('amNetWorth').value=nw?nw.value:(S.netWorth[S.netWorth.length-1]?.value||0);document.getElementById('amLiquid').value=S.liquidSavings;
}

function animVal(el,s,e,dur,pre,suf){if(!el)return;const range=e-s;let t0=null;
  function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),ease=1-Math.pow(1-p,3);el.textContent=(pre||'')+Math.round(s+range*ease).toLocaleString('en-IL')+(suf||'');if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step)}

if(typeof pdfjsLib!=='undefined')pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const IC_MAP={'מכולת/סופר':'food','מעדניות':'food','מסעדות/קפה':'food','דלק':'car','רכב שירותי':'car',
  'תקשורת':'telecom','מחשבים':'telecom',"אינט' קניה":'telecom','הלבשה':'housing','ביטוח':'housing',
  'בניה/שיפוץ':'housing','רהיטים':'housing','ספר בתי':'housing','פנאי/ספורט':'savings','תרבות':'savings','שונות':'housing'};
const IC_CATS=Object.keys(IC_MAP);

window.openImportModal=function(){
  document.getElementById('importModal').style.display='flex';
  document.getElementById('importArea').style.display='block';
  document.getElementById('importLoading').style.display='none';
  document.getElementById('importPreview').style.display='none';
  document.getElementById('importActions').style.display='none';
  document.getElementById('pdfInput').value='';
};
document.getElementById('importModal').onclick=e=>{if(e.target.id==='importModal')closeModal('importModal')};

const dropZone=document.getElementById('importDropZone');
if(dropZone){
  ['dragenter','dragover'].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.style.borderColor='var(--sage)';dropZone.style.background='var(--sage-bg)'}));
  ['dragleave','drop'].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.style.borderColor='var(--border)';dropZone.style.background='var(--surface2)'}));
  dropZone.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')processPDF(f)});
}
document.getElementById('pdfInput').onchange=e=>{const f=e.target.files[0];if(f)processPDF(f)};

async function processPDF(file){
  document.getElementById('importArea').style.display='none';
  document.getElementById('importLoading').style.display='block';
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
    let fullText='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const content=await page.getTextContent();
      const lineMap={};
      content.items.forEach(item=>{
        const y=Math.round(item.transform[5]/3)*3;
        if(!lineMap[y])lineMap[y]=[];
        lineMap[y].push({x:item.transform[4],str:item.str});
      });
      Object.keys(lineMap).map(Number).sort((a,b)=>b-a).forEach(y=>{
        fullText+=lineMap[y].sort((a,b)=>a.x-b.x).map(i=>i.str).join(' ')+'\n';
      });
    }
    const txns=extractTxns(fullText);
    if(!txns.length){
      document.getElementById('importLoading').style.display='none';
      document.getElementById('importArea').style.display='block';
      return toast('לא נמצאו עסקאות');
    }
    showImportPreview(txns);
  }catch(err){
    console.error('PDF parse error:',err);
    document.getElementById('importLoading').style.display='none';
    document.getElementById('importArea').style.display='block';
    toast('שגיאה בקריאת הקובץ');
  }
}

function extractTxns(text){
  const txns=[],lines=text.split('\n'),dateRe=/(\d{2})\/(\d{2})\/(\d{2})/;
  for(const line of lines){
    const dm=line.match(dateRe);
    if(!dm)continue;
    if(line.includes('תאריך')||line.includes('מועד חיוב')||line.includes('פירוט'))continue;
    const amounts=[];
    let m,ar=/([\d,]+\.\d{2})/g;
    while((m=ar.exec(line))!==null)amounts.push(parseFloat(m[1].replace(/,/g,'')));
    if(!amounts.length)continue;
    const amt=amounts[amounts.length-1];
    if(amt<=0)continue;
    let ic='שונות',lc='housing';
    for(const c of IC_CATS){if(line.includes(c)){ic=c;lc=IC_MAP[c];break}}
    let biz=line.replace(dateRe,'').replace(/([\d,]+\.\d{2})/g,'').replace(/הוצג לא|נייד\.תש|קבע\.ה/g,'');
    for(const c of IC_CATS)biz=biz.replace(c,'');
    biz=biz.replace(/\s+/g,' ').trim();
    if(biz.length>35)biz=biz.substring(0,35)+'…';
    const mo=parseInt(dm[2])-1,yr='20'+dm[3],moKey=MO[mo]+' '+yr;
    txns.push({date:dm[0],biz,ic,lc,amt,moKey});
  }
  return txns;
}

function isDuplicate(t){
  return S.manualEntries.some(e=>{
    if(Math.abs(e.amount-Math.round(t.amt))>1)return false;
    const n=(e.note||'').replace('ישראכרט: ','');
    if(n&&t.biz&&(n.includes(t.biz.replace('…',''))||t.biz.replace('…','').includes(n)))return true;
    if(e.month===t.moKey&&e.cat===t.lc&&Math.abs(e.amount-Math.round(t.amt))===0)return true;
    return false;
  });
}

function findSelfDuplicates(txns){
  const dupes=new Set();
  for(let i=0;i<txns.length;i++){
    for(let j=i+1;j<txns.length;j++){
      if(txns[i].date===txns[j].date&&Math.abs(txns[i].amt-txns[j].amt)<0.01&&txns[i].biz===txns[j].biz){
        dupes.add(j);
      }
    }
  }
  return dupes;
}

function showImportPreview(txns){
  let total=0;
  const selfDupes=findSelfDuplicates(txns);
  txns.forEach((t,i)=>{
    t.dup=isDuplicate(t);
    t.selfDup=selfDupes.has(i);
    t.include=!t.dup&&!t.selfDup;
    if(t.include)total+=t.amt;
  });
  const dupCount=txns.filter(t=>t.dup||t.selfDup).length;
  const byMonth={};txns.forEach(t=>{if(!byMonth[t.moKey])byMonth[t.moKey]=[];byMonth[t.moKey].push(t)});

  let h=`<div class="flex items-center gap-3 mb-4 flex-wrap">
    <div class="text-[10px] uppercase tracking-widest font-bold flex items-center gap-2" style="color:var(--income)">
      <span class="w-[5px] h-[5px] rounded-full" style="background:var(--income)"></span>נמצאו ${txns.length} עסקאות</div>`;
  if(dupCount>0)h+=`<div class="text-[10px] px-3 py-1.5 rounded-lg font-bold" style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);color:#D97706">⚠ ${dupCount} חשודות ככפילות</div>`;
  h+=`</div>`;

  h+='<div class="max-h-[45vh] overflow-y-auto rounded-xl" style="border:1px solid var(--border)"><table class="w-full text-[11px]">';
  h+=`<thead class="sticky top-0 z-10" style="background:var(--surface)"><tr>`;
  h+='<th class="p-3 text-center w-8"><input type="checkbox" id="icAll" checked class="cursor-pointer"></th>';
  h+='<th class="text-right p-3 text-[9px] uppercase tracking-wider font-semibold" style="color:var(--text5)">תאריך</th>';
  h+='<th class="text-right p-3 text-[9px] uppercase tracking-wider font-semibold" style="color:var(--text5)">בית עסק</th>';
  h+='<th class="text-right p-3 text-[9px] uppercase tracking-wider font-semibold" style="color:var(--text5)">ענף</th>';
  h+='<th class="text-right p-3 text-[9px] uppercase tracking-wider font-semibold" style="color:var(--text5)">קטגוריה</th>';
  h+='<th class="text-left p-3 text-[9px] uppercase tracking-wider font-semibold" style="color:var(--text5)">סכום</th>';
  h+='<th class="p-3 w-6"></th>';
  h+='</tr></thead><tbody>';
  txns.forEach((t,i)=>{
    const warn=t.dup||t.selfDup;
    const rowBg=warn?'background:rgba(245,158,11,.04)':'';
    h+=`<tr class="ic-row transition-all" data-i="${i}" style="${rowBg};border-top:1px solid var(--border2)">
      <td class="p-3 text-center"><input type="checkbox" class="ic-chk cursor-pointer" data-i="${i}" ${t.include?'checked':''}></td>
      <td class="p-3 font-mono text-[10px]" style="color:var(--text4)">${t.date}</td>
      <td class="p-3" style="color:var(--text3)">${t.biz}</td>
      <td class="p-3 text-[10px]" style="color:var(--text5)">${t.ic}</td>
      <td class="p-3"><select class="ic-sel rounded-lg px-2 py-1 text-[10px] outline-none cursor-pointer" data-i="${i}" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2)">
        ${CATS.map(c=>`<option value="${c.key}" ${c.key===t.lc?'selected':''}>${c.he}</option>`).join('')}
      </select></td>
      <td class="p-3 text-left font-bold" style="color:var(--text)">${fmt(t.amt)}</td>
      <td class="p-3 text-center">${warn?(t.dup?'<span class="text-[9px] font-bold" style="color:#D97706" title="כבר קיימת">כפול</span>':'<span class="text-[9px] font-bold" style="color:#D97706" title="זהה בדוח">כפול?</span>'):''}</td></tr>`;
  });
  h+=`<tr class="font-bold" style="border-top:2px solid var(--border)"><td class="p-3"></td><td colspan="4" class="p-3" style="color:var(--text3)">סה״כ לייבוא</td><td class="p-3 text-left" style="color:var(--copper)" id="impTotal">${fmt(total)}</td><td></td></tr>`;
  h+='</tbody></table></div>';
  h+='<div class="mt-3 flex flex-wrap gap-2">';
  Object.keys(byMonth).forEach(mk=>{h+=`<span class="text-[10px] px-3 py-1.5 rounded-lg" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text4)">${heMonth(mk)}: ${byMonth[mk].length} עסקאות</span>`});
  h+='</div>';

  document.getElementById('importPreview').innerHTML=h;
  document.getElementById('importLoading').style.display='none';
  document.getElementById('importPreview').style.display='block';
  document.getElementById('importActions').style.display='flex';
  window._iTxns=txns;

  function updateTotal(){
    let t=0;window._iTxns.forEach(x=>{if(x.include)t+=x.amt});
    const el=document.getElementById('impTotal');if(el)el.textContent=fmt(t);
  }
  document.querySelectorAll('.ic-sel').forEach(sel=>{sel.onchange=()=>{window._iTxns[+sel.dataset.i].lc=sel.value}});
  document.querySelectorAll('.ic-chk').forEach(chk=>{chk.onchange=()=>{window._iTxns[+chk.dataset.i].include=chk.checked;updateTotal();
    const allEl=document.getElementById('icAll');if(allEl)allEl.checked=window._iTxns.every(x=>x.include)}});
  const allChk=document.getElementById('icAll');
  if(allChk)allChk.onchange=()=>{const v=allChk.checked;window._iTxns.forEach(x=>x.include=v);document.querySelectorAll('.ic-chk').forEach(c=>c.checked=v);updateTotal()};
}

document.getElementById('confirmImport').onclick=()=>{
  const txns=(window._iTxns||[]).filter(t=>t.include);
  if(!txns.length)return toast('לא נבחרו עסקאות');
  txns.forEach(t=>{
    if(!S.months[t.moKey]){S.months[t.moKey]={income:0,expenses:{}};CATS.forEach(c=>S.months[t.moKey].expenses[c.key]=0)}
    S.months[t.moKey].expenses[t.lc]=(S.months[t.moKey].expenses[t.lc]||0)+Math.round(t.amt);
    S.manualEntries.push({type:'expense',cat:t.lc,amount:Math.round(t.amt),note:'ישראכרט: '+t.biz,month:t.moKey,ts:Date.now()});
  });
  sortMonths();save();syncCloud();closeModal('importModal');
  toast('יובאו '+txns.length+' עסקאות');
  renderAll();
};
})();
</script>
</body>
</html>
