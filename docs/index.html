<html lang="he" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>LedgerHouse — מרכז פיקוד פיננסי</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{
  fontFamily:{heebo:['Heebo','sans-serif']},
  colors:{brand:{950:'#030308',900:'#050510',850:'#0a0a1a',800:'#0f0f24',750:'#14142e',700:'#1a1a38'},
    gold:{DEFAULT:'#C9A84C',light:'#E5D08A',dark:'#9A7E38'},
    neon:{purple:'#A855F7',cyan:'#22D3EE',pink:'#F472B6',blue:'#6366F1'}},
  transitionDuration:{500:'500ms',700:'700ms'}
}}}
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;font-variant-numeric:tabular-nums;background:#050510;color:#E2E8F0;-webkit-font-smoothing:antialiased;overflow:hidden}

.nebula{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.neb{position:absolute;border-radius:50%;filter:blur(120px);mix-blend-mode:screen;will-change:transform}
@keyframes nd1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(90px,70px) scale(1.25)}}
@keyframes nd2{0%,100%{transform:translate(0,0) scale(1.1)}50%{transform:translate(-70px,-90px) scale(1.35)}}
@keyframes nd3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-50px) scale(1.15)}}
@keyframes nd4{0%,100%{transform:translate(0,0) scale(1.05)}50%{transform:translate(-50px,80px) scale(1.2)}}

.grid-ov{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(99,102,241,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.02) 1px,transparent 1px);
  background-size:60px 60px}

.scan-ov{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 6px)}

.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:rgba(168,85,247,.12);border-radius:2px}

.view{display:none;min-height:100%}.view.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px -5px var(--glow)}50%{box-shadow:0 0 35px -3px var(--glow)}}

.zone .zone-inner{opacity:1}

.qc{position:relative;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.04);border-radius:20px;padding:24px;overflow:hidden;
  transition:all .6s cubic-bezier(.16,1,.3,1)}
.qc::before{content:'';position:absolute;inset:-1px;border-radius:21px;padding:1px;
  background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(34,211,238,.08),rgba(201,168,76,.12));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;transition:opacity .5s}
.qc::after{content:'';position:absolute;bottom:-30px;left:15%;right:15%;height:50px;border-radius:50%;
  background:radial-gradient(ellipse,var(--ambient,rgba(168,85,247,.08)),transparent 70%);filter:blur(20px);opacity:0;transition:opacity .5s;pointer-events:none}
.qc:hover::after{opacity:1}

.qp{backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(255,255,255,.015);
  border:1px solid rgba(255,255,255,.04);border-radius:20px;padding:28px;
  box-shadow:0 4px 40px -8px rgba(0,0,0,.3);transition:all .6s cubic-bezier(.16,1,.3,1)}

.ff{background:transparent!important;border:none!important;border-bottom:1px solid rgba(255,255,255,.08)!important;border-radius:0!important;
  padding:10px 4px!important;color:#E2E8F0;outline:none;font-size:13px;transition:all .5s;width:100%}
.ff:focus{border-bottom-color:rgba(168,85,247,.6)!important;box-shadow:0 2px 20px -4px rgba(168,85,247,.2)}
.ff::placeholder{color:rgba(255,255,255,.15)}
.ff-gold:focus{border-bottom-color:rgba(201,168,76,.6)!important;box-shadow:0 2px 20px -4px rgba(201,168,76,.2)}

.btn-neon{background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(99,102,241,.1));border:1px solid rgba(168,85,247,.25);
  color:#E2E8F0;font-weight:700;border-radius:14px;padding:10px 24px;cursor:pointer;font-size:12px;
  transition:all .5s;position:relative;overflow:hidden}
.btn-neon:hover{background:linear-gradient(135deg,rgba(168,85,247,.25),rgba(99,102,241,.15));
  box-shadow:0 0 30px -5px rgba(168,85,247,.3);transform:translateY(-1px)}
.btn-neon:active{transform:scale(.97)}
.btn-neon::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
  transform:translateX(-100%);transition:transform .6s}
.btn-neon:hover::before{transform:translateX(100%)}

.btn-gold{background:linear-gradient(135deg,#C9A84C,#9A7E38);color:#050510;font-weight:800;border:none;
  border-radius:14px;padding:10px 24px;cursor:pointer;font-size:12px;transition:all .5s}
.btn-gold:hover{box-shadow:0 0 30px -5px rgba(201,168,76,.35);transform:translateY(-1px)}
.btn-gold:active{transform:scale(.97)}

.lbl{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.25em;font-weight:600;margin-bottom:8px;
  background:linear-gradient(90deg,rgba(168,85,247,.7),rgba(34,211,238,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.bar{transition:height 1.2s cubic-bezier(.16,1,.3,1)}
.toast{transform:translateX(-50%) translateY(100px);transition:transform .5s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(-50%) translateY(0)}

.halo{position:fixed;pointer-events:none;z-index:9997;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,.03) 0%,rgba(99,102,241,.01) 40%,transparent 70%);
  transform:translate(-50%,-50%);transition:opacity .4s}

.sb-item.active .sb-bar{opacity:1;transform:scaleY(1)}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}

#particleOverlay{position:fixed;inset:0;z-index:999;pointer-events:none}

@media(max-width:768px){
  .mob-1{grid-template-columns:1fr!important}
  .mob-p{padding-left:14px!important;padding-right:14px!important}
  .mob-py{padding-top:20px!important;padding-bottom:20px!important}
  .mob-text{font-size:24px!important}
  .mob-ring{flex-direction:column!important}
  .mob-ring>div:first-child{width:180px!important;height:180px!important;margin:0 auto!important}
}
@media(max-width:540px){.sidebar{width:46px!important}}
</style>
</head>

  <div class="neb" style="width:380px;height:380px;background:radial-gradient(circle,rgba(34,211,238,.06),transparent 70%);top:15%;left:45%;animation:nd4 30s infinite ease-in-out"></div>
  <div class="neb" style="width:300px;height:300px;background:radial-gradient(circle,rgba(244,114,182,.05),transparent 70%);bottom:20%;right:20%;animation:nd1 34s infinite ease-in-out reverse"></div>

<nav class="sidebar w-[62px] flex-shrink-0 backdrop-blur-3xl bg-brand-950/60 border-r border-white/[0.03] flex flex-col items-center py-5 gap-1.5 z-20 relative">

  <div class="sb-item active relative w-[40px] h-[40px] rounded-xl flex items-center justify-center text-slate-600 cursor-pointer transition-all duration-500 hover:text-slate-300 hover:bg-white/[0.03]" data-view="dashboard">
    <div class="sb-bar absolute left-0 top-3 bottom-3 w-[2px] rounded-r-full bg-neon-purple shadow-[0_0_12px_rgba(168,85,247,0.5)] opacity-0 scale-y-0 transition-all duration-500"></div>
    <svg class="w-[17px] h-[17px] relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  </div>

    <div class="sb-bar absolute left-0 top-3 bottom-3 w-[2px] rounded-r-full bg-neon-purple shadow-[0_0_12px_rgba(168,85,247,0.5)] opacity-0 scale-y-0 transition-all duration-500"></div>
    <svg class="w-[17px] h-[17px] relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

    <div class="sb-bar absolute left-0 top-3 bottom-3 w-[2px] rounded-r-full bg-neon-purple shadow-[0_0_12px_rgba(168,85,247,0.5)] opacity-0 scale-y-0 transition-all duration-500"></div>
    <svg class="w-[17px] h-[17px] relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
  </div>
  <div class="mt-auto">
    <div class="sb-item relative w-[40px] h-[40px] rounded-xl flex items-center justify-center text-slate-600 cursor-pointer transition-all duration-500 hover:text-slate-300 hover:bg-white/[0.03]" data-view="settings">
      <div class="sb-bar absolute left-0 top-3 bottom-3 w-[2px] rounded-r-full bg-neon-purple shadow-[0_0_12px_rgba(168,85,247,0.5)] opacity-0 scale-y-0 transition-all duration-500"></div>
      <svg class="w-[17px] h-[17px] relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </div>
</nav>

<div class="main flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth" id="mainScroll">

<script>
(function(){
const DEFAULT_CATS=[
  {key:'food',name:'Food & Groceries',he:'מזון ומכולת',color:'#34D399'},
  {key:'housing',name:'Housing & Utilities',he:'דיור ושירותים',color:'#818CF8'},
  {key:'invest',name:'Investments',he:'השקעות',color:'#C9A84C'},
  {key:'savings',name:'Savings',he:'חיסכון',color:'#22D3EE'},
  {key:'car',name:'Car & Transport',he:'רכב ותחבורה',color:'#FB923C'},
  {key:'telecom',name:'Telecom',he:'תקשורת',color:'#A78BFA'},
];
let CATS=JSON.parse(localStorage.getItem('lh_cats')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS));
function saveCats(){localStorage.setItem('lh_cats',JSON.stringify(CATS))}
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const MO_HE_S=['ינו׳','פבר׳','מרץ','אפר׳','מאי','יוני','יולי','אוג׳','ספט׳','אוק׳','נוב׳','דצמ׳'];
function heMonth(k){const p=k.split(' ');return MO_HE[MO.indexOf(p[0])]+' '+p[1]}
function heMonthS(k){return MO_HE_S[MO.indexOf(k.split(' ')[0])]}

const DEFAULT_DATA={
  months:{
    'Jan 2026':{income:20000,expenses:{food:3000,housing:6200,invest:3500,savings:3000,car:2000,telecom:480}},
    'Feb 2026':{income:20500,expenses:{food:3100,housing:6300,invest:3600,savings:3100,car:1900,telecom:460}},
    'Mar 2026':{income:21000,expenses:{food:2900,housing:6400,invest:3800,savings:3200,car:2200,telecom:440}},
    'Apr 2026':{income:21200,expenses:{food:3050,housing:6450,invest:3900,savings:3300,car:2050,telecom:430}},
    'May 2026':{income:21500,expenses:{food:3200,housing:6500,invest:4000,savings:3500,car:2100,telecom:450}},
    'Jun 2026':{income:22000,expenses:{food:2800,housing:6800,invest:4500,savings:3200,car:1900,telecom:420}},
    'Jul 2026':{income:22800,expenses:{food:2950,housing:6700,invest:5000,savings:3800,car:2300,telecom:380}}
  },
  netWorth:[{month:'Jan',value:235000},{month:'Feb',value:242000},{month:'Mar',value:248000},{month:'Apr',value:252000},{month:'May',value:258000},{month:'Jun',value:265000},{month:'Jul',value:273000}],
  liquidSavings:95000,manualEntries:[]
};

let S=loadLocal()||JSON.parse(JSON.stringify(DEFAULT_DATA));
if(!S.manualEntries)S.manualEntries=[];
let GAS=ls('lh_gas')||'https://script.google.com/macros/s/AKfycbwMDQpxmLCiXM62_imOz6p63DwQvT6A7kyJ_59qps8SwrELidbQ4KZQDicUDn1qZlzd/exec';
let curView='dashboard',curMonthIdx=-1,vortexRAF=null;

function ls(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}
function loadLocal(){try{return JSON.parse(ls('lh_state'))}catch(e){return null}}
function save(){ls('lh_state',JSON.stringify(S))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
const fmt=n=>'₪'+n.toLocaleString('en-IL');
const fmtK=n=>n>=1e3?'₪'+(n/1e3).toFixed(0)+'K':fmt(n);
function totE(d){return CATS.reduce((a,c)=>a+(d.expenses[c.key]||0),0)}
function mKeys(){return Object.keys(S.months)}
function sortMonths(){const sorted=Object.entries(S.months).sort((a,b)=>{const[mA,yA]=a[0].split(' '),[mB,yB]=b[0].split(' ');return(+yA-+yB)||(MO.indexOf(mA)-MO.indexOf(mB))});S.months=Object.fromEntries(sorted)}

async function syncCloud(){if(!GAS)return;try{await fetch(GAS+'?action=save',{method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain'}});setSyncBadge('ok','מקושר')}catch(e){setSyncBadge('err','ניתוק')}}
async function loadCloud(){if(!GAS)return;try{const r=await fetch(GAS+'?action=get');const d=await r.json();if(d&&d.months){S=d;if(!S.manualEntries)S.manualEntries=[];save();setSyncBadge('ok','נטען')}}catch(e){setSyncBadge('err','שגיאה')}}
function setSyncBadge(s,t){document.querySelectorAll('.sync-badge').forEach(b=>{b.className='sync-badge flex items-center gap-2 text-[10px] px-3 py-1.5 rounded-lg backdrop-blur-2xl transition-all duration-500 '+(s==='ok'?'text-emerald-400/80 bg-emerald-400/[0.04] border border-emerald-500/10':'text-red-400/80 bg-red-400/[0.04] border border-red-500/10');b.querySelector('.st').textContent=t})}

function heatStyle(pct){const a=Math.abs(pct),i=Math.min(a/15,1),up=pct>0;
  const c=up?'248,113,113':'52,211,153';return`color:rgba(${c},${.5+i*.5});text-shadow:0 0 ${4+i*18}px rgba(${c},${i*.6})`}

function switchView(v){
  curView=v;if(vortexRAF){cancelAnimationFrame(vortexRAF);vortexRAF=null}
  document.querySelectorAll('.sb-item').forEach(i=>{const a=i.dataset.view===v;i.classList.toggle('active',a);i.classList.toggle('text-neon-purple',a);i.classList.toggle('bg-neon-purple/[0.06]',a);i.classList.toggle('text-slate-600',!a)});
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
  document.getElementById('mainScroll').scrollTop=0;
  if(v==='dashboard')renderDashboard();else if(v==='monthly')renderMonthly();else if(v==='annual')renderAnnual();else renderSettings();
}

function renderDashboard(){
  const mk=mKeys(),cur=S.months[mk[mk.length-1]],prev=S.months[mk[mk.length-2]];
  const curM=mk[mk.length-1],prevM=mk[mk.length-2];
  const cT=totE(cur),pT=totE(prev),cfr=((cur.income/cT)*100).toFixed(1);

function initVortex(curExp,prevExp,curM){
  const c=document.getElementById('vortexCanvas');if(!c)return;
  const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h/2;
  const total=CATS.reduce((a,cat)=>a+(curExp[cat.key]||0),0);
  const particles=[];
  function makeRing(exp,radius,alpha,speed){
    const t2=CATS.reduce((a,cat)=>a+(exp[cat.key]||0),0);if(!t2)return;
    let ang=-Math.PI/2;
    CATS.forEach(cat=>{
      const val=exp[cat.key]||0,sweep=(val/t2)*Math.PI*2,cnt=Math.max(2,Math.floor((val/t2)*55));
      for(let i=0;i<cnt;i++){
        particles.push({angle:ang+(i/cnt)*sweep,radius:radius+(Math.random()-.5)*8,
          color:cat.color,alpha:alpha*(.5+Math.random()*.5),speed:speed+(Math.random()-.5)*.0004,
          size:1+Math.random()*2.5,glow:3+Math.random()*8})}
      ang+=sweep})
  }
  makeRing(prevExp,190,.35,.0008);makeRing(curExp,140,.75,.0015);
  let time=0;
  function draw(){
    ctx.clearRect(0,0,w,h);time+=.016;
    ctx.fillStyle='rgba(5,5,16,.04)';ctx.fillRect(0,0,w,h);
    particles.forEach(p=>{
      p.angle+=p.speed;const x=cx+p.radius*Math.cos(p.angle),y=cy+p.radius*Math.sin(p.angle);
      ctx.save();ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=p.glow;ctx.fill();ctx.restore()});
    const pulse=.85+.15*Math.sin(time*1.5);
    ctx.save();ctx.globalAlpha=pulse;ctx.font='800 '+Math.round(40*(.95+.05*Math.sin(time*1.5)))+'px Heebo';
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(168,85,247,.4)';ctx.shadowBlur=20;
    ctx.fillText('₪'+total.toLocaleString('en-IL'),cx,cy-8);
    ctx.font='400 16px Heebo';ctx.fillStyle='rgba(255,255,255,.3)';ctx.shadowBlur=0;
    ctx.fillText(heMonth(curM),cx,cy+20);ctx.restore();
    vortexRAF=requestAnimationFrame(draw)}
  draw()
}

function particleBurst(fromEl){
  const cv=document.getElementById('particleOverlay'),ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const r=fromEl.getBoundingClientRect(),fx=r.left+r.width/2,fy=r.top+r.height/2;
  const ps=[];for(let i=0;i<25;i++){ps.push({x:fx,y:fy,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10-4,
    life:1,color:`hsl(${260+Math.random()*60},70%,${50+Math.random()*30}%)`,size:1+Math.random()*3})}
  function anim(){ctx.clearRect(0,0,cv.width,cv.height);let alive=false;
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.025;if(p.life<=0)return;alive=true;
      ctx.save();ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.fill();ctx.restore()});
    if(alive)requestAnimationFrame(anim);else ctx.clearRect(0,0,cv.width,cv.height)}
  anim()
}

function bindDashboardEvents(){
  document.querySelectorAll('.qe-tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.qe-tab').forEach(x=>{x.classList.remove('active','bg-neon-purple/[0.06]','text-slate-100','shadow-lg','border','border-neon-purple/15');x.classList.add('text-slate-600')});
    document.querySelectorAll('.qe-form').forEach(x=>x.style.display='none');
    t.classList.add('active','bg-neon-purple/[0.06]','text-slate-100','shadow-lg','border','border-neon-purple/15');t.classList.remove('text-slate-600');
    document.getElementById('qf-'+t.dataset.t).style.display='block'});
  const qeAdd=document.getElementById('qeAdd');if(qeAdd)qeAdd.onclick=()=>{
    const a=+document.getElementById('qeAmt').value;if(!a||a<=0)return;
    const cat=document.getElementById('qeCat').value,note=document.getElementById('qeNote').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].expenses[cat]=(S.months[cm].expenses[cat]||0)+a;
    S.manualEntries.push({type:'expense',cat,amount:a,note,month:cm,ts:Date.now()});save();syncCloud();
    particleBurst(qeAdd);toast('יציאה הוזרמה: '+fmt(a));setTimeout(()=>renderDashboard(),400)};
  const qiAdd=document.getElementById('qiAdd');if(qiAdd)qiAdd.onclick=()=>{
    const a=+document.getElementById('qiAmt').value;if(!a||a<=0)return;
    const src=document.getElementById('qiSrc').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].income+=a;S.manualEntries.push({type:'income',amount:a,source:src,month:cm,ts:Date.now()});save();syncCloud();
    particleBurst(qiAdd);toast('כניסה נקלטה: +'+fmt(a));setTimeout(()=>renderDashboard(),400)};
  document.querySelectorAll('.re-del').forEach(btn=>btn.onclick=()=>{
    const i=+btn.dataset.idx,e=S.manualEntries[i];if(!e)return;
    const m=e.month||mKeys()[mKeys().length-1];
    if(S.months[m]){if(e.type==='expense'){S.months[m].expenses[e.cat]=Math.max(0,(S.months[m].expenses[e.cat]||0)-e.amount)}else{S.months[m].income=Math.max(0,S.months[m].income-e.amount)}}
    S.manualEntries.splice(i,1);save();syncCloud();toast('הפקודה בוטלה');renderDashboard()});
  document.querySelectorAll('.re-edit').forEach(btn=>btn.onclick=()=>{
    const i=+btn.dataset.idx,e=S.manualEntries[i];if(!e)return;
    const m=e.month||mKeys()[mKeys().length-1];
    if(S.months[m]){if(e.type==='expense'){S.months[m].expenses[e.cat]=Math.max(0,(S.months[m].expenses[e.cat]||0)-e.amount)}else{S.months[m].income=Math.max(0,S.months[m].income-e.amount)}}
    S.manualEntries.splice(i,1);save();renderDashboard();
    setTimeout(()=>{
      if(e.type==='expense'){
        document.querySelectorAll('.qe-tab').forEach(x=>{x.classList.remove('active','bg-neon-purple/[0.06]','text-slate-100','shadow-lg','border','border-neon-purple/15');x.classList.add('text-slate-600')});
        document.querySelectorAll('.qe-form').forEach(x=>x.style.display='none');
        const expTab=document.querySelector('.qe-tab[data-t="exp"]');expTab.classList.add('active','bg-neon-purple/[0.06]','text-slate-100','shadow-lg','border','border-neon-purple/15');expTab.classList.remove('text-slate-600');
        document.getElementById('qf-exp').style.display='block';
        document.getElementById('qeAmt').value=e.amount;document.getElementById('qeCat').value=e.cat;document.getElementById('qeNote').value=e.note||'';
      }else{
        document.querySelectorAll('.qe-tab').forEach(x=>{x.classList.remove('active','bg-neon-purple/[0.06]','text-slate-100','shadow-lg','border','border-neon-purple/15');x.classList.add('text-slate-600')});
        document.querySelectorAll('.qe-form').forEach(x=>x.style.display='none');
        const incTab=document.querySelector('.qe-tab[data-t="inc"]');incTab.classList.add('active','bg-neon-purple/[0.06]','text-slate-100','shadow-lg','border','border-neon-purple/15');incTab.classList.remove('text-slate-600');
        document.getElementById('qf-inc').style.display='block';
        document.getElementById('qiAmt').value=e.amount;document.getElementById('qiSrc').value=e.source||'';
      }
      toast('ערוך ושגר מחדש');
      const zone=document.querySelector('.zone:last-child');if(zone)zone.scrollIntoView({behavior:'smooth',block:'center'});
    },100)});
  if(typeof gsap!=='undefined'){
    document.querySelectorAll('.qc').forEach(card=>{
      card.addEventListener('mouseenter',()=>gsap.to(card,{y:-6,duration:.4,ease:'power2.out'}));
      card.addEventListener('mouseleave',()=>gsap.to(card,{y:0,duration:.5,ease:'power2.out'}))})
  }
}

  document.getElementById('sSaveGas').onclick=async()=>{GAS=document.getElementById('sGas').value.trim();ls('lh_gas',GAS);if(GAS){await loadCloud()}toast('התצורה עודכנה')};
  document.getElementById('addCat').onclick=()=>{const key='cat_'+Date.now();CATS.push({key,name:'New Channel',he:'ערוץ חדש',color:'#94A3B8'});saveCats();renderSettings()};
  document.getElementById('sSaveCats').onclick=()=>{document.querySelectorAll('.cat-row').forEach((row,i)=>{if(CATS[i]){const oldKey=CATS[i].key;CATS[i].color=row.querySelector('.cc').value;const newName=row.querySelector('.cn').value.trim();CATS[i].name=newName||CATS[i].name;CATS[i].he=row.querySelector('.ch').value.trim();const newKey=newName.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').slice(0,20)||oldKey;if(newKey!==oldKey){Object.values(S.months).forEach(m=>{if(m.expenses[oldKey]!==undefined){m.expenses[newKey]=m.expenses[oldKey];delete m.expenses[oldKey]}});CATS[i].key=newKey;save()}}});saveCats();toast('הערוצים עודכנו');renderSettings()};
  document.querySelectorAll('.cat-del').forEach(btn=>btn.onclick=()=>{const i=+btn.dataset.di;if(CATS.length<=1)return toast('נדרש לפחות ערוץ אחד');const key=CATS[i].key;CATS.splice(i,1);Object.values(S.months).forEach(m=>delete m.expenses[key]);saveCats();save();renderSettings()});
  document.getElementById('sExport').onclick=()=>{const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ledgerhouse-backup.json';a.click();toast('המטריצה יוצאה')};
  document.getElementById('sReset').onclick=()=>{if(confirm('לאפס את כל המטריצה לברירת מחדל?')){S=JSON.parse(JSON.stringify(DEFAULT_DATA));CATS=JSON.parse(JSON.stringify(DEFAULT_CATS));save();saveCats();syncCloud();renderAll();toast('המערכת אופסה')}};
}

window.openAddMonth=function(){
  const modal=document.getElementById('addMonthModal'),sel=document.getElementById('amMonth');
  const now=new Date();sel.innerHTML='';
  for(let i=-3;i<=6;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);const l=MO[d.getMonth()]+' '+d.getFullYear();sel.innerHTML+='<option value="'+l+'"'+(i===0?' selected':'')+'>'+heMonth(l)+'</option>'}
  document.getElementById('amCatFields').innerHTML='<div class="grid grid-cols-2 gap-4 mb-5">'+CATS.map(c=>'<div><label class="lbl">'+c.he+'</label><input type="number" id="am_'+c.key+'" placeholder="0" class="ff ff-gold" dir="ltr"></div>').join('')+'</div>';
  fillAddMonth();modal.style.display='flex';sel.onchange=fillAddMonth;
};
function fillAddMonth(){
  const s=document.getElementById('amMonth').value;
  if(S.months[s]){const m=S.months[s];document.getElementById('amIncome').value=m.income;CATS.forEach(c=>{const el=document.getElementById('am_'+c.key);if(el)el.value=m.expenses[c.key]||0})}
  else{document.getElementById('amIncome').value='';CATS.forEach(c=>{const el=document.getElementById('am_'+c.key);if(el)el.value=''})}
  const nw=S.netWorth.find(n=>n.month===document.getElementById('amMonth').value.split(' ')[0]);
  document.getElementById('amNetWorth').value=nw?nw.value:(S.netWorth[S.netWorth.length-1]?.value||0);document.getElementById('amLiquid').value=S.liquidSavings;
}
document.getElementById('amSave').onclick=()=>{const s=document.getElementById('amMonth').value;const expenses={};CATS.forEach(c=>{const el=document.getElementById('am_'+c.key);expenses[c.key]=+(el?.value)||0});S.months[s]={income:+document.getElementById('amIncome').value||0,expenses};const ms2=s.split(' ')[0],nwV=+document.getElementById('amNetWorth').value||0;const nwI=S.netWorth.findIndex(n=>n.month===ms2);if(nwI>=0)S.netWorth[nwI].value=nwV;else S.netWorth.push({month:ms2,value:nwV});S.liquidSavings=+document.getElementById('amLiquid').value||S.liquidSavings;sortMonths();save();syncCloud();closeModal('addMonthModal');toast('המטריצה עודכנה: '+heMonth(s));renderAll()};
window.closeModal=function(id){document.getElementById(id).style.display='none'};
document.getElementById('addMonthModal').onclick=e=>{if(e.target.id==='addMonthModal')closeModal('addMonthModal')};

function animVal(el,s,e,dur,pre,suf){if(!el)return;const range=e-s;let t0=null;
  function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),ease=1-Math.pow(1-p,3);el.textContent=(pre||'')+Math.round(s+range*ease).toLocaleString('en-IL')+(suf||'');if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step)}
function updateClock(){const el=document.getElementById('clock');if(el)el.textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(updateClock,1000);

function observeZones(){const root=document.getElementById('mainScroll');function check(){document.querySelectorAll('.zone:not(.visible)').forEach(z=>{const r=z.getBoundingClientRect();if(r.top<window.innerHeight+100)z.classList.add('visible')})}setTimeout(()=>{document.querySelector('.zone')?.classList.add('visible');check()},120);root.addEventListener('scroll',check,{passive:true})}

const halo=document.getElementById('halo');let hx=-100,hy=-100,cx2=-100,cy2=-100;
document.addEventListener('mousemove',e=>{hx=e.clientX;hy=e.clientY});
function animHalo(){cx2+=(hx-cx2)*.06;cy2+=(hy-cy2)*.06;halo.style.left=cx2+'px';halo.style.top=cy2+'px';requestAnimationFrame(animHalo)}
animHalo();document.addEventListener('mouseleave',()=>halo.style.opacity='0');document.addEventListener('mouseenter',()=>halo.style.opacity='1');
document.querySelectorAll('.sb-item').forEach(item=>item.onclick=()=>switchView(item.dataset.view));
function renderAll(){if(curView==='dashboard')renderDashboard();else if(curView==='monthly')renderMonthly();else if(curView==='annual')renderAnnual();else renderSettings()}
document.getElementById('app').style.display='block';renderAll();
if(GAS)loadCloud().then(()=>renderAll());
})();
</script>
