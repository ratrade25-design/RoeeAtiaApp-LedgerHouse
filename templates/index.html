<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080B10">
<title>LedgerHouse</title>
<style>
  :root {
    --bg-deep: #080B10;
    --bg-base: #0D1117;
    --bg-card: rgba(20,26,35,.85);
    --bg-raised: #1B2331;
    --bg-hover: #212B3A;
    --border: rgba(30,39,54,.8);
    --border-hover: #2A3548;
    --text-1: #E2E8F0;
    --text-2: #8B97A8;
    --text-3: #4E5B6E;
    --emerald: #34D399;
    --emerald-soft: #064E3B;
    --emerald-glow: rgba(52,211,153,.12);
    --amber: #F6C042;
    --amber-soft: #713F12;
    --amber-glow: rgba(246,192,66,.10);
    --indigo: #818CF8;
    --indigo-soft: #2E1065;
    --indigo-glow: rgba(129,140,248,.10);
    --red: #F87171;
    --red-soft: #7F1D1D;
    --red-glow: rgba(248,113,113,.10);
    --cyan: #22D3EE;
    --radius: 10px;
    --radius-lg: 14px;
    font-variant-numeric: tabular-nums;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--bg-deep);color:var(--text-1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{background:var(--bg-deep);min-height:100vh;overflow-x:hidden}

  /* ═══ ZONE SYSTEM ═══ */
  .zone{position:relative;padding:40px 0;overflow:hidden}
  .zone-inner{max-width:1320px;margin:0 auto;padding:0 24px;position:relative;z-index:2}
  .zone-bg{position:absolute;inset:0;z-index:0;opacity:.35;pointer-events:none}

  /* Zone 1: Overview — dark financial grid */
  .zone-overview{background:linear-gradient(180deg,#080B10 0%,#0A0F18 50%,#0D1420 100%)}
  .zone-overview .zone-bg{background:
    repeating-linear-gradient(90deg,rgba(129,140,248,.04) 0px,rgba(129,140,248,.04) 1px,transparent 1px,transparent 80px),
    repeating-linear-gradient(0deg,rgba(129,140,248,.04) 0px,rgba(129,140,248,.04) 1px,transparent 1px,transparent 60px);
    opacity:.6}
  .zone-overview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(180deg,transparent,#081210);z-index:1}

  /* Zone 2: Income — stock market / money */
  .zone-income{background:linear-gradient(180deg,#081210 0%,#0A1A14 30%,#0C1E18 60%,#0A1610 100%)}
  .zone-income::before{content:'';position:absolute;inset:0;z-index:0;opacity:.12;
    background:radial-gradient(ellipse 600px 400px at 20% 50%,rgba(52,211,153,.15),transparent),
    radial-gradient(ellipse 500px 300px at 80% 30%,rgba(34,211,238,.1),transparent)}
  .zone-income::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(180deg,transparent,#14100A);z-index:1}

  /* Zone 3: Expenses — warm receipt/spending */
  .zone-expenses{background:linear-gradient(180deg,#14100A 0%,#1A1410 30%,#1C1610 60%,#12100C 100%);padding-bottom:80px}
  .zone-expenses::before{content:'';position:absolute;inset:0;z-index:0;opacity:.1;
    background:radial-gradient(ellipse 500px 400px at 70% 40%,rgba(246,192,66,.15),transparent),
    radial-gradient(ellipse 400px 300px at 30% 70%,rgba(248,113,113,.1),transparent)}

  /* Zone titles */
  .zone-header{display:flex;align-items:center;gap:14px;margin-bottom:32px}
  .zone-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;backdrop-filter:blur(8px)}
  .zone-title{font-size:13px;text-transform:uppercase;letter-spacing:2px;font-weight:600}
  .zone-subtitle{font-size:11px;color:var(--text-3);letter-spacing:.5px;margin-top:2px}

  /* Brand */
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:32px;flex-wrap:wrap;padding-top:8px}
  .brand-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--emerald-soft),var(--bg-raised));border:1px solid var(--emerald);display:flex;align-items:center;justify-content:center;color:var(--emerald);font-weight:700;font-size:17px;letter-spacing:-.5px;box-shadow:0 0 25px rgba(52,211,153,.2);animation:iconGlow 3s ease-in-out infinite}
  @keyframes iconGlow{0%,100%{box-shadow:0 0 20px rgba(52,211,153,.15)}50%{box-shadow:0 0 35px rgba(52,211,153,.3)}}
  .brand h1{font-size:24px;font-weight:700;letter-spacing:-.6px;color:var(--text-1)}
  .brand h1 span{color:var(--emerald)}
  .brand-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .live-clock{font-size:12px;color:var(--text-3);font-family:'SF Mono','Consolas',monospace;display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:8px;background:rgba(20,26,35,.7);border:1px solid var(--border);backdrop-filter:blur(8px)}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:livePulse 2s ease-in-out infinite}
  @keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--emerald)}50%{opacity:.4;box-shadow:0 0 10px var(--emerald)}}
  .sync-badge{font-size:11px;padding:4px 10px;border-radius:6px;background:rgba(20,26,35,.7);border:1px solid var(--border);color:var(--text-3);display:flex;align-items:center;gap:6px;backdrop-filter:blur(8px)}
  .sync-badge .pulse{width:6px;height:6px;border-radius:50%;background:var(--text-3)}
  .sync-badge.ok .pulse{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
  .sync-badge.ok{color:var(--emerald);border-color:var(--emerald-soft)}
  .sync-badge.err{color:var(--red);border-color:var(--red-soft)}
  .action-btn{width:36px;height:36px;border-radius:10px;background:rgba(20,26,35,.7);border:1px solid var(--border);color:var(--text-3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px)}
  .action-btn:hover{border-color:var(--border-hover);color:var(--text-2);background:var(--bg-hover)}
  .add-btn{background:rgba(6,78,59,.5);border-color:rgba(52,211,153,.3);color:var(--emerald)}
  .add-btn:hover{background:var(--emerald);color:var(--bg-deep);border-color:var(--emerald)}

  /* Cards */
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s,transform .2s;backdrop-filter:blur(12px)}
  .card:hover{border-color:var(--border-hover);box-shadow:0 8px 30px rgba(0,0,0,.3);transform:translateY(-2px)}

  /* Metric strip */
  .metric-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:8px}
  .metric-card{composes:card}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .mc-emerald::before{background:linear-gradient(90deg,var(--emerald),transparent)}
  .mc-amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
  .mc-indigo::before{background:linear-gradient(90deg,var(--indigo),transparent)}
  .mc-cyan::before{background:linear-gradient(90deg,var(--cyan),transparent)}
  .metric-label{font-size:11.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .metric-value{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1.1}
  .metric-value.green{color:var(--emerald)}.metric-value.amber-c{color:var(--amber)}.metric-value.indigo-c{color:var(--indigo)}.metric-value.cyan-c{color:var(--cyan)}
  .metric-sub{font-size:12px;color:var(--text-2);margin-top:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .tag{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:600}
  .tag-green{background:var(--emerald-glow);color:var(--emerald)}
  .tag-red{background:var(--red-glow);color:var(--red)}
  .sparkline-wrap{position:absolute;bottom:14px;right:16px;width:90px;height:36px}
  .sparkline-wrap svg{width:100%;height:100%}

  /* Panels */
  .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;position:relative;transition:border-color .3s,box-shadow .3s;backdrop-filter:blur(12px)}
  .panel:hover{border-color:var(--border-hover);box-shadow:0 4px 20px rgba(0,0,0,.2)}
  .panel-title{font-size:13px;color:var(--text-2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .panel-title .dot{width:7px;height:7px;border-radius:50%}
  .dot-emerald{background:var(--emerald)}.dot-indigo{background:var(--indigo)}.dot-amber{background:var(--amber)}.dot-cyan{background:var(--cyan)}

  /* Dual Ring */
  .ring-container{display:flex;align-items:center;gap:40px}
  .ring-svg-wrap{position:relative;width:280px;height:280px;flex-shrink:0}
  .ring-svg-wrap svg{width:100%;height:100%}
  .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
  .ring-center-val{font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--text-1)}
  .ring-center-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}
  .ring-legend{flex:1;min-width:0}
  .legend-item{display:flex;align-items:center;gap:12px;padding:10px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:6px}
  .legend-item:last-child{border-bottom:none}
  .legend-item:hover,.legend-item.active{background:var(--bg-hover)}
  .legend-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .legend-name{flex:1;font-size:13.5px;color:var(--text-2);min-width:0}
  .legend-name .he{font-size:11px;color:var(--text-3);margin-left:6px}
  .legend-vals{text-align:right;flex-shrink:0}
  .legend-cur{font-size:14px;font-weight:600;color:var(--text-1)}
  .legend-delta{font-size:11px;font-weight:600}
  .legend-delta.pos{color:var(--red)}.legend-delta.neg{color:var(--emerald)}
  .ring-tooltip{position:absolute;background:var(--bg-raised);border:1px solid var(--border-hover);border-radius:8px;padding:12px 16px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;white-space:nowrap;font-size:12.5px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .ring-tooltip.visible{opacity:1}
  .tt-cat{font-weight:600;color:var(--text-1);margin-bottom:6px}
  .tt-row{display:flex;justify-content:space-between;gap:20px;color:var(--text-2);line-height:1.7}
  .tt-row span:last-child{font-weight:600;color:var(--text-1)}
  .tt-delta{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-weight:700}
  .ring-labels{display:flex;gap:16px;margin-top:16px;font-size:11px;color:var(--text-3)}
  .ring-labels span{display:flex;align-items:center;gap:6px}

  /* Runway */
  .runway-display{display:flex;align-items:flex-end;gap:20px}
  .runway-months{font-size:56px;font-weight:800;letter-spacing:-3px;line-height:1}
  .runway-months .unit{font-size:18px;font-weight:500;color:var(--text-2);letter-spacing:0}
  .runway-detail{flex:1}
  .runway-detail p{font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:14px}
  .runway-bar-track{height:8px;background:var(--bg-raised);border-radius:4px;overflow:hidden;margin-bottom:8px}
  .runway-bar-fill{height:100%;border-radius:4px;transition:width 1s ease-out}
  .runway-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3)}
  .stat-row{margin-top:8px;padding:14px 16px;background:rgba(27,35,49,.6);border-radius:8px;display:flex;justify-content:space-between;font-size:12.5px}
  .stat-row .lbl{color:var(--text-3)}.stat-row .val{color:var(--text-1);font-weight:600}

  /* Cash flow bars */
  .cf-chart{display:flex;align-items:flex-end;gap:16px;height:180px;padding-top:10px}
  .cf-month{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .cf-bars{display:flex;gap:4px;align-items:flex-end;height:140px}
  .cf-bar{width:24px;border-radius:4px 4px 0 0;transition:height .8s ease-out;position:relative}
  .cf-bar.income{background:var(--emerald);opacity:.85}
  .cf-bar.expense{background:var(--red);opacity:.7}
  .cf-bar:hover{opacity:1}
  .cf-bar-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
  .cf-bar:hover .cf-bar-label{opacity:1}
  .cf-month-label{font-size:11px;color:var(--text-3);letter-spacing:.5px}

  /* Income zone - candlestick canvas */
  #candlestickBg{position:absolute;inset:0;z-index:0;opacity:.18;pointer-events:none}

  /* Quick Entry */
  .entry-tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(27,35,49,.6);border-radius:8px;padding:3px}
  .entry-tab{flex:1;padding:8px 16px;border-radius:6px;border:none;background:transparent;color:var(--text-3);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
  .entry-tab.active{background:var(--bg-card);color:var(--text-1);box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .entry-form{display:none}.entry-form.active{display:block}
  .quick-input{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end}
  .quick-input .fi{flex:1}
  .quick-input .fi label{display:block;font-size:11px;color:var(--text-3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .quick-input .fi input,.quick-input .fi select{width:100%;padding:8px 12px;background:rgba(27,35,49,.6);border:1px solid var(--border);border-radius:8px;color:var(--text-1);font-size:13px;outline:none;transition:border .2s}
  .quick-input .fi input:focus,.quick-input .fi select:focus{border-color:var(--indigo)}
  .quick-input .fi input[type="number"]{-moz-appearance:textfield}
  .quick-input .fi input::-webkit-outer-spin-button,.quick-input .fi input::-webkit-inner-spin-button{-webkit-appearance:none}
  .submit-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--emerald);background:var(--emerald-soft);color:var(--emerald);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;height:37px}
  .submit-btn:hover{background:var(--emerald);color:var(--bg-deep)}
  .recent-entries{margin-top:16px}
  .recent-title{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .recent-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(27,35,49,.6);border-radius:8px;margin-bottom:4px;font-size:12.5px;animation:slideIn .3s ease-out}
  @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
  .recent-item .ri-cat{width:8px;height:8px;border-radius:3px;flex-shrink:0}
  .recent-item .ri-desc{flex:1;color:var(--text-2)}
  .recent-item .ri-amount{font-weight:600;color:var(--text-1)}

  /* Modals */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:#141A23;border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:520px;position:relative;animation:modalIn .2s ease-out}
  @keyframes modalIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text-1)}
  .modal label{display:block;font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .modal input[type="text"],.modal input[type="number"],.modal select{width:100%;padding:10px 14px;background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;color:var(--text-1);font-size:14px;outline:none;transition:border .2s}
  .modal input:focus,.modal select:focus{border-color:var(--indigo)}
  .modal .btn-row{display:flex;gap:10px;margin-top:20px}
  .modal .btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .2s}
  .btn-primary{background:var(--emerald-soft);border-color:var(--emerald)!important;color:var(--emerald)}
  .btn-primary:hover{background:var(--emerald);color:var(--bg-deep)}
  .btn-ghost{background:transparent;border-color:var(--border)!important;color:var(--text-2)}
  .btn-ghost:hover{border-color:var(--border-hover)!important}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-3);cursor:pointer;font-size:18px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{margin-bottom:14px}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-raised);border:1px solid var(--emerald);border-radius:10px;padding:12px 24px;font-size:13px;color:var(--emerald);z-index:200;transition:transform .3s ease-out;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,.4);backdrop-filter:blur(8px)}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* Zone divider */
  .zone-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border-hover),transparent);margin:0;opacity:.5}

  /* Mobile */
  @media(max-width:900px){
    .metric-strip{grid-template-columns:repeat(2,1fr)}
    .panel-grid{grid-template-columns:1fr}
    .ring-container{flex-direction:column}
    .ring-svg-wrap{width:240px;height:240px;margin:0 auto}
    .runway-display{flex-direction:column;align-items:flex-start}
    .runway-months{font-size:44px}
    .cf-bar{width:18px}
    .quick-input{flex-wrap:wrap}
  }
  @media(max-width:540px){
    .metric-strip{grid-template-columns:1fr}
    .zone{padding:24px 0}
    .zone-inner{padding:0 14px}
    .ring-svg-wrap{width:200px;height:200px}
    .brand h1{font-size:18px}
    .metric-value{font-size:24px}
    .form-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div id="app"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <h2>Settings</h2>
    <div class="form-group">
      <label>Google Apps Script URL</label>
      <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/...../exec">
      <p style="font-size:11px;color:var(--text-3);margin-top:8px;line-height:1.5">Data syncs automatically to your Google Sheet.</p>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="saveSettings">Save &amp; Sync</button>
      <button class="btn btn-ghost" id="cancelSettings">Cancel</button>
    </div>
  </div>
</div>

<!-- Add Month Modal -->
<div class="modal-overlay" id="addMonthModal">
  <div class="modal">
    <button class="modal-close" id="addMonthClose">&times;</button>
    <h2>Add / Edit Month</h2>
    <div class="form-group">
      <label>Month</label>
      <select id="amMonth"></select>
    </div>
    <div class="form-group"><label>Income (₪)</label><input type="number" id="amIncome" placeholder="0"></div>
    <div class="form-grid">
      <div class="form-group"><label>Food (₪)</label><input type="number" id="amFood" placeholder="0"></div>
      <div class="form-group"><label>Housing (₪)</label><input type="number" id="amHousing" placeholder="0"></div>
      <div class="form-group"><label>Investments (₪)</label><input type="number" id="amInvest" placeholder="0"></div>
      <div class="form-group"><label>Savings (₪)</label><input type="number" id="amSavings" placeholder="0"></div>
      <div class="form-group"><label>Car (₪)</label><input type="number" id="amCar" placeholder="0"></div>
      <div class="form-group"><label>Telecom (₪)</label><input type="number" id="amTelecom" placeholder="0"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Net Worth (₪)</label><input type="number" id="amNetWorth" placeholder="0"></div>
      <div class="form-group"><label>Liquid Savings (₪)</label><input type="number" id="amLiquid" placeholder="0"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="amSave">Save Month</button>
      <button class="btn btn-ghost" id="amCancel">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const CATS=[
    {key:'food',name:'Food & Groceries',he:'מזון',color:'#34D399'},
    {key:'housing',name:'Housing & Utilities',he:'דיור',color:'#818CF8'},
    {key:'invest',name:'Investments & Wealth',he:'השקעות',color:'#F6C042'},
    {key:'savings',name:'Savings',he:'חיסכון',color:'#22D3EE'},
    {key:'car',name:'Car & Transport',he:'רכב',color:'#FB923C'},

  function setSyncStatus(s,t){const b=document.getElementById('syncBadge');if(!b)return;b.className='sync-badge '+s;b.querySelector('.sync-text').textContent=t}

  const fmt=n=>'₪'+n.toLocaleString('en-IL');

  function totalExp(d){return Object.values(d.expenses).reduce((a,b)=>a+b,0)}

  function sparkSVG(data,color,w,h){
    w=w||90;h=h||36;const vals=data.map(d=>d.value),mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
    const pts=vals.map((v,i)=>{const x=(i/(vals.length-1))*w,y=h-4-((v-mn)/range)*(h-8);return x+','+y});
    const gid='sg'+Math.random().toString(36).slice(2,6);
    return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">'+
      '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".3"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
      '<polygon points="0,'+h+' '+pts.join(' ')+' '+w+','+h+'" fill="url(#'+gid+')"/>'+
      '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'+
      '<circle cx="'+pts[pts.length-1].split(',')[0]+'" cy="'+pts[pts.length-1].split(',')[1]+'" r="2.5" fill="'+color+'"/></svg>';
  }
  function ringArcs(data,r,w,cx,cy,prefix){
    const total=Object.values(data).reduce((a,b)=>a+b,0);let angle=-90,paths='';
    CATS.forEach(cat=>{const val=data[cat.key],pct=val/total,sweep=pct*360,gap=2,sA=angle+gap/2,eA=angle+sweep-gap/2;
      if(sweep>gap){const sr=sA*Math.PI/180,er=eA*Math.PI/180,x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr),x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er),large=sweep-gap>180?1:0;
        paths+='<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+'" fill="none" stroke="'+cat.color+'" stroke-width="'+w+'" stroke-linecap="round" data-cat="'+cat.key+'" data-ring="'+prefix+'" style="opacity:.85;transition:opacity .2s,stroke-width .2s;cursor:pointer"/>';}
      angle+=sweep});return paths;
  }
  function animateValue(el,start,end,duration,prefix,suffix){
    prefix=prefix||'';suffix=suffix||'';const range=end-start;let startTime=null;
    function step(ts){if(!startTime)startTime=ts;const p=Math.min((ts-startTime)/duration,1),ease=1-Math.pow(1-p,3);
      el.textContent=prefix+Math.round(start+range*ease).toLocaleString('en-IL')+suffix;if(p<1)requestAnimationFrame(step)}
    requestAnimationFrame(step);
  }

  function drawCandlesticks(canvasId){
    const canvas=document.getElementById(canvasId);if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.parentElement.offsetWidth,H=canvas.parentElement.offsetHeight;
    canvas.width=W;canvas.height=H;
    const count=Math.floor(W/18);
    let price=100+Math.random()*50;
    for(let i=0;i<count;i++){
      const open=price,change=(Math.random()-.48)*8;price+=change;
      const close=price,high=Math.max(open,close)+Math.random()*5,low=Math.min(open,close)-Math.random()*5;
      const bull=close>open,x=i*18+9,bw=8;
      const scale=H/80,base=H*.1;
      const oY=H-base-(open-60)*scale,cY=H-base-(close-60)*scale,hY=H-base-(high-60)*scale,lY=H-base-(low-60)*scale;
      ctx.strokeStyle=bull?'rgba(52,211,153,.6)':'rgba(248,113,113,.5)';
      ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,hY);ctx.lineTo(x,lY);ctx.stroke();
      ctx.fillStyle=bull?'rgba(52,211,153,.25)':'rgba(248,113,113,.2)';
      ctx.fillRect(x-bw/2,Math.min(oY,cY),bw,Math.abs(cY-oY)||1);
    }
  }

      const l=ms[d.getMonth()]+' '+d.getFullYear();const o=document.createElement('option');

        document.getElementById('amCar').value=m.expenses.car||0;document.getElementById('amTelecom').value=m.expenses.telecom||0;
      }else{['amIncome','amFood','amHousing','amInvest','amSavings','amCar','amTelecom'].forEach(id=>document.getElementById(id).value='')}
      const nw=STATE.netWorth.find(n=>n.month===s.split(' ')[0]);

        expenses:{food:parseFloat(document.getElementById('amFood').value)||0,housing:parseFloat(document.getElementById('amHousing').value)||0,
          invest:parseFloat(document.getElementById('amInvest').value)||0,savings:parseFloat(document.getElementById('amSavings').value)||0,
          car:parseFloat(document.getElementById('amCar').value)||0,telecom:parseFloat(document.getElementById('amTelecom').value)||0}};
      const ms2=s.split(' ')[0],nwV=parseFloat(document.getElementById('amNetWorth').value)||0;
      const nwI=STATE.netWorth.findIndex(n=>n.month===ms2);
      if(nwI>=0)STATE.netWorth[nwI].value=nwV;else STATE.netWorth.push({month:ms2,value:nwV});
      STATE.liquidSavings=parseFloat(document.getElementById('amLiquid').value)||STATE.liquidSavings;
      const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const sorted=Object.entries(STATE.months).sort((a,b)=>{const[mA,yA]=a[0].split(' '),[mB,yB]=b[0].split(' ');return(+yA-+yB)||(mo.indexOf(mA)-mo.indexOf(mB))});
      STATE.months=Object.fromEntries(sorted);
      saveLocal();syncToCloud();modal.classList.remove('open');showToast('Month saved: '+s);render()});
  }

  function bindRingInteractions(cur,prev,curMonth,prevMonth){
    const chart=document.getElementById('ringChart'),tooltip=document.getElementById('ringTooltip'),legends=document.querySelectorAll('.legend-item');
    if(!chart)return;
    function highlight(k){chart.querySelectorAll('path').forEach(p=>{p.style.opacity=p.dataset.cat===k?'1':'.25';
      p.style.strokeWidth=p.dataset.cat===k?(p.dataset.ring==='cur'?'30':'26'):(p.dataset.ring==='cur'?'26':'22')});
      legends.forEach(li=>li.classList.toggle('active',li.dataset.cat===k))}
    function reset(){chart.querySelectorAll('path').forEach(p=>{p.style.opacity='.85';p.style.strokeWidth=p.dataset.ring==='cur'?'26':'22'});
      legends.forEach(li=>li.classList.remove('active'));tooltip.classList.remove('visible')}
    function showTT(k,x,y){const cat=CATS.find(c=>c.key===k),c=cur.expenses[k],p=prev.expenses[k],d=((c-p)/p*100).toFixed(1),up=+d>0;
      tooltip.innerHTML='<div class="tt-cat" style="color:'+cat.color+'">'+cat.name+'</div><div class="tt-row"><span>'+curMonth+':</span><span>'+fmt(c)+'</span></div><div class="tt-row"><span>'+prevMonth+':</span><span>'+fmt(p)+'</span></div><div class="tt-delta" style="color:'+(up?'var(--red)':'var(--emerald)')+'">'+(up?'▲':'▼')+' '+(up?'+':'')+d+'%</div>';
      const wrap=chart.closest('.ring-svg-wrap'),rect=wrap.getBoundingClientRect();
      tooltip.style.left=(x-rect.left+16)+'px';tooltip.style.top=(y-rect.top-30)+'px';tooltip.classList.add('visible')}
    chart.addEventListener('mousemove',e=>{const p=e.target.closest('path[data-cat]');if(p){highlight(p.dataset.cat);showTT(p.dataset.cat,e.clientX,e.clientY)}});
    chart.addEventListener('mouseleave',reset);
    legends.forEach(li=>{li.addEventListener('mouseenter',()=>{highlight(li.dataset.cat);
      const cat=CATS.find(c=>c.key===li.dataset.cat),c=cur.expenses[li.dataset.cat],p=prev.expenses[li.dataset.cat],d=((c-p)/p*100).toFixed(1),up=+d>0;
      tooltip.innerHTML='<div class="tt-cat" style="color:'+cat.color+'">'+cat.name+'</div><div class="tt-row"><span>'+curMonth+':</span><span>'+fmt(c)+'</span></div><div class="tt-row"><span>'+prevMonth+':</span><span>'+fmt(p)+'</span></div><div class="tt-delta" style="color:'+(up?'var(--red)':'var(--emerald)')+'">'+(up?'▲':'▼')+' '+(up?'+':'')+d+'%</div>';
      tooltip.style.left='60px';tooltip.style.top='60px';tooltip.classList.add('visible')});
      li.addEventListener('mouseleave',reset)});
  }

  function bindSettings(){
    const openBtn=document.getElementById('openSettings'),modal=document.getElementById('settingsModal'),urlInput=document.getElementById('gasUrl');
    if(!openBtn)return;
    openBtn.addEventListener('click',()=>{urlInput.value=GAS_URL;modal.classList.add('open')});
    document.getElementById('modalClose').addEventListener('click',()=>modal.classList.remove('open'));
    document.getElementById('cancelSettings').addEventListener('click',()=>modal.classList.remove('open'));
    modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});
    document.getElementById('saveSettings').addEventListener('click',async()=>{
      GAS_URL=urlInput.value.trim();localStorage.setItem('lh_gas_url',GAS_URL);modal.classList.remove('open');
      if(GAS_URL){setSyncStatus('','Syncing...');const loaded=await loadFromCloud();if(!loaded)await syncToCloud()}});
  }

  render();
  if(GAS_URL)loadFromCloud();
})();
</script>
</body>
