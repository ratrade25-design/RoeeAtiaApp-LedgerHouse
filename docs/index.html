<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#070A0F">
<title>LedgerHouse</title>
<style>
:root{
  --bg-0:#070A0F;--bg-1:#0C1017;--bg-2:#121820;--bg-3:#1A2232;--bg-4:#232D3F;
  --border:#1E2736;--border-h:#2A3548;
  --t1:#E6ECF4;--t2:#8B97A8;--t3:#4E5B6E;
  --green:#34D399;--green-d:#064E3B;--green-g:rgba(52,211,153,.12);
  --amber:#F6C042;--amber-d:#713F12;--amber-g:rgba(246,192,66,.10);
  --indigo:#818CF8;--indigo-d:#2E1065;--indigo-g:rgba(129,140,248,.10);
  --red:#F87171;--red-d:#7F1D1D;--red-g:rgba(248,113,113,.10);
  --cyan:#22D3EE;
  --r:10px;--r2:14px;
  font-variant-numeric:tabular-nums;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg-0);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── PIN ── */
#pinScreen{position:fixed;inset:0;z-index:500;background:var(--bg-0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.pin-logo{font-size:48px;font-weight:800;letter-spacing:-2px;color:var(--green)}
.pin-sub{font-size:13px;color:var(--t3);margin-top:-12px}
.pin-dots{display:flex;gap:14px;margin:12px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-h);transition:all .2s}
.pin-dot.filled{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(52,211,153,.4)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-key{height:56px;border-radius:12px;background:var(--bg-2);border:1px solid var(--border);color:var(--t1);font-size:20px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.pin-key:hover{background:var(--bg-3);border-color:var(--border-h)}
.pin-key:active{transform:scale(.95)}
.pin-key.del{font-size:14px;color:var(--t3)}
.pin-key.empty{visibility:hidden;pointer-events:none}
.pin-msg{font-size:12px;height:18px;color:var(--red);text-align:center}
.pin-skip{margin-top:8px;font-size:12px;color:var(--t3);background:none;border:none;cursor:pointer;text-decoration:underline}
.pin-skip:hover{color:var(--t2)}
@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pin-shake{animation:pinShake .4s ease-in-out}

/* ── SHELL ── */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100%}

/* ── SIDEBAR ── */
.sidebar{width:64px;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;flex-shrink:0;z-index:10}
.sb-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--green-d),var(--bg-3));border:1px solid rgba(52,211,153,.3);display:flex;align-items:center;justify-content:center;color:var(--green);font-weight:800;font-size:13px;margin-bottom:20px;box-shadow:0 0 20px rgba(52,211,153,.15)}
.sb-item{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--t3);cursor:pointer;transition:all .2s;position:relative}
.sb-item:hover{background:var(--bg-2);color:var(--t2)}
.sb-item.active{background:rgba(52,211,153,.08);color:var(--green)}
.sb-item.active::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 3px 3px 0;background:var(--green)}
.sb-item svg{width:20px;height:20px}
.sb-bottom{margin-top:auto;display:flex;flex-direction:column;gap:4px;align-items:center}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;scroll-behavior:smooth}

/* ── VIEWS ── */
.view{display:none;min-height:100%}.view.active{display:block}

/* ── HEADER BAR ── */
.topbar{padding:18px 28px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar h2{font-size:20px;font-weight:700;letter-spacing:-.4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-clock{font-size:11px;color:var(--t3);font-family:'SF Mono',Consolas,monospace;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:var(--bg-2);border:1px solid var(--border)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:.4;box-shadow:0 0 10px var(--green)}}
.sync-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--bg-2);border:1px solid var(--border);color:var(--t3);display:flex;align-items:center;gap:5px}
.sync-badge.ok{color:var(--green);border-color:var(--green-d)}
.sync-badge.err{color:var(--red);border-color:var(--red-d)}

/* ── ZONE BACKGROUNDS ── */
.zone{position:relative;padding:36px 0;overflow:hidden}
.zone .zone-inner{opacity:0;transform:translateY(30px);transition:opacity .7s ease-out,transform .7s ease-out}
.zone.visible .zone-inner{opacity:1;transform:translateY(0)}
.zone-inner{max-width:1280px;margin:0 auto;padding:0 28px;position:relative;z-index:2}
.zone-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}

.zone-overview{background:linear-gradient(170deg,#080C14 0%,#0D1220 30%,#111828 60%,#0F1A28 100%)}
.zone-overview::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 60% 40% at 20% 80%,rgba(129,140,248,.06),transparent),
  radial-gradient(ellipse 50% 50% at 80% 20%,rgba(52,211,153,.04),transparent);z-index:0}
.zone-overview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,#0C1A16);z-index:1}

.zone-income{background:linear-gradient(170deg,#0C1A16 0%,#0A1E14 25%,#0D2418 50%,#0C2014 75%,#14201A 100%)}
.zone-income::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 70% 50% at 75% 30%,rgba(52,211,153,.07),transparent),
  radial-gradient(ellipse 40% 60% at 15% 70%,rgba(34,211,238,.04),transparent);z-index:0}
.zone-income::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,#18160E);z-index:1}

.zone-expenses{background:linear-gradient(170deg,#18160E 0%,#1C1810 25%,#201C12 50%,#1A1610 75%,#16140E 100%);padding-bottom:60px}
.zone-expenses::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 50% 50% at 30% 40%,rgba(246,192,66,.06),transparent),
  radial-gradient(ellipse 60% 40% at 80% 70%,rgba(251,146,60,.04),transparent);z-index:0}
.zone-label{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.zone-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;backdrop-filter:blur(8px)}
.zone-title{font-size:12px;text-transform:uppercase;letter-spacing:2px;font-weight:600}
.zone-sub{font-size:11px;color:var(--t3);letter-spacing:.3px;margin-top:1px}

/* ── CARDS ── */
.g{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s,opacity .5s ease-out,transform .5s ease-out;backdrop-filter:blur(8px);opacity:0;transform:translateY(16px)}
.zone.visible .card,.view.active .card{opacity:1;transform:translateY(0)}
.zone.visible .card:nth-child(1){transition-delay:.05s}.zone.visible .card:nth-child(2){transition-delay:.12s}.zone.visible .card:nth-child(3){transition-delay:.19s}.zone.visible .card:nth-child(4){transition-delay:.26s}
.panel{opacity:0;transform:translateY(16px);transition:border-color .3s,box-shadow .3s,opacity .5s ease-out,transform .5s ease-out}
.zone.visible .panel{opacity:1;transform:translateY(0)}
.zone.visible .panel:nth-child(1){transition-delay:.1s}.zone.visible .panel:nth-child(2){transition-delay:.2s}
.card:hover{border-color:var(--border-h);box-shadow:0 6px 24px rgba(0,0,0,.25)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c-green::before{background:linear-gradient(90deg,var(--green),transparent)}
.c-amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
.c-indigo::before{background:linear-gradient(90deg,var(--indigo),transparent)}
.c-cyan::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.c-red::before{background:linear-gradient(90deg,var(--red),transparent)}
.card-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card-val{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.card-sub{font-size:12px;color:var(--t2);margin-top:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600}
.tag-g{background:var(--green-g);color:var(--green)}.tag-r{background:var(--red-g);color:var(--red)}.tag-a{background:var(--amber-g);color:var(--amber)}

/* ── PANEL ── */
.panel{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r2);padding:22px;backdrop-filter:blur(8px)}
.view.active .panel{opacity:1;transform:translateY(0)}
.panel-head{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%}

/* ── RING CHART ── */
.ring-wrap{display:flex;align-items:center;gap:32px}
.ring-svg{position:relative;width:240px;height:240px;flex-shrink:0}
.ring-svg svg{width:100%;height:100%}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-center-v{font-size:22px;font-weight:700;letter-spacing:-.5px}
.ring-center-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.ring-legend{flex:1;min-width:0}
.leg-row{display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;border-radius:6px;transition:background .15s}
.leg-row:last-child{border-bottom:none}
.leg-row:hover{background:var(--bg-3)}
.leg-sw{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.leg-name{flex:1;color:var(--t2)}
.leg-val{font-weight:600;color:var(--t1)}
.leg-d{font-size:11px;font-weight:600;margin-left:6px}
.leg-d.up{color:var(--red)}.leg-d.dn{color:var(--green)}

/* ── BAR CHART ── */
.bars{display:flex;align-items:flex-end;gap:14px;height:160px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-pair{display:flex;gap:3px;align-items:flex-end;height:130px}
.bar{width:22px;border-radius:4px 4px 0 0;transition:height .8s ease-out;position:relative}
.bar.inc{background:var(--green);opacity:.8}.bar.exp{background:var(--red);opacity:.65}
.bar:hover{opacity:1}
.bar-tip{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.bar:hover .bar-tip{opacity:1}
.bar-lbl{font-size:10px;color:var(--t3)}

/* ── RUNWAY ── */
.runway-num{font-size:48px;font-weight:800;letter-spacing:-2px;line-height:1}
.runway-unit{font-size:16px;font-weight:500;color:var(--t2);letter-spacing:0}
.rw-track{height:7px;background:var(--bg-3);border-radius:4px;overflow:hidden;margin:12px 0 6px}
.rw-fill{height:100%;border-radius:4px;transition:width 1s ease-out}
.rw-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--t3)}
.stat-r{display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg-3);border-radius:7px;font-size:12px;margin-top:6px}
.stat-r .l{color:var(--t3)}.stat-r .v{font-weight:600}

/* ── MONTHLY VIEW ── */
.month-nav{display:flex;align-items:center;gap:16px;margin:24px 28px 20px}
.month-nav h2{font-size:22px;font-weight:700;letter-spacing:-.5px;min-width:160px;text-align:center}
.nav-btn{width:36px;height:36px;border-radius:8px;background:var(--bg-2);border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.nav-btn:hover{background:var(--bg-3);border-color:var(--border-h);color:var(--t1)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.month-content{padding:0 28px 40px}
.ed-table{width:100%;border-collapse:collapse}
.ed-table th{text-align:left;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.ed-table td{padding:10px 12px;border-bottom:1px solid rgba(30,39,54,.4);font-size:13.5px;color:var(--t1)}
.ed-table tr:hover{background:rgba(30,39,54,.3)}
.ed-table .cat-sw{display:inline-block;width:8px;height:8px;border-radius:3px;margin-right:8px}
.ed-table .cat-he{font-size:11px;color:var(--t3);margin-left:6px}
.ed-input{background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--t1);font-size:13px;width:110px;outline:none;transition:border .2s;text-align:right}
.ed-input:focus{border-color:var(--indigo)}
.ed-table .total-row{font-weight:700;border-top:2px solid var(--border)}

/* ── ANNUAL VIEW ── */
.annual-content{padding:0 28px 40px}
.annual-bar{display:flex;align-items:flex-end;gap:10px;height:200px}
.annual-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.annual-bar-inner{width:100%;max-width:40px;border-radius:4px 4px 0 0;transition:height .8s ease-out;position:relative}
.annual-bar-inner .bar-tip{top:-18px}
.annual-bar-inner:hover .bar-tip{opacity:1}

/* ── SETTINGS ── */
.settings-content{padding:0 28px 40px;max-width:560px}
.setting-group{margin-bottom:24px}
.setting-group label{display:block;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.setting-input{width:100%;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-size:13px;outline:none;transition:border .2s}
.setting-input:focus{border-color:var(--indigo)}
.setting-note{font-size:11px;color:var(--t3);margin-top:6px;line-height:1.5}
.btn{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .2s}
.btn-g{background:var(--green-d);border-color:rgba(52,211,153,.3);color:var(--green)}
.btn-g:hover{background:var(--green);color:var(--bg-0)}
.btn-o{background:transparent;border-color:var(--border);color:var(--t2)}
.btn-o:hover{border-color:var(--border-h);color:var(--t1)}
.btn-r{background:var(--red-d);border-color:rgba(248,113,113,.3);color:var(--red)}
.btn-r:hover{background:var(--red);color:var(--bg-0)}
.btn-row{display:flex;gap:10px;margin-top:16px}

/* ── QUICK ENTRY ── */
.qe-tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--bg-3);border-radius:7px;padding:3px}
.qe-tab{flex:1;padding:7px;border-radius:5px;border:none;background:transparent;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.qe-tab.active{background:var(--bg-2);color:var(--t1);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.qe-form{display:none}.qe-form.active{display:block}
.qe-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px}
.qe-field{flex:1}
.qe-field label{display:block;font-size:10px;color:var(--t3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.qe-field input,.qe-field select{width:100%;padding:7px 10px;background:var(--bg-3);border:1px solid var(--border);border-radius:7px;color:var(--t1);font-size:12px;outline:none;transition:border .2s}
.qe-field input:focus,.qe-field select:focus{border-color:var(--indigo)}
.qe-submit{padding:7px 16px;border-radius:7px;border:1px solid var(--green);background:var(--green-d);color:var(--green);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;height:33px}
.qe-submit:hover{background:var(--green);color:var(--bg-0)}
.recent-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px}
.recent-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-3);border-radius:6px;margin-bottom:3px;font-size:12px}
.ri-dot{width:6px;height:6px;border-radius:3px;flex-shrink:0}
.ri-desc{flex:1;color:var(--t2)}.ri-amt{font-weight:600}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--bg-1);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:480px;position:relative;animation:mIn .2s ease-out}
@keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.modal-x{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.fg input,.fg select{width:100%;padding:9px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:7px;color:var(--t1);font-size:13px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--indigo)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg-3);border:1px solid var(--green);border-radius:8px;padding:10px 20px;font-size:12px;color:var(--green);z-index:200;transition:transform .3s ease-out;box-shadow:0 6px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── HALO CURSOR ── */
.halo{position:fixed;pointer-events:none;z-index:9999;width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,rgba(52,211,153,.20) 0%,rgba(52,211,153,.08) 35%,transparent 70%);transform:translate(-50%,-50%);transition:opacity .3s}

/* ── RESPONSIVE ── */
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.ring-wrap{flex-direction:column}.ring-svg{width:200px;height:200px;margin:0 auto}.bars{height:130px}.bar{width:16px}}
@media(max-width:540px){.g4{grid-template-columns:1fr}.sidebar{width:52px}.zone-inner,.month-content,.annual-content,.settings-content{padding:0 14px}.card-val{font-size:22px}.month-nav{margin:16px 14px 12px}}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen" style="display:none">
  <div class="pin-logo">LH</div>
  <div class="pin-sub" id="pinLabel">Enter PIN</div>
  <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
  <div class="pin-msg" id="pinMsg"></div>
  <div class="pin-pad" id="pinPad">
    <button class="pin-key" data-k="1">1</button><button class="pin-key" data-k="2">2</button><button class="pin-key" data-k="3">3</button>
    <button class="pin-key" data-k="4">4</button><button class="pin-key" data-k="5">5</button><button class="pin-key" data-k="6">6</button>
    <button class="pin-key" data-k="7">7</button><button class="pin-key" data-k="8">8</button><button class="pin-key" data-k="9">9</button>
    <button class="pin-key empty"></button><button class="pin-key" data-k="0">0</button><button class="pin-key del" data-k="del">&#9003;</button>
  </div>
  <button class="pin-skip" id="pinSkip" style="display:none">Skip</button>
</div>

<!-- APP -->
<div id="app">
<div class="shell">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sb-logo">LH</div>

      <div class="fg"><label>Food</label><input type="number" id="amFood" placeholder="0"></div>

<div class="toast" id="toast"></div>
<div class="halo" id="halo"></div>

<script>
(function(){
const CATS=[
  {key:'food',name:'Food & Groceries',he:'מזון',color:'#34D399'},
  {key:'housing',name:'Housing & Utilities',he:'דיור',color:'#818CF8'},
  {key:'invest',name:'Investments',he:'השקעות',color:'#F6C042'},
  {key:'savings',name:'Savings',he:'חיסכון',color:'#22D3EE'},
  {key:'car',name:'Car & Transport',he:'רכב',color:'#FB923C'},
  {key:'telecom',name:'Telecom',he:'תקשורת',color:'#A78BFA'},
];
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DEFAULT_DATA={
  months:{
    'Jan 2026':{income:20000,expenses:{food:3000,housing:6200,invest:3500,savings:3000,car:2000,telecom:480}},
    'Feb 2026':{income:20500,expenses:{food:3100,housing:6300,invest:3600,savings:3100,car:1900,telecom:460}},
    'Mar 2026':{income:21000,expenses:{food:2900,housing:6400,invest:3800,savings:3200,car:2200,telecom:440}},
    'Apr 2026':{income:21200,expenses:{food:3050,housing:6450,invest:3900,savings:3300,car:2050,telecom:430}},
    'May 2026':{income:21500,expenses:{food:3200,housing:6500,invest:4000,savings:3500,car:2100,telecom:450}},
    'Jun 2026':{income:22000,expenses:{food:2800,housing:6800,invest:4500,savings:3200,car:1900,telecom:420}},
    'Jul 2026':{income:22800,expenses:{food:2950,housing:6700,invest:5000,savings:3800,car:2300,telecom:380}}
  },
  netWorth:[{month:'Jan',value:235000},{month:'Feb',value:242000},{month:'Mar',value:248000},{month:'Apr',value:252000},{month:'May',value:258000},{month:'Jun',value:265000},{month:'Jul',value:273000}],
  liquidSavings:95000,manualEntries:[]
};

let S=loadLocal()||JSON.parse(JSON.stringify(DEFAULT_DATA));
if(!S.manualEntries)S.manualEntries=[];
let GAS=ls('lh_gas')||'https://script.google.com/macros/s/AKfycbwMDQpxmLCiXM62_imOz6p63DwQvT6A7kyJ_59qps8SwrELidbQ4KZQDicUDn1qZlzd/exec';
let curView='dashboard',curMonthIdx=-1;

function ls(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}
function loadLocal(){try{return JSON.parse(ls('lh_state'))}catch(e){return null}}
function save(){ls('lh_state',JSON.stringify(S))}
function toast(m){const t=document.getElementById('toast');t.textContent='✓ '+m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
const fmt=n=>'₪'+n.toLocaleString('en-IL');
const fmtK=n=>n>=1e3?'₪'+(n/1e3).toFixed(0)+'K':fmt(n);
function totE(d){return Object.values(d.expenses).reduce((a,b)=>a+b,0)}
function mKeys(){return Object.keys(S.months)}
function sortMonths(){const sorted=Object.entries(S.months).sort((a,b)=>{const[mA,yA]=a[0].split(' '),[mB,yB]=b[0].split(' ');return(+yA-+yB)||(MO.indexOf(mA)-MO.indexOf(mB))});S.months=Object.fromEntries(sorted)}

async function syncCloud(){
  if(!GAS)return;
  try{await fetch(GAS+'?action=save',{method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain'}});
    setSyncBadge('ok','Synced')}catch(e){setSyncBadge('err','Failed')}
}
async function loadCloud(){
  if(!GAS)return;
  try{const r=await fetch(GAS+'?action=get');const d=await r.json();
    if(d&&d.months){S=d;if(!S.manualEntries)S.manualEntries=[];save();setSyncBadge('ok','Loaded')}}
  catch(e){setSyncBadge('err','Load failed')}
}
function setSyncBadge(s,t){document.querySelectorAll('.sync-badge').forEach(b=>{b.className='sync-badge '+s;b.querySelector('.st').textContent=t})}

// ── PIN ──
async function hashPin(p){const e=new TextEncoder().encode(p);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function initPin(){
  const stored=ls('lh_pin');
  if(!stored){document.getElementById('app').style.display='';return}
  const ps=document.getElementById('pinScreen');ps.style.display='';
  document.getElementById('app').style.display='none';
  let code='',isSet=stored==='new';
  if(isSet){document.getElementById('pinLabel').textContent='Set a 4-digit PIN';document.getElementById('pinSkip').style.display=''}
  document.getElementById('pinSkip').onclick=()=>{ls('lh_pin','');ps.style.display='none';document.getElementById('app').style.display='';renderAll()};
  document.getElementById('pinPad').onclick=async e=>{
    const k=e.target.closest('[data-k]');if(!k)return;
    const v=k.dataset.k;
    if(v==='del'){code=code.slice(0,-1)}else if(code.length<4){code+=v}
    updateDots(code.length);
    if(code.length===4){
      if(isSet){ls('lh_pin',await hashPin(code));ps.style.display='none';document.getElementById('app').style.display='';renderAll();toast('PIN set')}
      else{const h=await hashPin(code);
        if(h===stored){ps.style.display='none';document.getElementById('app').style.display='';renderAll()}
        else{document.getElementById('pinMsg').textContent='Wrong PIN';document.getElementById('pinDots').classList.add('pin-shake');
          setTimeout(()=>{code='';updateDots(0);document.getElementById('pinDots').classList.remove('pin-shake');document.getElementById('pinMsg').textContent=''},600)}}
    }
  };
}
function updateDots(n){document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<n))}

// ── VIEWS ──
function switchView(v){
  curView=v;
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.toggle('active',i.dataset.view===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
  if(v==='dashboard')renderDashboard();
  else if(v==='monthly')renderMonthly();
  else if(v==='annual')renderAnnual();
  else if(v==='settings')renderSettings();
}

// ── DASHBOARD ──
function renderDashboard(){
  const mk=mKeys(),cur=S.months[mk[mk.length-1]],prev=S.months[mk[mk.length-2]];
  const curM=mk[mk.length-1],prevM=mk[mk.length-2];
  const cT=totE(cur),pT=totE(prev),cfr=((cur.income/cT)*100).toFixed(1);
  const nwC=S.netWorth[S.netWorth.length-1].value,nwP=S.netWorth[S.netWorth.length-2].value,nwD=((nwC-nwP)/nwP*100).toFixed(1);
  const avgE=Math.round(mk.reduce((a,k)=>a+totE(S.months[k]),0)/mk.length);
  const rw=(S.liquidSavings/avgE).toFixed(1),surplus=cur.income-cT;
  const barMax=Math.max(...mk.map(k=>Math.max(S.months[k].income,totE(S.months[k]))));
  const last6=mk.slice(-6);

  document.getElementById('v-dashboard').innerHTML=`
  <div class="topbar">
    <h2>Dashboard</h2>
    <div class="topbar-right">
      <div class="live-clock"><span class="live-dot"></span><span id="clock">--:--:--</span></div>
      <div class="sync-badge"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:var(--t3)"></span><span class="st">${GAS?'Ready':'No sync'}</span></div>
      <button class="nav-btn" onclick="openAddMonth()" title="Add/Edit Month" style="background:var(--green-d);border-color:rgba(52,211,153,.3);color:var(--green)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- ZONE 1: OVERVIEW -->
  <div class="zone zone-overview">
    <canvas class="zone-canvas" id="zc0"></canvas>
    <div class="zone-inner">
      <div class="zone-label">
        <div class="zone-icon" style="background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.25)">📊</div>
        <div><div class="zone-title" style="color:var(--indigo)">Overview</div><div class="zone-sub">Financial health at a glance</div></div>
      </div>
      <div class="g g4">
        <div class="card c-green"><div class="card-label">Cash Flow Ratio</div><div class="card-val" style="color:var(--green)" id="a-cfr">0%</div><div class="card-sub">Income / Expenses <span class="tag ${+cfr>=100?'tag-g':'tag-r'}">${+cfr>=100?'Healthy':'Warning'}</span></div></div>
        <div class="card c-indigo"><div class="card-label">Net Worth</div><div class="card-val" style="color:var(--indigo)" id="a-nw">₪0</div><div class="card-sub"><span class="tag ${+nwD>=0?'tag-g':'tag-r'}">${+nwD>=0?'+':''}${nwD}%</span> vs last month</div></div>
        <div class="card c-amber"><div class="card-label">Expenses</div><div class="card-val" style="color:var(--amber)" id="a-exp">₪0</div><div class="card-sub"><span class="tag ${cT>pT?'tag-r':'tag-g'}">${((cT-pT)/pT*100).toFixed(1)}%</span> vs ${prevM}</div></div>
        <div class="card c-cyan"><div class="card-label">Income</div><div class="card-val" style="color:var(--cyan)" id="a-inc">₪0</div><div class="card-sub">Surplus: <strong style="color:${surplus>=0?'var(--green)':'var(--red)'}"> ${fmt(surplus)}</strong></div></div>
      </div>
    </div>
  </div>

  <!-- ZONE 2: INCOME -->
  <div class="zone zone-income">
    <canvas class="zone-canvas" id="zc1"></canvas>
    <div class="zone-inner">
      <div class="zone-label">
        <div class="zone-icon" style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25)">💰</div>
        <div><div class="zone-title" style="color:var(--green)">Income & Growth</div><div class="zone-sub">Revenue streams & wealth building</div></div>
      </div>
      <div class="g g2">
        <div class="panel">
          <div class="panel-head"><span class="dot" style="background:var(--green)"></span>Cash Flow — ${last6.length} Months</div>
          <div class="bars" id="cfBars">
            ${last6.map(m=>{const inc=S.months[m].income,exp=totE(S.months[m]);return`<div class="bar-col"><div class="bar-pair"><div class="bar inc" data-v="${inc}" style="height:0"><span class="bar-tip" style="color:var(--green)">${fmtK(inc)}</span></div><div class="bar exp" data-v="${exp}" style="height:0"><span class="bar-tip" style="color:var(--red)">${fmtK(exp)}</span></div></div><div class="bar-lbl">${m.split(' ')[0]}</div></div>`}).join('')}
          </div>
          <div style="display:flex;gap:14px;margin-top:12px;font-size:10px;color:var(--t3)">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--green);opacity:.8;vertical-align:middle;margin-right:4px"></span>Income</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--red);opacity:.65;vertical-align:middle;margin-right:4px"></span>Expenses</span>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><span class="dot" style="background:var(--amber)"></span>Financial Runway</div>
          <div class="runway-num" style="color:${+rw>6?'var(--green)':+rw>3?'var(--amber)':'var(--red)'}"><span id="a-rw">0</span><span class="runway-unit"> months</span></div>
          <p style="font-size:12px;color:var(--t2);margin:10px 0">Liquid reserves sustain <strong style="color:var(--t1)">${rw} months</strong> of spending if income stops.</p>
          <div class="rw-track"><div class="rw-fill" id="rwBar" style="width:0;background:linear-gradient(90deg,${+rw>6?'var(--green)':'var(--amber)'},transparent)"></div></div>
          <div class="rw-labels"><span>0</span><span style="color:var(--amber)">3 mo</span><span style="color:var(--green)">6 mo</span><span>12</span></div>
          <div class="stat-r"><span class="l">Liquid Savings</span><span class="v">${fmt(S.liquidSavings)}</span></div>
          <div class="stat-r"><span class="l">Avg Monthly Burn</span><span class="v">${fmt(avgE)}</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ZONE 3: EXPENSES -->
  <div class="zone zone-expenses">
    <canvas class="zone-canvas" id="zc2"></canvas>
    <div class="zone-inner">
      <div class="zone-label">
        <div class="zone-icon" style="background:rgba(246,192,66,.08);border:1px solid rgba(246,192,66,.25)">📋</div>
        <div><div class="zone-title" style="color:var(--amber)">Expenses & Entry</div><div class="zone-sub">Where your money goes</div></div>
      </div>
      <div class="g g2">
        <div class="panel">
          <div class="panel-head"><span class="dot" style="background:var(--indigo)"></span>Spending — Dual Ring</div>
          <div class="ring-wrap">
            <div class="ring-svg">
              <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" id="ringChart">
                <circle cx="120" cy="120" r="100" fill="none" stroke="rgba(30,39,54,.5)" stroke-width="20"/>
                <circle cx="120" cy="120" r="72" fill="none" stroke="rgba(30,39,54,.5)" stroke-width="24"/>
                ${ringArcs(prev.expenses,100,20,120,120)+''+ringArcs(cur.expenses,72,24,120,120)}
              </svg>
              <div class="ring-center"><div class="ring-center-v">${fmt(cT)}</div><div class="ring-center-l">${curM}</div></div>
            </div>
            <div class="ring-legend">
              ${CATS.map(c=>{const cv=cur.expenses[c.key],pv=prev.expenses[c.key],d=((cv-pv)/pv*100).toFixed(1),up=+d>0;
                return`<div class="leg-row"><div class="leg-sw" style="background:${c.color}"></div><div class="leg-name">${c.name}</div><div class="leg-val">${fmt(cv)}<span class="leg-d ${up?'up':'dn'}">${up?'+':''}${d}%</span></div></div>`}).join('')}
            </div>
          </div>
          <div style="display:flex;gap:14px;margin-top:12px;font-size:10px;color:var(--t3)">
            <span>Outer: ${prevM}</span><span>Inner: ${curM}</span>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><span class="dot" style="background:var(--cyan)"></span>Quick Entry</div>
          <div class="qe-tabs"><button class="qe-tab active" data-t="exp">Expense</button><button class="qe-tab" data-t="inc">Income</button></div>
          <div class="qe-form active" id="qf-exp">
            <div class="qe-row">
              <div class="qe-field"><label>Amount (₪)</label><input type="number" id="qeAmt" placeholder="0"></div>
              <div class="qe-field"><label>Category</label><select id="qeCat">${CATS.map(c=>'<option value="'+c.key+'">'+c.name+'</option>').join('')}</select></div>
              <button class="qe-submit" id="qeAdd">Add</button>
            </div>
            <div class="qe-row"><div class="qe-field"><label>Note</label><input type="text" id="qeNote" placeholder="Optional"></div></div>
          </div>
          <div class="qe-form" id="qf-inc">
            <div class="qe-row">
              <div class="qe-field"><label>Amount (₪)</label><input type="number" id="qiAmt" placeholder="0"></div>
              <div class="qe-field"><label>Source</label><input type="text" id="qiSrc" placeholder="e.g. Salary"></div>
              <button class="qe-submit" id="qiAdd">Add</button>
            </div>
          </div>
          <div class="recent-title">Recent Entries</div>
          <div id="recentList">
            ${(S.manualEntries||[]).slice(-5).reverse().map(e=>{const c=CATS.find(x=>x.key===e.cat);
              return`<div class="recent-item"><div class="ri-dot" style="background:${c?c.color:'var(--green)'}"></div><div class="ri-desc">${e.note||e.source||(c?c.name:'Income')}</div><div class="ri-amt" style="color:${e.type==='income'?'var(--green)':'var(--t1)'}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div></div>`}).join('')||'<div style="font-size:11px;color:var(--t3);padding:6px 0">No entries yet</div>'}
          </div>
        </div>
      </div>
    </div>
  </div>`;

  setTimeout(()=>{
    animVal(document.getElementById('a-cfr'),0,+cfr,1e3,'','%');
    animVal(document.getElementById('a-nw'),0,nwC,1e3,'₪','');
    animVal(document.getElementById('a-exp'),0,cT,1e3,'₪','');
    animVal(document.getElementById('a-inc'),0,cur.income,1e3,'₪','');
    const rwEl=document.getElementById('a-rw');if(rwEl){let v=0;const tgt=+rw;const iv=setInterval(()=>{v+=.1;if(v>=tgt){v=tgt;clearInterval(iv)}rwEl.textContent=v.toFixed(1)},50)}
    setTimeout(()=>{const rb=document.getElementById('rwBar');if(rb)rb.style.width=Math.min((+rw/12)*100,100)+'%'},400);
    setTimeout(()=>{document.querySelectorAll('.bar[data-v]').forEach(b=>{b.style.height=Math.max((+b.dataset.v/barMax)*120,6)+'px'})},500);
  },200);
  updateClock();
  drawZoneCanvases();
  bindDashboardEvents(cur,prev,curM,prevM);
}

function bindDashboardEvents(cur,prev,curM,prevM){
  document.querySelectorAll('.qe-tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.qe-tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.qe-form').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');document.getElementById('qf-'+t.dataset.t).classList.add('active')});
  const qeAdd=document.getElementById('qeAdd');if(qeAdd)qeAdd.onclick=()=>{
    const a=+document.getElementById('qeAmt').value;if(!a||a<=0)return;
    const cat=document.getElementById('qeCat').value,note=document.getElementById('qeNote').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].expenses[cat]=(S.months[cm].expenses[cat]||0)+a;
    S.manualEntries.push({type:'expense',cat,amount:a,note,ts:Date.now()});save();syncCloud();toast('Expense: '+fmt(a));renderDashboard()};
  const qiAdd=document.getElementById('qiAdd');if(qiAdd)qiAdd.onclick=()=>{
    const a=+document.getElementById('qiAmt').value;if(!a||a<=0)return;
    const src=document.getElementById('qiSrc').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].income+=a;S.manualEntries.push({type:'income',amount:a,source:src,ts:Date.now()});save();syncCloud();toast('Income: +'+fmt(a));renderDashboard()};
}

// ── MONTHLY VIEW ──
function renderMonthly(){
  const mk=mKeys();if(curMonthIdx<0)curMonthIdx=mk.length-1;
  curMonthIdx=Math.max(0,Math.min(mk.length-1,curMonthIdx));
  const key=mk[curMonthIdx],d=S.months[key],tot=totE(d),surp=d.income-tot,savRate=((surp/d.income)*100).toFixed(1);

  document.getElementById('v-monthly').innerHTML=`
  <div class="topbar"><h2>Monthly Detail</h2></div>
  <div class="month-nav">

// ── ANNUAL VIEW ──
function renderAnnual(){
  const mk=mKeys(),year=new Date().getFullYear();
  const yearMonths=mk.filter(k=>k.endsWith(' '+year));
  let totInc=0,totExp=0,totInvest=0,totSave=0;
  yearMonths.forEach(k=>{const d=S.months[k];totInc+=d.income;totExp+=totE(d);totInvest+=(d.expenses.invest||0);totSave+=(d.expenses.savings||0)});
  const net=totInc-totExp;
  const barMax2=Math.max(...yearMonths.map(k=>Math.max(S.months[k].income,totE(S.months[k]))),1);

  document.getElementById('v-annual').innerHTML=`
  <div class="topbar"><h2>Annual Summary — ${year}</h2></div>
  <div class="annual-content" style="margin-top:20px">
    <div class="g g4" style="margin-bottom:24px">
      <div class="card c-cyan"><div class="card-label">Total Income</div><div class="card-val" style="color:var(--cyan)">${fmt(totInc)}</div><div class="card-sub">${yearMonths.length} months</div></div>
      <div class="card c-amber"><div class="card-label">Total Expenses</div><div class="card-val" style="color:var(--amber)">${fmt(totExp)}</div></div>
      <div class="card c-indigo"><div class="card-label">Invested</div><div class="card-val" style="color:var(--indigo)">${fmt(totInvest)}</div><div class="card-sub"><span class="tag tag-a">${((totInvest/totInc)*100).toFixed(1)}% of income</span></div></div>
      <div class="card c-green"><div class="card-label">Saved</div><div class="card-val" style="color:var(--green)">${fmt(totSave)}</div><div class="card-sub"><span class="tag tag-g">${((totSave/totInc)*100).toFixed(1)}% of income</span></div></div>
    </div>
    <div class="card ${net>=0?'c-green':'c-red'}" style="margin-bottom:24px;max-width:320px">
      <div class="card-label">Net Balance</div>
      <div class="card-val" style="color:${net>=0?'var(--green)':'var(--red)'}"> ${net>=0?'+':''}${fmt(net)}</div>
      <div class="card-sub">Income minus all expenses</div>
    </div>
    <div class="g g2">
      <div class="panel">
        <div class="panel-head"><span class="dot" style="background:var(--cyan)"></span>Monthly Breakdown — ${year}</div>
        <div class="bars" style="height:180px">
          ${yearMonths.map(m=>{const inc=S.months[m].income,exp=totE(S.months[m]);return`<div class="bar-col"><div class="bar-pair" style="height:150px"><div class="bar inc" data-v="${inc}" style="height:${Math.max((inc/barMax2)*140,4)}px"><span class="bar-tip" style="color:var(--green)">${fmtK(inc)}</span></div><div class="bar exp" data-v="${exp}" style="height:${Math.max((exp/barMax2)*140,4)}px"><span class="bar-tip" style="color:var(--red)">${fmtK(exp)}</span></div></div><div class="bar-lbl">${m.split(' ')[0]}</div></div>`}).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="dot" style="background:var(--amber)"></span>Category Totals — ${year}</div>
        <table class="ed-table">
          <tr><th>Category</th><th style="text-align:right">Total</th><th style="text-align:right">% of Expenses</th></tr>
          ${CATS.map(c=>{let catTot=0;yearMonths.forEach(k=>catTot+=(S.months[k].expenses[c.key]||0));
            return`<tr><td><span class="cat-sw" style="background:${c.color}"></span>${c.name}</td><td style="text-align:right">${fmt(catTot)}</td><td style="text-align:right;color:var(--t2)">${((catTot/totExp)*100).toFixed(1)}%</td></tr>`}).join('')}
          <tr class="total-row"><td>Total</td><td style="text-align:right">${fmt(totExp)}</td><td style="text-align:right">100%</td></tr>
        </table>
      </div>
    </div>
  </div>`;
}

function fillAddMonth(){
  const s=document.getElementById('amMonth').value;

    CATS.forEach(c=>document.getElementById('am'+c.key.charAt(0).toUpperCase()+c.key.slice(1)).value=m.expenses[c.key]||0)}
  else{['amIncome','amFood','amHousing','amInvest','amSavings','amCar','amTelecom'].forEach(id=>document.getElementById(id).value='')}
  const nw=S.netWorth.find(n=>n.month===document.getElementById('amMonth').value.split(' ')[0]);

// ── HELPERS ──
function ringArcs(data,r,w,cx,cy){
  const total=Object.values(data).reduce((a,b)=>a+b,0);let ang=-90,paths='';
  CATS.forEach(cat=>{const val=data[cat.key],pct=val/total,sweep=pct*360,gap=2;
    if(sweep>gap){const sA=(ang+gap/2)*Math.PI/180,eA=(ang+sweep-gap/2)*Math.PI/180;
      const x1=cx+r*Math.cos(sA),y1=cy+r*Math.sin(sA),x2=cx+r*Math.cos(eA),y2=cy+r*Math.sin(eA),large=sweep-gap>180?1:0;
      paths+=`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${cat.color}" stroke-width="${w}" stroke-linecap="round" style="opacity:.85"/>`}
    ang+=sweep});return paths;
}
function animVal(el,s,e,dur,pre,suf){
  if(!el)return;pre=pre||'';suf=suf||'';const range=e-s;let t0=null;
  function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),ease=1-Math.pow(1-p,3);
    el.textContent=pre+Math.round(s+range*ease).toLocaleString('en-IL')+suf;if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step);
}
function updateClock(){const el=document.getElementById('clock');if(el)el.textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(updateClock,1000);

// ── CANVAS BACKGROUNDS ──
function drawZoneCanvases(){
  drawGrid('zc0');drawCandlesticks('zc1');drawCoins('zc2');
  const main=document.getElementById('mainScroll');
  main.onscroll=()=>{document.querySelectorAll('.zone-canvas').forEach(c=>{
    const rect=c.parentElement.getBoundingClientRect();c.style.transform='translateY('+(rect.top*-.12)+'px)'})};
  observeZones();
}
function observeZones(){
  const root=document.getElementById('mainScroll');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})
  },{root,threshold:0,rootMargin:'0px 0px 100px 0px'});
  document.querySelectorAll('.zone').forEach((z,i)=>{
    if(i===0)setTimeout(()=>z.classList.add('visible'),100);
    else obs.observe(z)});
  root.addEventListener('scroll',function onScroll(){
    const zones=document.querySelectorAll('.zone:not(.visible)');
    zones.forEach(z=>{const r=z.getBoundingClientRect();if(r.top<window.innerHeight+50)z.classList.add('visible')});
    if(!zones.length)root.removeEventListener('scroll',onScroll)},{passive:true});
}
function sizeCanvas(id){const c=document.getElementById(id);if(!c)return null;const p=c.parentElement;c.width=p.offsetWidth;c.height=p.offsetHeight;return c}
function drawGrid(id){
  const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');
  ctx.strokeStyle='rgba(129,140,248,.035)';ctx.lineWidth=.5;
  for(let x=0;x<c.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}
  for(let y=0;y<c.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke()}
  for(let i=0;i<18;i++){const x=Math.random()*c.width,y=Math.random()*c.height,sz=16+Math.random()*28;
    ctx.save();ctx.globalAlpha=.025+Math.random()*.02;ctx.font='bold '+sz+'px system-ui';ctx.fillStyle='#818CF8';ctx.fillText('$',x,y);ctx.restore()}
  for(let i=0;i<6;i++){const x=Math.random()*c.width,y=Math.random()*c.height,r=30+Math.random()*50;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'rgba(129,140,248,.04)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2)}
}
function drawCandlesticks(id){
  const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');
  const count=Math.floor(c.width/14);let price=100+Math.random()*50;
  for(let i=0;i<count;i++){const open=price;price+=(Math.random()-.47)*8;const close=price;
    const high=Math.max(open,close)+Math.random()*6,low=Math.min(open,close)-Math.random()*6;
    const bull=close>open,x=i*14+7,bw=6,scale=c.height/80,base=c.height*.1;
    const oY=c.height-base-(open-60)*scale,cY=c.height-base-(close-60)*scale,hY=c.height-base-(high-60)*scale,lY=c.height-base-(low-60)*scale;
    ctx.strokeStyle=bull?'rgba(52,211,153,.35)':'rgba(248,113,113,.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,hY);ctx.lineTo(x,lY);ctx.stroke();
    ctx.fillStyle=bull?'rgba(52,211,153,.12)':'rgba(248,113,113,.10)';
    ctx.fillRect(x-bw/2,Math.min(oY,cY),bw,Math.abs(cY-oY)||1)}
  ctx.strokeStyle='rgba(52,211,153,.06)';ctx.lineWidth=1.5;ctx.beginPath();
  price=100;for(let i=0;i<count;i++){price+=Math.sin(i*.12)*3.5+.6;
    const y=c.height*.55-price*.7;i===0?ctx.moveTo(i*14,y):ctx.lineTo(i*14,y)}ctx.stroke();
  for(let i=0;i<10;i++){const x=Math.random()*c.width,y=Math.random()*c.height,r=25+Math.random()*45;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'rgba(52,211,153,.05)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2)}
  drawJar(ctx,c.width*.78,c.height*.6,40,60,'rgba(52,211,153,',true);
  drawJar(ctx,c.width*.12,c.height*.75,30,45,'rgba(34,211,238,',false);
}
function drawCoins(id){
  const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');
  for(let i=0;i<30;i++){const x=Math.random()*c.width,y=Math.random()*c.height,r=6+Math.random()*18;
    ctx.save();ctx.globalAlpha=.04+Math.random()*.04;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    const cg=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
    cg.addColorStop(0,'#F6C042');cg.addColorStop(.7,'#D4A030');cg.addColorStop(1,'#B8861E');
    ctx.fillStyle=cg;ctx.fill();
    ctx.strokeStyle='rgba(246,192,66,.08)';ctx.lineWidth=1;ctx.stroke();
    ctx.globalAlpha=.06;ctx.font='bold '+Math.max(r*.8,8)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#FFF';ctx.fillText('₪',x,y);
    ctx.restore()}
  drawJar(ctx,c.width*.85,c.height*.5,35,55,'rgba(246,192,66,',true);
  drawJar(ctx,c.width*.08,c.height*.4,28,42,'rgba(251,146,60,',false);
  for(let i=0;i<5;i++){const x=Math.random()*c.width,y=Math.random()*c.height;
    ctx.save();ctx.globalAlpha=.03;ctx.font='bold '+(30+Math.random()*20)+'px system-ui';ctx.fillStyle='#F6C042';ctx.fillText('$',x,y);ctx.restore()}
}
function drawJar(ctx,cx,cy,w,h,colorBase,showCoins){
  ctx.save();ctx.globalAlpha=.06;
  ctx.beginPath();ctx.moveTo(cx-w,cy-h);ctx.quadraticCurveTo(cx-w-4,cy+h*.4,cx-w+6,cy+h);
  ctx.lineTo(cx+w-6,cy+h);ctx.quadraticCurveTo(cx+w+4,cy+h*.4,cx+w,cy-h);ctx.closePath();
  ctx.fillStyle=colorBase+'.15)';ctx.fill();ctx.strokeStyle=colorBase+'.2)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=colorBase+'.12)';ctx.fillRect(cx-w*.7,cy-h-8,w*1.4,10);
  ctx.strokeStyle=colorBase+'.15)';ctx.strokeRect(cx-w*.7,cy-h-8,w*1.4,10);
  if(showCoins){for(let i=0;i<6;i++){const rx=cx-w*.5+Math.random()*w,ry=cy+h*.2+Math.random()*h*.5,rr=3+Math.random()*5;
    ctx.beginPath();ctx.arc(rx,ry,rr,0,Math.PI*2);ctx.fillStyle=colorBase+'.1)';ctx.fill()}}
  ctx.restore();
}
