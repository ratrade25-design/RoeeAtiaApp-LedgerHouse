<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;font-variant-numeric:tabular-nums;background:#0A0E17;color:#F1F5F9;-webkit-font-smoothing:antialiased}

.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:rgba(201,168,76,.12);border-radius:2px}
.main::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,.25)}

.view{display:none;min-height:100%}.view.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
@keyframes countIn{from{opacity:0;filter:blur(4px)}to{opacity:1;filter:blur(0)}}

.zone .zone-inner{opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
.zone.visible .zone-inner{opacity:1;transform:none}

.card-anim{opacity:0;transform:translateY(12px);transition:all .5s cubic-bezier(.16,1,.3,1)}
.zone.visible .card-anim,.view.active .card-anim{opacity:1;transform:none}
.zone.visible .card-anim:nth-child(1){transition-delay:.06s}
.zone.visible .card-anim:nth-child(2){transition-delay:.12s}
.zone.visible .card-anim:nth-child(3){transition-delay:.18s}
.zone.visible .card-anim:nth-child(4){transition-delay:.24s}

.panel-anim{opacity:0;transform:translateY(14px);transition:all .6s cubic-bezier(.16,1,.3,1)}
.zone.visible .panel-anim,.view.active .panel-anim{opacity:1;transform:none}
.zone.visible .panel-anim:nth-child(1){transition-delay:.1s}
.zone.visible .panel-anim:nth-child(2){transition-delay:.2s}

.zone-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.35}

.bar{transition:height .8s cubic-bezier(.16,1,.3,1)}

.toast{transform:translateX(-50%) translateY(100px);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(-50%) translateY(0)}

.halo{position:fixed;pointer-events:none;z-index:9999;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.06) 0%,rgba(201,168,76,.02) 40%,transparent 70%);transform:translate(-50%,-50%);transition:opacity .3s}

.ring-svg svg path{transition:stroke-dasharray .8s cubic-bezier(.16,1,.3,1)}

input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}

.sb-item.active .sb-bar{opacity:1;transform:scaleY(1)}
</style>
</head>

    <div class="sb-bar absolute left-0 top-3 bottom-3 w-[3px] rounded-r-full bg-gold shadow-[0_0_8px_rgba(201,168,76,0.4)] opacity-0 scale-y-0 transition-all duration-300"></div>
    <svg class="w-5 h-5 relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </div>

    <div class="sb-bar absolute left-0 top-3 bottom-3 w-[3px] rounded-r-full bg-gold shadow-[0_0_8px_rgba(201,168,76,0.4)] opacity-0 scale-y-0 transition-all duration-300"></div>
    <svg class="w-5 h-5 relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
  </div>

  <div class="mt-auto flex flex-col gap-1 items-center">
    <div class="sb-item relative w-11 h-11 rounded-xl flex items-center justify-center text-slate-500 cursor-pointer transition-all duration-300 hover:text-slate-300 hover:bg-white/[0.03] group" data-view="settings">
      <div class="sb-bar absolute left-0 top-3 bottom-3 w-[3px] rounded-r-full bg-gold shadow-[0_0_8px_rgba(201,168,76,0.4)] opacity-0 scale-y-0 transition-all duration-300"></div>
      <svg class="w-5 h-5 relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </div>
</nav>

<div class="main flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth" id="mainScroll">

    <button class="absolute top-5 right-5 w-8 h-8 rounded-lg bg-white/[0.04] border border-white/[0.06] text-slate-400 hover:text-white hover:bg-white/[0.08] transition-all duration-200 flex items-center justify-center text-lg" onclick="closeModal('addMonthModal')">&times;</button>

    <div class="mb-4"><label class="block text-[10px] uppercase tracking-[0.15em] text-slate-500 font-medium mb-2">Income (₪)</label><input type="number" id="amIncome" placeholder="0" class="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-4 py-3 text-slate-100 text-sm outline-none transition-all duration-200 focus:border-gold/30 focus:ring-2 focus:ring-gold/10"></div>
    <div id="amCatFields"></div>

      <div><label class="block text-[10px] uppercase tracking-[0.15em] text-slate-500 font-medium mb-2">Net Worth</label><input type="number" id="amNetWorth" placeholder="0" class="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-4 py-3 text-slate-100 text-sm outline-none transition-all duration-200 focus:border-gold/30 focus:ring-2 focus:ring-gold/10"></div>
      <div><label class="block text-[10px] uppercase tracking-[0.15em] text-slate-500 font-medium mb-2">Liquid Savings</label><input type="number" id="amLiquid" placeholder="0" class="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-4 py-3 text-slate-100 text-sm outline-none transition-all duration-200 focus:border-gold/30 focus:ring-2 focus:ring-gold/10"></div>

<div class="toast fixed bottom-6 left-1/2 bg-brand-800 border border-gold/20 rounded-2xl px-6 py-3.5 text-sm font-medium text-gold z-[200] shadow-2xl shadow-black/50 backdrop-blur-xl" id="toast"></div>
<div class="halo" id="halo"></div>

<script>
(function(){
const DEFAULT_CATS=[
  {key:'food',name:'Food & Groceries',he:'מזון',color:'#34D399'},
  {key:'housing',name:'Housing & Utilities',he:'דיור',color:'#818CF8'},
  {key:'invest',name:'Investments',he:'השקעות',color:'#C9A84C'},
  {key:'savings',name:'Savings',he:'חיסכון',color:'#22D3EE'},
  {key:'car',name:'Car & Transport',he:'רכב',color:'#FB923C'},
  {key:'telecom',name:'Telecom',he:'תקשורת',color:'#A78BFA'},
];
let CATS=JSON.parse(localStorage.getItem('lh_cats')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS));
function saveCats(){localStorage.setItem('lh_cats',JSON.stringify(CATS))}

const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DEFAULT_DATA={
  months:{
    'Jan 2026':{income:20000,expenses:{food:3000,housing:6200,invest:3500,savings:3000,car:2000,telecom:480}},
    'Feb 2026':{income:20500,expenses:{food:3100,housing:6300,invest:3600,savings:3100,car:1900,telecom:460}},
    'Mar 2026':{income:21000,expenses:{food:2900,housing:6400,invest:3800,savings:3200,car:2200,telecom:440}},
    'Apr 2026':{income:21200,expenses:{food:3050,housing:6450,invest:3900,savings:3300,car:2050,telecom:430}},
    'May 2026':{income:21500,expenses:{food:3200,housing:6500,invest:4000,savings:3500,car:2100,telecom:450}},
    'Jun 2026':{income:22000,expenses:{food:2800,housing:6800,invest:4500,savings:3200,car:1900,telecom:420}},
    'Jul 2026':{income:22800,expenses:{food:2950,housing:6700,invest:5000,savings:3800,car:2300,telecom:380}}
  },
  netWorth:[{month:'Jan',value:235000},{month:'Feb',value:242000},{month:'Mar',value:248000},{month:'Apr',value:252000},{month:'May',value:258000},{month:'Jun',value:265000},{month:'Jul',value:273000}],
  liquidSavings:95000,manualEntries:[]
};

let S=loadLocal()||JSON.parse(JSON.stringify(DEFAULT_DATA));
if(!S.manualEntries)S.manualEntries=[];
let GAS=ls('lh_gas')||'https://script.google.com/macros/s/AKfycbwMDQpxmLCiXM62_imOz6p63DwQvT6A7kyJ_59qps8SwrELidbQ4KZQDicUDn1qZlzd/exec';
let curView='dashboard',curMonthIdx=-1;

function ls(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}
function loadLocal(){try{return JSON.parse(ls('lh_state'))}catch(e){return null}}
function save(){ls('lh_state',JSON.stringify(S))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
const fmt=n=>'₪'+n.toLocaleString('en-IL');
const fmtK=n=>n>=1e3?'₪'+(n/1e3).toFixed(0)+'K':fmt(n);
function totE(d){return CATS.reduce((a,c)=>a+(d.expenses[c.key]||0),0)}
function mKeys(){return Object.keys(S.months)}
function sortMonths(){const sorted=Object.entries(S.months).sort((a,b)=>{const[mA,yA]=a[0].split(' '),[mB,yB]=b[0].split(' ');return(+yA-+yB)||(MO.indexOf(mA)-MO.indexOf(mB))});S.months=Object.fromEntries(sorted)}

async function syncCloud(){if(!GAS)return;try{await fetch(GAS+'?action=save',{method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain'}});setSyncBadge('ok','Synced')}catch(e){setSyncBadge('err','Failed')}}
async function loadCloud(){if(!GAS)return;try{const r=await fetch(GAS+'?action=get');const d=await r.json();if(d&&d.months){S=d;if(!S.manualEntries)S.manualEntries=[];save();setSyncBadge('ok','Loaded')}}catch(e){setSyncBadge('err','Load failed')}}
function setSyncBadge(s,t){document.querySelectorAll('.sync-badge').forEach(b=>{b.className='sync-badge flex items-center gap-2 text-[11px] px-3 py-1.5 rounded-lg bg-white/[0.03] border backdrop-blur-xl transition-all duration-300 '+(s==='ok'?'text-emerald-400 border-emerald-500/20':'text-red-400 border-red-500/20');b.querySelector('.st').textContent=t})}

function switchView(v){
  curView=v;
  document.querySelectorAll('.sb-item').forEach(i=>{const a=i.dataset.view===v;i.classList.toggle('active',a);i.classList.toggle('text-gold',a);i.classList.toggle('bg-gold/[0.06]',a);i.classList.toggle('text-slate-500',!a)});
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
  document.getElementById('mainScroll').scrollTop=0;
  if(v==='dashboard')renderDashboard();else if(v==='monthly')renderMonthly();else if(v==='annual')renderAnnual();else renderSettings();
}

function renderDashboard(){
  const mk=mKeys(),cur=S.months[mk[mk.length-1]],prev=S.months[mk[mk.length-2]];
  const curM=mk[mk.length-1],prevM=mk[mk.length-2];
  const cT=totE(cur),pT=totE(prev),cfr=((cur.income/cT)*100).toFixed(1);
  const nwC=S.netWorth[S.netWorth.length-1].value,nwP=S.netWorth[S.netWorth.length-2].value,nwD=((nwC-nwP)/nwP*100).toFixed(1);
  const avgE=Math.round(mk.reduce((a,k)=>a+totE(S.months[k]),0)/mk.length);
  const rw=(S.liquidSavings/avgE).toFixed(1),surplus=cur.income-cT;
  const barMax=Math.max(...mk.map(k=>Math.max(S.months[k].income,totE(S.months[k]))));
  const last6=mk.slice(-6);
  const expDelta=((cT-pT)/pT*100).toFixed(1);

  document.getElementById('v-dashboard').innerHTML=`
  <!-- TOP BAR -->
  <div class="sticky top-0 z-10 px-8 py-5 flex items-center gap-4 flex-wrap bg-brand-900/70 backdrop-blur-2xl border-b border-white/[0.03]">
    <h2 class="text-[22px] font-bold tracking-tight">Dashboard</h2>
    <div class="ml-auto flex items-center gap-3">
      <div class="flex items-center gap-2 text-[11px] text-slate-500 font-mono px-3.5 py-2 rounded-lg bg-white/[0.02] border border-white/[0.04]">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,.5)]" style="animation:pulse 2s ease-in-out infinite"></span>
        <span id="clock">--:--:--</span>
      </div>
      <div class="sync-badge flex items-center gap-2 text-[11px] px-3 py-1.5 rounded-lg bg-white/[0.02] border border-white/[0.04] text-slate-500">
        <span class="w-1 h-1 rounded-full bg-current"></span>
        <span class="st">${GAS?'Ready':'No sync'}</span>
      </div>
      <button onclick="openAddMonth()" class="w-9 h-9 rounded-xl bg-gradient-to-br from-gold/20 to-gold-dark/20 border border-gold/20 text-gold flex items-center justify-center transition-all duration-300 hover:shadow-lg hover:shadow-gold/10 hover:scale-105 hover:border-gold/40">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- ZONE 1: OVERVIEW -->
  <div class="zone relative py-12 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-b from-brand-900 via-[#0D1225] to-[#0E1620]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_70%_50%_at_50%_120%,rgba(201,168,76,0.03),transparent)]"></div>
    <canvas class="zone-canvas" id="zc0"></canvas>
    <div class="zone-inner max-w-[1360px] mx-auto px-8 relative z-[2]">
      <div class="flex items-center gap-4 mb-8">
        <div class="w-11 h-11 rounded-xl bg-gold/[0.06] border border-gold/10 flex items-center justify-center text-lg backdrop-blur-xl">📊</div>
        <div>
          <div class="text-[11px] uppercase tracking-[0.25em] font-semibold text-gold/80">Overview</div>
          <div class="text-[11px] text-slate-500 mt-0.5">Financial health at a glance</div>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <div class="card-anim group relative bg-white/[0.025] backdrop-blur-xl border border-white/[0.04] rounded-2xl p-6 overflow-hidden transition-all duration-300 hover:border-gold/10 hover:bg-white/[0.04] hover:shadow-xl hover:shadow-black/20 hover:-translate-y-0.5">
          <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-emerald-400/40 via-emerald-400/10 to-transparent"></div>
          <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-medium mb-3">Cash Flow Ratio</div>
          <div class="text-[32px] font-extrabold tracking-tight leading-none text-emerald-400" id="a-cfr" style="animation:countIn .6s ease-out">0%</div>
          <div class="text-[12px] text-slate-400 mt-3 flex items-center gap-2">Income / Expenses <span class="text-[10px] font-semibold px-2 py-0.5 rounded-md ${+cfr>=100?'bg-emerald-400/10 text-emerald-400':'bg-red-400/10 text-red-400'}">${+cfr>=100?'Healthy':'Warning'}</span></div>
        </div>
        <div class="card-anim group relative bg-white/[0.025] backdrop-blur-xl border border-white/[0.04] rounded-2xl p-6 overflow-hidden transition-all duration-300 hover:border-gold/10 hover:bg-white/[0.04] hover:shadow-xl hover:shadow-black/20 hover:-translate-y-0.5">
          <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-gold/50 via-gold/10 to-transparent"></div>
          <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-medium mb-3">Net Worth</div>
          <div class="text-[32px] font-extrabold tracking-tight leading-none text-gold" id="a-nw">₪0</div>
          <div class="text-[12px] text-slate-400 mt-3 flex items-center gap-2"><span class="text-[10px] font-semibold px-2 py-0.5 rounded-md ${+nwD>=0?'bg-emerald-400/10 text-emerald-400':'bg-red-400/10 text-red-400'}">${+nwD>=0?'+':''}${nwD}%</span> vs last month</div>
        </div>
        <div class="card-anim group relative bg-white/[0.025] backdrop-blur-xl border border-white/[0.04] rounded-2xl p-6 overflow-hidden transition-all duration-300 hover:border-gold/10 hover:bg-white/[0.04] hover:shadow-xl hover:shadow-black/20 hover:-translate-y-0.5">

function bindDashboardEvents(){
  document.querySelectorAll('.qe-tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.qe-tab').forEach(x=>{x.classList.remove('active','bg-white/[0.05]','text-slate-100','shadow-lg','shadow-black/20','border','border-white/[0.06]');x.classList.add('text-slate-500')});
    document.querySelectorAll('.qe-form').forEach(x=>{x.classList.add('hidden');x.style.display='none'});
    t.classList.add('active','bg-white/[0.05]','text-slate-100','shadow-lg','shadow-black/20','border','border-white/[0.06]');t.classList.remove('text-slate-500');
    const f=document.getElementById('qf-'+t.dataset.t);f.classList.remove('hidden');f.style.display='block'});
  const qeAdd=document.getElementById('qeAdd');if(qeAdd)qeAdd.onclick=()=>{
    const a=+document.getElementById('qeAmt').value;if(!a||a<=0)return;
    const cat=document.getElementById('qeCat').value,note=document.getElementById('qeNote').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].expenses[cat]=(S.months[cm].expenses[cat]||0)+a;
    S.manualEntries.push({type:'expense',cat,amount:a,note,ts:Date.now()});save();syncCloud();toast('Expense added: '+fmt(a));renderDashboard()};
  const qiAdd=document.getElementById('qiAdd');if(qiAdd)qiAdd.onclick=()=>{
    const a=+document.getElementById('qiAmt').value;if(!a||a<=0)return;
    const src=document.getElementById('qiSrc').value,mk2=mKeys(),cm=mk2[mk2.length-1];
    S.months[cm].income+=a;S.manualEntries.push({type:'income',amount:a,source:src,ts:Date.now()});save();syncCloud();toast('Income added: +'+fmt(a));renderDashboard()};
}

function ringArcs(data,r,w,cx,cy){
  const total=CATS.reduce((a,c)=>a+(data[c.key]||0),0);if(!total)return'';let ang=-90,paths='';
  CATS.forEach(cat=>{const val=data[cat.key]||0,pct=val/total,sweep=pct*360,gap=2.5;
    if(sweep>gap){const sA=(ang+gap/2)*Math.PI/180,eA=(ang+sweep-gap/2)*Math.PI/180;
      const x1=cx+r*Math.cos(sA),y1=cy+r*Math.sin(sA),x2=cx+r*Math.cos(eA),y2=cy+r*Math.sin(eA),large=sweep-gap>180?1:0;
      paths+=`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${cat.color}" stroke-width="${w}" stroke-linecap="round" opacity="0.85"/>`}
    ang+=sweep});return paths;
}
function animVal(el,s,e,dur,pre,suf){
  if(!el)return;const range=e-s;let t0=null;
  function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),ease=1-Math.pow(1-p,3);
    el.textContent=(pre||'')+Math.round(s+range*ease).toLocaleString('en-IL')+(suf||'');if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step);
}

function sizeCanvas(id){const c=document.getElementById(id);if(!c)return null;const p=c.parentElement;c.width=p.offsetWidth;c.height=p.offsetHeight;return c}

function drawGrid(id){
  const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');
  ctx.strokeStyle='rgba(201,168,76,.015)';ctx.lineWidth=.5;
  for(let x=0;x<c.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}
  for(let y=0;y<c.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke()}
  for(let i=0;i<3;i++){const x=Math.random()*c.width,y=Math.random()*c.height,r=50+Math.random()*80;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'rgba(201,168,76,.02)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2)}
}
function drawCandlesticks(id){
  const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');
  const count=Math.floor(c.width/14);let price=100+Math.random()*50;
  for(let i=0;i<count;i++){const open=price;price+=(Math.random()-.47)*7;const close=price;
    const high=Math.max(open,close)+Math.random()*5,low=Math.min(open,close)-Math.random()*5;
    const bull=close>open,x=i*14+7,bw=5,scale=c.height/80,base=c.height*.1;
    const oY=c.height-base-(open-60)*scale,cY=c.height-base-(close-60)*scale,hY=c.height-base-(high-60)*scale,lY=c.height-base-(low-60)*scale;
    ctx.strokeStyle=bull?'rgba(52,211,153,.15)':'rgba(248,113,113,.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,hY);ctx.lineTo(x,lY);ctx.stroke();
    ctx.fillStyle=bull?'rgba(52,211,153,.04)':'rgba(248,113,113,.03)';
    ctx.fillRect(x-bw/2,Math.min(oY,cY),bw,Math.abs(cY-oY)||1)}
  drawJar(ctx,c.width*.82,c.height*.55,35,55,'201,168,76');
  drawJar(ctx,c.width*.1,c.height*.65,28,42,'34,211,238');
}
function drawCoins(id){
  const c=sizeCanvas(id);if(!c)return;const ctx=c.getContext('2d');
  for(let i=0;i<18;i++){const x=Math.random()*c.width,y=Math.random()*c.height,r=5+Math.random()*15;
    ctx.save();ctx.globalAlpha=.025+Math.random()*.02;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    const cg=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
    cg.addColorStop(0,'#C9A84C');cg.addColorStop(1,'#6E5B26');ctx.fillStyle=cg;ctx.fill();
    ctx.restore()}
  drawJar(ctx,c.width*.85,c.height*.45,32,50,'201,168,76');
  drawJar(ctx,c.width*.08,c.height*.55,24,38,'201,168,76');
}
function drawJar(ctx,cx,cy,w,h,rgb){
  ctx.save();ctx.globalAlpha=.03;
  ctx.beginPath();ctx.moveTo(cx-w,cy-h);ctx.quadraticCurveTo(cx-w-3,cy+h*.3,cx-w+5,cy+h);
  ctx.lineTo(cx+w-5,cy+h);ctx.quadraticCurveTo(cx+w+3,cy+h*.3,cx+w,cy-h);ctx.closePath();
  ctx.fillStyle=`rgba(${rgb},.1)`;ctx.fill();ctx.strokeStyle=`rgba(${rgb},.08)`;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=`rgba(${rgb},.06)`;ctx.fillRect(cx-w*.6,cy-h-6,w*1.2,8);
  for(let i=0;i<4;i++){const rx=cx-w*.4+Math.random()*w*.8,ry=cy+h*.1+Math.random()*h*.5,rr=2+Math.random()*4;
    ctx.beginPath();ctx.arc(rx,ry,rr,0,Math.PI*2);ctx.fillStyle=`rgba(${rgb},.05)`;ctx.fill()}
  ctx.restore();
}

const halo=document.getElementById('halo');let hx=-100,hy=-100,cx2=-100,cy2=-100;
document.addEventListener('mousemove',e=>{hx=e.clientX;hy=e.clientY});
function animHalo(){cx2+=(hx-cx2)*.1;cy2+=(hy-cy2)*.1;halo.style.left=cx2+'px';halo.style.top=cy2+'px';requestAnimationFrame(animHalo)}
animHalo();
document.addEventListener('mouseleave',()=>halo.style.opacity='0');
document.addEventListener('mouseenter',()=>halo.style.opacity='1');

document.querySelectorAll('.sb-item').forEach(item=>item.onclick=()=>switchView(item.dataset.view));

function renderAll(){if(curView==='dashboard')renderDashboard();else if(curView==='monthly')renderMonthly();else if(curView==='annual')renderAnnual();else renderSettings()}
document.getElementById('app').style.display='block';
renderAll();
if(GAS)loadCloud().then(()=>renderAll());
})();
</script>
