<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080B10">
<title>LedgerHouse</title>
<style>
  :root {
    --bg-deep: #080B10;
    --bg-base: #0D1117;
    --bg-card: #141A23;
    --bg-raised: #1B2331;
    --bg-hover: #212B3A;
    --border: #1E2736;
    --border-hover: #2A3548;
    --text-1: #E2E8F0;
    --text-2: #8B97A8;
    --text-3: #4E5B6E;
    --emerald: #34D399;
    --emerald-soft: #064E3B;
    --emerald-glow: rgba(52,211,153,.12);
    --amber: #F6C042;
    --amber-soft: #713F12;
    --amber-glow: rgba(246,192,66,.10);
    --indigo: #818CF8;
    --indigo-soft: #2E1065;
    --indigo-glow: rgba(129,140,248,.10);
    --red: #F87171;
    --red-soft: #7F1D1D;
    --red-glow: rgba(248,113,113,.10);
    --cyan: #22D3EE;
    --cyan-soft: #083344;
    --radius: 10px;
    --radius-lg: 14px;
    font-variant-numeric: tabular-nums;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--bg-deep);color:var(--text-1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{background:var(--bg-deep);min-height:100vh;min-height:100dvh;overflow-x:hidden}
  .app{max-width:1320px;margin:0 auto;padding:28px 24px 80px}

  /* Brand */
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap}
  .brand-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--emerald-soft),var(--bg-raised));border:1px solid var(--emerald);display:flex;align-items:center;justify-content:center;color:var(--emerald);font-weight:700;font-size:16px;letter-spacing:-.5px;box-shadow:0 0 20px rgba(52,211,153,.15);animation:iconGlow 3s ease-in-out infinite}
  @keyframes iconGlow{0%,100%{box-shadow:0 0 20px rgba(52,211,153,.15)}50%{box-shadow:0 0 30px rgba(52,211,153,.3)}}
  .brand h1{font-size:22px;font-weight:700;letter-spacing:-.6px;color:var(--text-1)}
  .brand h1 span{color:var(--emerald)}
  .brand-right{margin-left:auto;display:flex;align-items:center;gap:10px}

  /* Live clock */
  .live-clock{font-size:12px;color:var(--text-3);font-family:'SF Mono','Consolas',monospace;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:var(--bg-raised);border:1px solid var(--border)}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:livePulse 2s ease-in-out infinite}
  @keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--emerald)}50%{opacity:.4;box-shadow:0 0 8px var(--emerald)}}

  .sync-badge{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--bg-raised);border:1px solid var(--border);color:var(--text-3);display:flex;align-items:center;gap:6px;cursor:default}
  .sync-badge .pulse{width:6px;height:6px;border-radius:50%;background:var(--text-3)}
  .sync-badge.ok .pulse{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
  .sync-badge.ok{color:var(--emerald);border-color:var(--emerald-soft)}
  .sync-badge.err{color:var(--red);border-color:var(--red-soft)}

  /* Action buttons */
  .action-btn{width:34px;height:34px;border-radius:8px;background:var(--bg-raised);border:1px solid var(--border);color:var(--text-3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
  .action-btn:hover{border-color:var(--border-hover);color:var(--text-2)}
  .add-btn{background:var(--emerald-soft);border-color:rgba(52,211,153,.3);color:var(--emerald)}
  .add-btn:hover{background:var(--emerald);color:var(--bg-deep);border-color:var(--emerald)}

  /* Modals */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:520px;position:relative;animation:modalIn .2s ease-out}
  @keyframes modalIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text-1)}
  .modal label{display:block;font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .modal input[type="text"],.modal input[type="number"],.modal select{width:100%;padding:10px 14px;background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;color:var(--text-1);font-size:14px;outline:none;transition:border .2s}
  .modal input:focus,.modal select:focus{border-color:var(--indigo)}
  .modal .btn-row{display:flex;gap:10px;margin-top:20px}
  .modal .btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .2s}
  .btn-primary{background:var(--emerald-soft);border-color:var(--emerald)!important;color:var(--emerald)}
  .btn-primary:hover{background:var(--emerald);color:var(--bg-deep)}
  .btn-ghost{background:transparent;border-color:var(--border)!important;color:var(--text-2)}
  .btn-ghost:hover{border-color:var(--border-hover)!important}
  .btn-danger{background:var(--red-soft);border-color:var(--red)!important;color:var(--red)}
  .btn-danger:hover{background:var(--red);color:var(--bg-deep)}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-3);cursor:pointer;font-size:18px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  .form-group{margin-bottom:14px}
  .form-group:last-child{margin-bottom:0}

  /* Metric strip */
  .metric-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .metric-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s;cursor:pointer}
  .metric-card:hover{border-color:var(--border-hover);box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .metric-card.mc-emerald::before{background:linear-gradient(90deg,var(--emerald),transparent)}
  .metric-card.mc-amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
  .metric-card.mc-indigo::before{background:linear-gradient(90deg,var(--indigo),transparent)}
  .metric-card.mc-cyan::before{background:linear-gradient(90deg,var(--cyan),transparent)}
  .metric-card.mc-emerald:hover::before{box-shadow:0 0 30px var(--emerald-glow)}
  .metric-card.mc-indigo:hover::before{box-shadow:0 0 30px var(--indigo-glow)}
  .metric-label{font-size:11.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .metric-value{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1.1}
  .metric-value.green{color:var(--emerald)}.metric-value.amber-c{color:var(--amber)}.metric-value.indigo-c{color:var(--indigo)}.metric-value.cyan-c{color:var(--cyan)}
  .metric-sub{font-size:12px;color:var(--text-2);margin-top:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .tag{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:600}
  .tag-green{background:var(--emerald-glow);color:var(--emerald)}
  .tag-red{background:var(--red-glow);color:var(--red)}
  .sparkline-wrap{position:absolute;bottom:14px;right:16px;width:90px;height:36px}
  .sparkline-wrap svg{width:100%;height:100%}

  /* Dashboard grid */
  .dashboard{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;position:relative;transition:border-color .3s,box-shadow .3s}
  .panel:hover{border-color:var(--border-hover);box-shadow:0 4px 20px rgba(0,0,0,.2)}
  .panel-full{grid-column:1/-1}
  .panel-title{font-size:13px;color:var(--text-2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .panel-title .dot{width:7px;height:7px;border-radius:50%}
  .dot-emerald{background:var(--emerald)}.dot-indigo{background:var(--indigo)}.dot-amber{background:var(--amber)}.dot-cyan{background:var(--cyan)}

  /* Dual Ring */
  .ring-container{display:flex;align-items:center;gap:40px}
  .ring-svg-wrap{position:relative;width:280px;height:280px;flex-shrink:0}
  .ring-svg-wrap svg{width:100%;height:100%}
  .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
  .ring-center-val{font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--text-1)}
  .ring-center-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}
  .ring-legend{flex:1;min-width:0}
  .legend-item{display:flex;align-items:center;gap:12px;padding:10px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:6px}
  .legend-item:last-child{border-bottom:none}
  .legend-item:hover,.legend-item.active{background:var(--bg-hover)}
  .legend-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .legend-name{flex:1;font-size:13.5px;color:var(--text-2);min-width:0}
  .legend-name .he{font-size:11px;color:var(--text-3);margin-left:6px}
  .legend-vals{text-align:right;flex-shrink:0}
  .legend-cur{font-size:14px;font-weight:600;color:var(--text-1)}
  .legend-delta{font-size:11px;font-weight:600}
  .legend-delta.pos{color:var(--red)}.legend-delta.neg{color:var(--emerald)}
  .ring-tooltip{position:absolute;background:var(--bg-raised);border:1px solid var(--border-hover);border-radius:8px;padding:12px 16px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;white-space:nowrap;font-size:12.5px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .ring-tooltip.visible{opacity:1}
  .tt-cat{font-weight:600;color:var(--text-1);margin-bottom:6px}
  .tt-row{display:flex;justify-content:space-between;gap:20px;color:var(--text-2);line-height:1.7}
  .tt-row span:last-child{font-weight:600;color:var(--text-1)}
  .tt-delta{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-weight:700}

  /* Runway */
  .runway-display{display:flex;align-items:flex-end;gap:20px}
  .runway-months{font-size:56px;font-weight:800;letter-spacing:-3px;line-height:1}
  .runway-months .unit{font-size:18px;font-weight:500;color:var(--text-2);letter-spacing:0}
  .runway-detail{flex:1}
  .runway-detail p{font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:14px}
  .runway-bar-track{height:8px;background:var(--bg-raised);border-radius:4px;overflow:hidden;margin-bottom:8px}
  .runway-bar-fill{height:100%;border-radius:4px;transition:width 1s ease-out}
  .runway-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3)}
  .stat-row{margin-top:8px;padding:14px 16px;background:var(--bg-raised);border-radius:8px;display:flex;justify-content:space-between;font-size:12.5px}
  .stat-row .lbl{color:var(--text-3)}.stat-row .val{color:var(--text-1);font-weight:600}

  /* Cash flow bars */
  .cf-chart{display:flex;align-items:flex-end;gap:16px;height:180px;padding-top:10px}
  .cf-month{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .cf-bars{display:flex;gap:4px;align-items:flex-end;height:140px}
  .cf-bar{width:24px;border-radius:4px 4px 0 0;transition:height .8s ease-out;position:relative}
  .cf-bar.income{background:var(--emerald);opacity:.85}
  .cf-bar.expense{background:var(--red);opacity:.7}
  .cf-bar:hover{opacity:1}
  .cf-bar-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
  .cf-bar:hover .cf-bar-label{opacity:1}
  .cf-month-label{font-size:11px;color:var(--text-3);letter-spacing:.5px}

  /* Manual entry panel */
  .entry-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px}
  .entry-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg-raised);border-radius:8px;padding:3px}
  .entry-tab{flex:1;padding:8px 16px;border-radius:6px;border:none;background:transparent;color:var(--text-3);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
  .entry-tab.active{background:var(--bg-card);color:var(--text-1);box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .entry-form{display:none}.entry-form.active{display:block}
  .quick-input{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end}
  .quick-input .fi{flex:1}
  .quick-input .fi label{display:block;font-size:11px;color:var(--text-3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .quick-input .fi input,.quick-input .fi select{width:100%;padding:8px 12px;background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;color:var(--text-1);font-size:13px;outline:none;transition:border .2s}
  .quick-input .fi input:focus,.quick-input .fi select:focus{border-color:var(--indigo)}
  .quick-input .fi input[type="number"]{-moz-appearance:textfield}
  .quick-input .fi input::-webkit-outer-spin-button,.quick-input .fi input::-webkit-inner-spin-button{-webkit-appearance:none}
  .submit-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--emerald);background:var(--emerald-soft);color:var(--emerald);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;height:37px}
  .submit-btn:hover{background:var(--emerald);color:var(--bg-deep)}

  /* Recent entries */
  .recent-entries{margin-top:16px}
  .recent-title{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .recent-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-raised);border-radius:8px;margin-bottom:4px;font-size:12.5px;animation:slideIn .3s ease-out}
  @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
  .recent-item .ri-cat{width:8px;height:8px;border-radius:3px;flex-shrink:0}
  .recent-item .ri-desc{flex:1;color:var(--text-2)}
  .recent-item .ri-amount{font-weight:600;color:var(--text-1)}
  .recent-item .ri-del{width:20px;height:20px;border-radius:4px;border:none;background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
  .recent-item .ri-del:hover{background:var(--red-soft);color:var(--red)}

  /* Ring labels */
  .ring-labels{display:flex;gap:16px;margin-top:16px;font-size:11px;color:var(--text-3)}
  .ring-labels span{display:flex;align-items:center;gap:6px}

  /* Toast notification */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-raised);border:1px solid var(--emerald);border-radius:10px;padding:12px 24px;font-size:13px;color:var(--emerald);z-index:200;transition:transform .3s ease-out;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* Editable values */
  .editable{cursor:pointer;position:relative;border-bottom:1px dashed transparent;transition:border-color .2s}
  .editable:hover{border-bottom-color:var(--border-hover)}
  .edit-input{background:var(--bg-raised);border:1px solid var(--indigo);border-radius:6px;color:var(--text-1);font-size:inherit;font-weight:inherit;padding:2px 8px;width:120px;outline:none}

  /* Mobile */
  @media(max-width:900px){
    .metric-strip{grid-template-columns:repeat(2,1fr)}
    .dashboard{grid-template-columns:1fr}
    .ring-container{flex-direction:column}
    .ring-svg-wrap{width:240px;height:240px;margin:0 auto}
    .runway-display{flex-direction:column;align-items:flex-start}
    .runway-months{font-size:44px}
    .cf-bar{width:18px}
    .quick-input{flex-wrap:wrap}
  }
  @media(max-width:540px){
    .metric-strip{grid-template-columns:1fr}
    .app{padding:16px 12px 60px}
    .ring-svg-wrap{width:200px;height:200px}
    .brand h1{font-size:18px}
    .metric-value{font-size:24px}
    .form-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <h2>Settings</h2>
    <label>Google Apps Script URL</label>
    <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/...../exec">
    <p style="font-size:11px;color:var(--text-3);margin-top:8px;line-height:1.5">
      Paste the Web App URL from your deployed Google Apps Script.<br>
      Data syncs automatically to your Google Sheet.
    </p>
    <div class="btn-row">
      <button class="btn btn-primary" id="saveSettings">Save &amp; Sync</button>
      <button class="btn btn-ghost" id="cancelSettings">Cancel</button>
    </div>
  </div>
</div>

<!-- Add Month Modal -->
<div class="modal-overlay" id="addMonthModal">
  <div class="modal">
    <button class="modal-close" id="addMonthClose">&times;</button>
    <h2>Add / Edit Month</h2>
    <div class="form-group">
      <label>Month</label>
      <select id="amMonth" style="width:100%;padding:10px 14px;background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;color:var(--text-1);font-size:14px;outline:none"></select>
    </div>
    <div class="form-group">
      <label>Income (₪)</label>
      <input type="number" id="amIncome" placeholder="0">
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Food & Groceries (₪)</label><input type="number" id="amFood" placeholder="0"></div>
      <div class="form-group"><label>Housing & Utilities (₪)</label><input type="number" id="amHousing" placeholder="0"></div>
      <div class="form-group"><label>Investments (₪)</label><input type="number" id="amInvest" placeholder="0"></div>
      <div class="form-group"><label>Savings (₪)</label><input type="number" id="amSavings" placeholder="0"></div>
      <div class="form-group"><label>Car & Transport (₪)</label><input type="number" id="amCar" placeholder="0"></div>
      <div class="form-group"><label>Telecom (₪)</label><input type="number" id="amTelecom" placeholder="0"></div>
    </div>
    <div class="form-group">
      <label>Net Worth (₪)</label>
      <input type="number" id="amNetWorth" placeholder="0">
    </div>
    <div class="form-group">
      <label>Liquid Savings (₪)</label>
      <input type="number" id="amLiquid" placeholder="0">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="amSave">Save Month</button>
      <button class="btn btn-ghost" id="amCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
  const CATS = [
    {key:'food',name:'Food & Groceries',he:'מזון',color:'#34D399'},
    {key:'housing',name:'Housing & Utilities',he:'דיור',color:'#818CF8'},
    {key:'invest',name:'Investments & Wealth',he:'השקעות',color:'#F6C042'},
    {key:'savings',name:'Savings',he:'חיסכון',color:'#22D3EE'},
    {key:'car',name:'Car & Transport',he:'רכב',color:'#FB923C'},
    {key:'telecom',name:'Telecom & Internet',he:'תקשורת ואינטרנט',color:'#A78BFA'},
  ];

  const DEFAULT_DATA = {
    months: {
      'May 2026':{income:21500,expenses:{food:3200,housing:6500,invest:4000,savings:3500,car:2100,telecom:450}},
      'Jun 2026':{income:22000,expenses:{food:2800,housing:6800,invest:4500,savings:3200,car:1900,telecom:420}},
      'Jul 2026':{income:22800,expenses:{food:2950,housing:6700,invest:5000,savings:3800,car:2300,telecom:380}},
    },
    netWorth:[
      {month:'Feb',value:245000},{month:'Mar',value:252000},{month:'Apr',value:248000},
      {month:'May',value:258000},{month:'Jun',value:265000},{month:'Jul',value:273000},
    ],
    liquidSavings: 95000,
    transactions: [],
    manualEntries: [],
  };

  let STATE = loadLocal() || JSON.parse(JSON.stringify(DEFAULT_DATA));
  if(!STATE.manualEntries) STATE.manualEntries = [];
  let GAS_URL = localStorage.getItem('lh_gas_url') || 'https://script.google.com/macros/s/AKfycbwMDQpxmLCiXM62_imOz6p63DwQvT6A7kyJ_59qps8SwrELidbQ4KZQDicUDn1qZlzd/exec';

  function loadLocal(){ try{return JSON.parse(localStorage.getItem('lh_state'))}catch(e){return null} }
  function saveLocal(){ localStorage.setItem('lh_state', JSON.stringify(STATE)); }

  async function syncToCloud(){
    if(!GAS_URL) return false;
    try{
      const r = await fetch(GAS_URL+'?action=save',{method:'POST',body:JSON.stringify(STATE),headers:{'Content-Type':'text/plain'}});
      const d = await r.json();
      setSyncStatus('ok','Synced ' + new Date().toLocaleTimeString());
      return true;
    }catch(e){
      setSyncStatus('err','Sync failed');
      return false;
    }
  }

  async function loadFromCloud(){
    if(!GAS_URL) return false;
    try{
      const r = await fetch(GAS_URL+'?action=get');
      const d = await r.json();
      if(d && d.months){
        STATE = d;
        if(!STATE.manualEntries) STATE.manualEntries = [];
        saveLocal();
        render();
        setSyncStatus('ok','Loaded from cloud');
        return true;
      }
    }catch(e){
      setSyncStatus('err','Load failed');
    }
    return false;
  }

  function setSyncStatus(status, text){
    const badge = document.getElementById('syncBadge');
    if(!badge) return;
    badge.className = 'sync-badge ' + status;
    badge.querySelector('.sync-text').textContent = text;
  }

  function showToast(msg, color){
    const t = document.getElementById('toast');
    t.innerHTML = '<span style="color:'+(color||'var(--emerald)')+'">✓</span> ' + msg;
    t.style.borderColor = color || 'var(--emerald)';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
  }

  const fmt = n => '₪' + n.toLocaleString('en-IL');
  const fmtK = n => n >= 1000 ? '₪' + (n/1000).toFixed(0) + 'K' : fmt(n);
  function totalExp(d){ return Object.values(d.expenses).reduce((a,b)=>a+b,0); }

  function sparkSVG(data, color, w, h){
    w=w||90; h=h||36;
    const vals=data.map(d=>d.value), mn=Math.min(...vals), mx=Math.max(...vals), range=mx-mn||1;
    const pts=vals.map((v,i)=>{
      const x=(i/(vals.length-1))*w, y=h-4-((v-mn)/range)*(h-8);
      return x+','+y;
    });
    const gid='sg'+Math.random().toString(36).slice(2,6);
    return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">'+
      '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0%" stop-color="'+color+'" stop-opacity=".3"/>'+
      '<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/>'+
      '</linearGradient></defs>'+
      '<polygon points="0,'+h+' '+pts.join(' ')+' '+w+','+h+'" fill="url(#'+gid+')"/>'+
      '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'+
      '<circle cx="'+pts[pts.length-1].split(',')[0]+'" cy="'+pts[pts.length-1].split(',')[1]+'" r="2.5" fill="'+color+'"/></svg>';
  }

  function ringArcs(data, r, w, cx, cy, prefix){
    const total=Object.values(data).reduce((a,b)=>a+b,0);
    let angle=-90, paths='';
    CATS.forEach(cat=>{
      const val=data[cat.key], pct=val/total, sweep=pct*360, gap=2;
      const sA=angle+gap/2, eA=angle+sweep-gap/2;
      if(sweep>gap){
        const sr=sA*Math.PI/180, er=eA*Math.PI/180;
        const x1=cx+r*Math.cos(sr), y1=cy+r*Math.sin(sr);
        const x2=cx+r*Math.cos(er), y2=cy+r*Math.sin(er);
        const large=sweep-gap>180?1:0;
        paths+='<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+'" '+
          'fill="none" stroke="'+cat.color+'" stroke-width="'+w+'" stroke-linecap="round" '+
          'data-cat="'+cat.key+'" data-ring="'+prefix+'" style="opacity:.85;transition:opacity .2s,stroke-width .2s;cursor:pointer"/>';
      }
      angle+=sweep;
    });
    return paths;
  }

  function animateValue(el, start, end, duration, prefix, suffix){
    prefix=prefix||''; suffix=suffix||'';
    const range=end-start;
    let startTime=null;
    function step(ts){
      if(!startTime) startTime=ts;
      const progress=Math.min((ts-startTime)/duration,1);
      const ease=1-Math.pow(1-progress,3);
      const current=Math.round(start+range*ease);
      el.textContent=prefix+current.toLocaleString('en-IL')+suffix;
      if(progress<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

          <div class="quick-input">

            <div class="fi"><label>Category</label>
              <select id="qeCat">${CATS.map(c=>'<option value="'+c.key+'">'+c.name+'</option>').join('')}</select>

        animateValue(document.getElementById('anim-inc'),0,cur.income,dur,'₪','');
        const runEl=document.getElementById('anim-runway');
        if(runEl){
          let rf=0; const rt=parseFloat(runway);
          const ri=setInterval(()=>{rf+=0.1;if(rf>=rt){rf=rt;clearInterval(ri)}runEl.textContent=rf.toFixed(1);},50);
        }
      },200);

        const rb=document.getElementById('runwayBar');
        if(rb) rb.style.width=Math.min((+runway/12)*100,100)+'%';
      },400);

        document.querySelectorAll('.cf-bar').forEach(b=>{

  function bindEntryTabs(){
    document.querySelectorAll('.entry-tab').forEach(tab=>{
      tab.addEventListener('click',()=>{
        document.querySelectorAll('.entry-tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.entry-form').forEach(f=>f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('form-'+tab.dataset.tab).classList.add('active');
      });
    });
  }

  function bindQuickEntry(){
    const expBtn=document.getElementById('qeSubmit');
    const incBtn=document.getElementById('qiSubmit');
    if(expBtn) expBtn.addEventListener('click',()=>{
      const amount=parseFloat(document.getElementById('qeAmount').value);
      if(!amount||amount<=0) return;
      const cat=document.getElementById('qeCat').value;
      const note=document.getElementById('qeNote').value;
      const mKeys=Object.keys(STATE.months);
      const curMonth=mKeys[mKeys.length-1];
      STATE.months[curMonth].expenses[cat]=(STATE.months[curMonth].expenses[cat]||0)+amount;
      STATE.manualEntries.push({type:'expense',cat,amount,note,ts:Date.now()});
      saveLocal(); syncToCloud();
      showToast('Expense added: '+fmt(amount)+' → '+CATS.find(c=>c.key===cat).name);
      render();
    });
    if(incBtn) incBtn.addEventListener('click',()=>{
      const amount=parseFloat(document.getElementById('qiAmount').value);
      if(!amount||amount<=0) return;
      const source=document.getElementById('qiSource').value;
      const mKeys=Object.keys(STATE.months);
      const curMonth=mKeys[mKeys.length-1];
      STATE.months[curMonth].income+=amount;
      STATE.manualEntries.push({type:'income',amount,source,ts:Date.now()});
      saveLocal(); syncToCloud();
      showToast('Income added: +'+fmt(amount));
      render();
    });
  }

  function bindAddMonth(){
    const openBtn=document.getElementById('openAddMonth');
    const modal=document.getElementById('addMonthModal');
    const monthSel=document.getElementById('amMonth');
    if(!openBtn) return;

    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now=new Date();
    monthSel.innerHTML='';
    for(let i=-2;i<=6;i++){
      const d=new Date(now.getFullYear(),now.getMonth()+i,1);
      const label=months[d.getMonth()]+' '+d.getFullYear();
      const opt=document.createElement('option');
      opt.value=label; opt.textContent=label;
      if(i===0) opt.selected=true;
      monthSel.appendChild(opt);
    }

    openBtn.addEventListener('click',()=>{
      const sel=monthSel.value;
      if(STATE.months[sel]){
        const m=STATE.months[sel];
        document.getElementById('amIncome').value=m.income;
        document.getElementById('amFood').value=m.expenses.food||0;
        document.getElementById('amHousing').value=m.expenses.housing||0;
        document.getElementById('amInvest').value=m.expenses.invest||0;
        document.getElementById('amSavings').value=m.expenses.savings||0;
        document.getElementById('amCar').value=m.expenses.car||0;
        document.getElementById('amTelecom').value=m.expenses.telecom||0;
      } else {
        ['amIncome','amFood','amHousing','amInvest','amSavings','amCar','amTelecom'].forEach(id=>document.getElementById(id).value='');
      }
      const nwEntry=STATE.netWorth.find(n=>n.month===sel.split(' ')[0]);
      document.getElementById('amNetWorth').value=nwEntry?nwEntry.value:(STATE.netWorth[STATE.netWorth.length-1].value);
      document.getElementById('amLiquid').value=STATE.liquidSavings;
      modal.classList.add('open');
    });

    monthSel.addEventListener('change',()=>{
      const sel=monthSel.value;
      if(STATE.months[sel]){
        const m=STATE.months[sel];
        document.getElementById('amIncome').value=m.income;
        document.getElementById('amFood').value=m.expenses.food||0;
        document.getElementById('amHousing').value=m.expenses.housing||0;
        document.getElementById('amInvest').value=m.expenses.invest||0;
        document.getElementById('amSavings').value=m.expenses.savings||0;
        document.getElementById('amCar').value=m.expenses.car||0;
        document.getElementById('amTelecom').value=m.expenses.telecom||0;
      }
    });

    document.getElementById('addMonthClose').addEventListener('click',()=>modal.classList.remove('open'));
    document.getElementById('amCancel').addEventListener('click',()=>modal.classList.remove('open'));
    modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open');});

    document.getElementById('amSave').addEventListener('click',()=>{
      const sel=monthSel.value;
      const income=parseFloat(document.getElementById('amIncome').value)||0;
      STATE.months[sel]={
        income,
        expenses:{
          food:parseFloat(document.getElementById('amFood').value)||0,
          housing:parseFloat(document.getElementById('amHousing').value)||0,
          invest:parseFloat(document.getElementById('amInvest').value)||0,
          savings:parseFloat(document.getElementById('amSavings').value)||0,
          car:parseFloat(document.getElementById('amCar').value)||0,
          telecom:parseFloat(document.getElementById('amTelecom').value)||0,
        }
      };
      const mShort=sel.split(' ')[0];
      const nwIdx=STATE.netWorth.findIndex(n=>n.month===mShort);
      const nwVal=parseFloat(document.getElementById('amNetWorth').value)||0;
      if(nwIdx>=0) STATE.netWorth[nwIdx].value=nwVal;
      else STATE.netWorth.push({month:mShort,value:nwVal});
      STATE.liquidSavings=parseFloat(document.getElementById('amLiquid').value)||STATE.liquidSavings;

      // sort months chronologically
      const monthOrder=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const sorted=Object.entries(STATE.months).sort((a,b)=>{
        const [mA,yA]=a[0].split(' '), [mB,yB]=b[0].split(' ');
        return (+yA-+yB)||(monthOrder.indexOf(mA)-monthOrder.indexOf(mB));
      });
      STATE.months=Object.fromEntries(sorted);

      saveLocal(); syncToCloud();
      modal.classList.remove('open');
      showToast('Month saved: '+sel);
      render();
    });
  }

  function bindRingInteractions(cur, prev, curMonth, prevMonth){
    const chart=document.getElementById('ringChart');
    const tooltip=document.getElementById('ringTooltip');
    const legends=document.querySelectorAll('.legend-item');
    if(!chart) return;

    function highlight(catKey){
      chart.querySelectorAll('path').forEach(p=>{
        p.style.opacity=p.dataset.cat===catKey?'1':'.25';
        p.style.strokeWidth=p.dataset.cat===catKey?(p.dataset.ring==='cur'?'30':'26'):(p.dataset.ring==='cur'?'26':'22');
      });
      legends.forEach(li=>li.classList.toggle('active',li.dataset.cat===catKey));
    }
    function reset(){
      chart.querySelectorAll('path').forEach(p=>{p.style.opacity='.85';p.style.strokeWidth=p.dataset.ring==='cur'?'26':'22';});
      legends.forEach(li=>li.classList.remove('active'));
      tooltip.classList.remove('visible');
    }
    function showTT(catKey,x,y){
      const cat=CATS.find(c=>c.key===catKey);
      const c=cur.expenses[catKey], p=prev.expenses[catKey];
      const d=((c-p)/p*100).toFixed(1), up=+d>0;
      tooltip.innerHTML='<div class="tt-cat" style="color:'+cat.color+'">'+cat.name+'</div>'+
        '<div class="tt-row"><span>'+curMonth+':</span><span>'+fmt(c)+'</span></div>'+
        '<div class="tt-row"><span>'+prevMonth+':</span><span>'+fmt(p)+'</span></div>'+
        '<div class="tt-delta" style="color:'+(up?'var(--red)':'var(--emerald)')+'">'+(up?'▲':'▼')+' '+(up?'+':'')+d+'% vs last month</div>';
      const wrap=chart.closest('.ring-svg-wrap'), rect=wrap.getBoundingClientRect();
      tooltip.style.left=(x-rect.left+16)+'px'; tooltip.style.top=(y-rect.top-30)+'px';
      tooltip.classList.add('visible');
    }

    chart.addEventListener('mousemove',e=>{
      const p=e.target.closest('path[data-cat]');
      if(p){highlight(p.dataset.cat);showTT(p.dataset.cat,e.clientX,e.clientY);}
    });
    chart.addEventListener('mouseleave',reset);
    legends.forEach(li=>{
      li.addEventListener('mouseenter',()=>{highlight(li.dataset.cat);tooltip.style.left='60px';tooltip.style.top='60px';
        const cat=CATS.find(c=>c.key===li.dataset.cat),c=cur.expenses[li.dataset.cat],p=prev.expenses[li.dataset.cat];
        const d=((c-p)/p*100).toFixed(1),up=+d>0;
        tooltip.innerHTML='<div class="tt-cat" style="color:'+cat.color+'">'+cat.name+'</div>'+
          '<div class="tt-row"><span>'+curMonth+':</span><span>'+fmt(c)+'</span></div>'+
          '<div class="tt-row"><span>'+prevMonth+':</span><span>'+fmt(p)+'</span></div>'+
          '<div class="tt-delta" style="color:'+(up?'var(--red)':'var(--emerald)')+'">'+(up?'▲':'▼')+' '+(up?'+':'')+d+'% vs last month</div>';
        tooltip.classList.add('visible');
      });
      li.addEventListener('mouseleave',reset);
    });
  }

  function bindSettings(){
    const openBtn=document.getElementById('openSettings');
    const modal=document.getElementById('settingsModal');
    const urlInput=document.getElementById('gasUrl');
    if(!openBtn) return;

    openBtn.addEventListener('click',()=>{
      urlInput.value=GAS_URL;
      modal.classList.add('open');
    });
    document.getElementById('modalClose').addEventListener('click',()=>modal.classList.remove('open'));
    document.getElementById('cancelSettings').addEventListener('click',()=>modal.classList.remove('open'));
    modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open');});

    document.getElementById('saveSettings').addEventListener('click',async()=>{
      GAS_URL=urlInput.value.trim();
      localStorage.setItem('lh_gas_url',GAS_URL);
      modal.classList.remove('open');
      if(GAS_URL){
        setSyncStatus('','Syncing...');
        const loaded=await loadFromCloud();
        if(!loaded) await syncToCloud();
      }
    });
  }

  render();
  if(GAS_URL) loadFromCloud();

})();
</script>
</body>
</html>
