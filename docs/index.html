<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#F5F2EB">
<title>LedgerHouse — ניהול הוצאות</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{heebo:['Heebo','sans-serif']}}}}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F2EB;--surface:#FFFFFF;--surface2:#FAF8F3;--border:#E2DED4;--border2:#EBE6DA;
  --text:#2C3630;--text2:#4A4F4B;--text3:#6B706C;--text4:#8E9490;--text5:#C4BFB2;
  --sage:#2E5E4E;--sage-bg:rgba(46,94,78,.07);--sage-border:rgba(46,94,78,.14);
  --copper:#C8956C;--copper-bg:rgba(200,149,108,.09);--copper-border:rgba(200,149,108,.18);
  --income:#3B8C5C;--income-bg:rgba(59,140,92,.08);--expense:#C95D4F;--expense-bg:rgba(201,93,79,.08);
  --warn:#D97706;--warn-bg:rgba(217,119,6,.08);
  --shadow-sm:0 1px 3px rgba(44,54,48,.05);
  --shadow:0 4px 16px rgba(44,54,48,.07);
  --shadow-lg:0 12px 40px rgba(44,54,48,.1);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111513;--surface:#1A1F1C;--surface2:#1E2420;--border:#2A302C;--border2:#232A26;
  --text:#E8E4DD;--text2:#C4C0B8;--text3:#8E9490;--text4:#6B706C;--text5:#4A4F4B;
  --sage:#4A8A72;--sage-bg:rgba(74,138,114,.12);--sage-border:rgba(74,138,114,.22);
  --copper:#DDB892;--copper-bg:rgba(221,184,146,.1);--copper-border:rgba(221,184,146,.18);
  --income:#5CB87A;--income-bg:rgba(92,184,122,.1);--expense:#E07A5F;--expense-bg:rgba(224,122,95,.1);
  --warn:#F59E0B;--warn-bg:rgba(245,158,11,.1);
  --shadow-sm:0 1px 3px rgba(0,0,0,.25);--shadow:0 4px 16px rgba(0,0,0,.3);--shadow-lg:0 12px 40px rgba(0,0,0,.4);
}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;font-variant-numeric:tabular-nums;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.view{display:none}.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:var(--shadow-sm)}
.ff{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);outline:none;font-size:13px;transition:border-color .2s,box-shadow .2s;width:100%;font-family:inherit}
.ff:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-bg)}
.ff::placeholder{color:var(--text5)}
.btn-primary{background:var(--sage);color:#fff;font-weight:700;border:none;border-radius:10px;padding:9px 22px;cursor:pointer;font-size:12px;transition:all .2s;font-family:inherit}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--surface2);color:var(--text2);font-weight:600;border:1px solid var(--border);border-radius:10px;padding:9px 22px;cursor:pointer;font-size:12px;transition:all .2s;font-family:inherit}
.btn-secondary:hover{border-color:var(--sage-border);color:var(--sage)}
.btn-copper{background:var(--copper);color:#fff;font-weight:700;border:none;border-radius:10px;padding:9px 22px;cursor:pointer;font-size:12px;transition:all .2s;font-family:inherit}
.btn-copper:hover{opacity:.9}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:5px;color:var(--text4)}
.toast{transform:translateX(50%) translateY(100px);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(50%) translateY(0)}
.nav-item{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:10px;color:var(--text4);cursor:pointer;transition:all .2s;font-size:13px;font-weight:600}
.nav-item:hover{background:var(--sage-bg);color:var(--sage)}
.nav-item.active{color:var(--sage);background:var(--sage-bg)}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}
select{font-family:inherit}
.cat-chip{cursor:pointer;transition:all .2s}
.cat-chip:hover{border-color:var(--sage)!important;box-shadow:var(--shadow-sm)}
@media(max-width:768px){
  .mob-1{grid-template-columns:1fr!important}
  .mob-p{padding-left:14px!important;padding-right:14px!important}
  .mob-hide{display:none!important}
  .nav-item span{display:none}
}
</style>
</head>
<body class="font-heebo antialiased">

<div id="app" class="min-h-screen flex flex-col">

<header class="sticky top-0 z-40 h-[54px] flex items-center px-5 mob-p border-b" style="border-color:var(--border);background:var(--surface)">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center font-black text-[11px] text-white" style="background:var(--sage)">LH</div>
    <span class="text-[15px] font-extrabold tracking-tight mob-hide">LedgerHouse</span>
  </div>
  <nav class="flex items-center gap-1 mx-auto">
    <div class="nav-item active" data-view="summary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>סיכום</span>
    </div>
    <div class="nav-item" data-view="txns">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>עסקאות</span>
    </div>
    <div class="nav-item" data-view="settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>הגדרות</span>
    </div>
  </nav>
  <div class="flex items-center gap-2">
    <div class="sync-badge flex items-center gap-1.5 text-[10px] px-2.5 py-1.5 rounded-lg mob-hide" style="color:var(--text4);background:var(--surface2);border:1px solid var(--border)">
      <span class="w-[5px] h-[5px] rounded-full" style="background:currentColor"></span><span class="st">מקומי</span>
    </div>
    <button onclick="openImportModal()" class="btn-copper !py-2 !px-4 text-[11px]">ייבוא דוח</button>
  </div>
</header>

<div class="main flex-1" id="mainScroll">
  <div class="view active" id="v-summary"></div>
  <div class="view" id="v-txns"></div>
  <div class="view" id="v-settings"></div>
</div>
</div>

<!-- Add/Edit transaction modal -->
<div class="fixed inset-0 z-[100] items-center justify-center p-5" id="txnModal" style="display:none;background:rgba(0,0,0,.4);backdrop-filter:blur(6px)">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);animation:modalIn .25s ease-out">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold" id="txnModalTitle">עסקה חדשה</h3>
      <button class="w-8 h-8 rounded-lg flex items-center justify-center text-lg" style="background:var(--surface2);border:1px solid var(--border);color:var(--text4)" onclick="closeModal('txnModal')">&times;</button>
    </div>
    <div class="flex gap-1 mb-5 p-1 rounded-xl" style="background:var(--surface2);border:1px solid var(--border2)">
      <button class="tm-type flex-1 py-2 rounded-lg text-[11px] font-bold transition-all" data-type="expense" style="background:var(--expense);color:#fff">הוצאה</button>
      <button class="tm-type flex-1 py-2 rounded-lg text-[11px] font-bold transition-all" data-type="income" style="color:var(--text4)">הכנסה</button>
      <button class="tm-type flex-1 py-2 rounded-lg text-[11px] font-bold transition-all" data-type="refund" style="color:var(--text4)">החזר</button>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <div><label class="lbl">תאריך</label><input type="date" id="tmDate" class="ff" dir="ltr"></div>
      <div><label class="lbl">סכום (₪)</label><input type="number" id="tmAmt" placeholder="0" class="ff" dir="ltr" step="0.01" min="0"></div>
    </div>
    <div class="mb-3"><label class="lbl">בית עסק / תיאור</label><input type="text" id="tmBiz" placeholder="למשל: סופר" class="ff"></div>
    <div class="mb-6" id="tmCatWrap"><label class="lbl">קטגוריה</label><select id="tmCat" class="ff"></select></div>
    <div class="flex gap-3"><button class="btn-primary flex-1" id="tmSave">שמור</button><button class="btn-secondary" onclick="closeModal('txnModal')">בטל</button></div>
  </div>
</div>

<!-- Import modal -->
<div class="fixed inset-0 z-[100] items-center justify-center p-5" id="importModal" style="display:none;background:rgba(0,0,0,.4);backdrop-filter:blur(6px)">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:820px;box-shadow:var(--shadow-lg);max-height:88vh;overflow-y:auto;animation:modalIn .25s ease-out">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold">ייבוא דוח ישראכרט</h3>
      <button class="w-8 h-8 rounded-lg flex items-center justify-center text-lg" style="background:var(--surface2);border:1px solid var(--border);color:var(--text4)" onclick="closeModal('importModal')">&times;</button>
    </div>
    <div id="importArea">
      <label class="block w-full py-12 border-2 border-dashed rounded-2xl cursor-pointer text-center transition-all" id="importDropZone" style="border-color:var(--border);background:var(--surface2)">
        <input type="file" accept=".pdf" id="pdfInput" class="hidden">
        <div class="text-3xl mb-3">📄</div>
        <div class="text-[12px] font-medium" style="color:var(--text3)">לחץ לבחירת קובץ PDF של ישראכרט</div>
        <div class="text-[10px] mt-1" style="color:var(--text5)">או גרור קובץ לכאן · עסקאות שכבר יובאו יסומנו אוטומטית</div>
      </label>
    </div>
    <div id="importLoading" style="display:none" class="text-center py-12">
      <div class="text-2xl mb-3" style="animation:pulse 1.5s infinite">📊</div>
      <div class="text-[12px] font-medium" style="color:var(--sage)">מפענח את הדוח...</div>
    </div>
    <div id="importPreview" style="display:none"></div>
    <div id="importActions" style="display:none" class="flex gap-3 mt-5">
      <button class="btn-primary" id="confirmImport">אשר ייבוא</button>
      <button class="btn-secondary" onclick="closeModal('importModal')">בטל</button>
    </div>
  </div>
</div>

<div class="toast fixed bottom-6 right-1/2 rounded-xl px-6 py-3 text-[13px] font-semibold z-[200]" id="toast" style="background:var(--sage);color:#fff;box-shadow:var(--shadow-lg)"></div>

<script>
(function(){
'use strict';
// ===== Constants =====
const DEFAULT_CATS=[
  {key:'food',he:'מזון וסופר',color:'#3B8C5C'},
  {key:'restaurants',he:'מסעדות וקפה',color:'#F59E0B'},
  {key:'housing',he:'דיור וחשבונות',color:'#6366F1'},
  {key:'car',he:'רכב ותחבורה',color:'#0EA5E9'},
  {key:'shopping',he:'קניות',color:'#EC4899'},
  {key:'health',he:'בריאות',color:'#14B8A6'},
  {key:'telecom',he:'תקשורת ודיגיטל',color:'#8B5CF6'},
  {key:'leisure',he:'פנאי ובילויים',color:'#EF4444'},
  {key:'other',he:'שונות',color:'#94A3B8'},
];
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
function heMonth(k){const p=k.split(' ');return MO_HE[MO.indexOf(p[0])]+' '+p[1]}
function moKeyFromDate(iso){const d=new Date(iso);return MO[d.getMonth()]+' '+d.getFullYear()}
function curMoKey(){const d=new Date();return MO[d.getMonth()]+' '+d.getFullYear()}
function moKeyToNum(k){const p=k.split(' ');return(+p[1])*12+MO.indexOf(p[0])}

// ===== State =====
function ls(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}
const EMPTY={v:3,txns:[],cats:JSON.parse(JSON.stringify(DEFAULT_CATS)),budgets:{},savingsTarget:0,fixed:[],liquidSavings:0};

function migrate(d){
  if(!d)return null;
  if(d.v===3&&Array.isArray(d.txns))return d;
  // old shape (months + manualEntries) -> v3
  const out=JSON.parse(JSON.stringify(EMPTY));
  const oldCats=JSON.parse(ls('lh_cats')||'null');
  if(oldCats)out.cats=oldCats.map(c=>({key:c.key,he:c.he||c.name,color:c.color}));
  (d.manualEntries||[]).forEach((e,i)=>{
    out.txns.push({id:'m'+(e.ts||Date.now())+'_'+i,date:null,month:e.month||curMoKey(),
      type:e.type==='income'?'income':'expense',cat:e.cat||'other',
      biz:(e.note||e.source||'').replace('ישראכרט: ',''),amount:e.amount,src:e.note&&e.note.startsWith('ישראכרט')?'isracard':'manual'});
  });
  if(d.liquidSavings)out.liquidSavings=d.liquidSavings;
  return out;
}

function normalize(d){
  if(!d)return d;
  const valid=new Set((d.cats||[]).map(c=>c.key));
  d.txns.forEach(t=>{if(t.type==='expense'&&(!t.cat||!valid.has(t.cat)))t.cat='other'});
  if(!valid.has('other'))d.cats.push({key:'other',he:'שונות',color:'#94A3B8'});
  return d;
}
let S=normalize(migrate(loadLocal()))||JSON.parse(JSON.stringify(EMPTY));
function loadLocal(){try{return JSON.parse(ls('lh_state'))}catch(e){return null}}
function save(){ls('lh_state',JSON.stringify(S))}
let CATS=S.cats;
let GAS=ls('lh_gas')||'https://script.google.com/macros/s/AKfycbwMDQpxmLCiXM62_imOz6p63DwQvT6A7kyJ_59qps8SwrELidbQ4KZQDicUDn1qZlzd/exec';
let curView='summary',sumMonth=curMoKey(),txFilter={q:'',month:'all',cat:'all',type:'all'};

// ===== Helpers =====
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
const fmt=n=>'₪'+Math.abs(Math.round(n)).toLocaleString('en-IL');
const fmtS=n=>(n<0?'-':'')+fmt(n);
function catOf(k){return CATS.find(c=>c.key===k)||{key:k,he:k,color:'#94A3B8'}}
function txMonths(){const s=new Set(S.txns.map(t=>t.month));s.add(curMoKey());return[...s].sort((a,b)=>moKeyToNum(a)-moKeyToNum(b))}
// expense txns store amount: positive = charge, negative = refund
function monthExpenses(mo){return S.txns.filter(t=>t.month===mo&&t.type==='expense')}
function monthIncome(mo){return S.txns.filter(t=>t.month===mo&&t.type==='income').reduce((a,t)=>a+t.amount,0)}
function monthExpTotal(mo){return monthExpenses(mo).reduce((a,t)=>a+t.amount,0)}
function catTotal(mo,ck){return monthExpenses(mo).filter(t=>t.cat===ck).reduce((a,t)=>a+t.amount,0)}
function fixedTotal(){return(S.fixed||[]).reduce((a,f)=>a+(+f.amount||0),0)}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fpOf(t){return(t.date||'')+'|'+Math.round(Math.abs(t.amount)*100)+'|'+(t.biz||'').replace(/\s/g,'').slice(0,20)}
function existingFps(){return new Set(S.txns.filter(t=>t.src==='isracard').map(fpOf))}

// ===== Cloud sync =====
async function syncCloud(){if(!GAS)return;try{await fetch(GAS+'?action=save',{method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain'}});setSync('ok','מסונכרן')}catch(e){setSync('err','ניתוק')}}
async function loadCloud(){if(!GAS)return;try{const r=await fetch(GAS+'?action=get');const d=await r.json();
  if(d&&(d.v===3||d.months)){const m=normalize(migrate(d));
    if(m&&m.txns.length>=S.txns.length){S=m;CATS=S.cats;save()}
    else if(S.txns.length>m.txns.length){syncCloud()}
    setSync('ok','מסונכרן')}}catch(e){setSync('err','שגיאה')}}
function setSync(s,t){document.querySelectorAll('.sync-badge').forEach(b=>{
  b.style.color=s==='ok'?'var(--income)':'var(--expense)';b.querySelector('.st').textContent=t})}

// ===== Views =====
function switchView(v,keepFilter){
  curView=v;
  if(!keepFilter&&v==='txns'){/* keep last filter */}
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.view===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
  window.scrollTo(0,0);
  render();
}
function render(){if(curView==='summary')renderSummary();else if(curView==='txns')renderTxns();else renderSettings()}

// ---- Summary ----
function renderSummary(){
  const months=txMonths();
  let mi=months.indexOf(sumMonth);if(mi<0){sumMonth=months[months.length-1];mi=months.length-1}
  const inc=monthIncome(sumMonth),exp=monthExpTotal(sumMonth),delta=inc-exp;
  const totalBudget=CATS.reduce((a,c)=>a+(+S.budgets[c.key]||0),0);
  const fx=fixedTotal();
  const expT=monthExpenses(sumMonth);
  const refunds=expT.filter(t=>t.amount<0).reduce((a,t)=>a-t.amount,0);

  document.getElementById('v-summary').innerHTML=`
  <div class="max-w-[980px] mx-auto px-5 mob-p pb-16">
    <div class="flex items-center justify-between py-5 flex-wrap gap-3">
      <div class="flex items-center gap-3">
        <button class="w-8 h-8 rounded-lg flex items-center justify-center transition-all disabled:opacity-20" id="sPrev" ${mi<=0?'disabled':''} style="background:var(--surface);border:1px solid var(--border);color:var(--text3)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
        <h2 class="text-[19px] font-extrabold tracking-tight min-w-[130px] text-center">${heMonth(sumMonth)}</h2>
        <button class="w-8 h-8 rounded-lg flex items-center justify-center transition-all disabled:opacity-20" id="sNext" ${mi>=months.length-1?'disabled':''} style="background:var(--surface);border:1px solid var(--border);color:var(--text3)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
      </div>
      <button class="btn-primary !py-2 !px-4 text-[11px]" onclick="openTxnModal()">+ עסקה חדשה</button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6 mob-1">
      <div class="card"><div class="lbl">הכנסות</div><div class="text-[26px] font-black tracking-tight" style="color:var(--income)">${fmt(inc)}</div></div>
      <div class="card"><div class="lbl">הוצאות</div><div class="text-[26px] font-black tracking-tight" style="color:var(--expense)">${fmt(exp)}</div>

let tmType='expense',tmEditId=null;
window.openTxnModal=function(t){
  tmEditId=t?t.id:null;
  document.getElementById('txnModalTitle').textContent=t?'עריכת עסקה':'עסקה חדשה';
  const sel=document.getElementById('tmCat');
  sel.innerHTML=CATS.map(c=>`<option value="${c.key}">${c.he}</option>`).join('');
  if(t){
    tmType=t.type==='income'?'income':(t.amount<0?'refund':'expense');
    document.getElementById('tmDate').value=t.date||new Date().toISOString().slice(0,10);
    document.getElementById('tmAmt').value=Math.abs(t.amount);
    document.getElementById('tmBiz').value=t.biz||'';
    sel.value=t.cat||CATS[0].key;
  }else{
    tmType='expense';
    document.getElementById('tmDate').value=new Date().toISOString().slice(0,10);
    document.getElementById('tmAmt').value='';
    document.getElementById('tmBiz').value='';
  }
  updateTmTabs();
  document.getElementById('txnModal').style.display='flex';
};
function updateTmTabs(){
  document.querySelectorAll('.tm-type').forEach(b=>{
    const on=b.dataset.type===tmType;
    b.style.background=on?(tmType==='income'||tmType==='refund'?'var(--income)':'var(--expense)'):'transparent';
    b.style.color=on?'#fff':'var(--text4)';
  });
  document.getElementById('tmCatWrap').style.display=tmType==='income'?'none':'block';
}
document.querySelectorAll('.tm-type').forEach(b=>b.onclick=()=>{tmType=b.dataset.type;updateTmTabs()});
document.getElementById('tmSave').onclick=()=>{
  const amt=+document.getElementById('tmAmt').value;
  if(!amt||amt<=0)return toast('הזן סכום');
  const date=document.getElementById('tmDate').value||new Date().toISOString().slice(0,10);
  const biz=document.getElementById('tmBiz').value.trim();
  const cat=document.getElementById('tmCat').value;
  const txn={
    id:tmEditId||newId(),date,month:moKeyFromDate(date),
    type:tmType==='income'?'income':'expense',
    cat:tmType==='income'?null:cat,
    biz,amount:tmType==='refund'?-amt:amt,
    src:'manual'
  };
  if(tmEditId){const i=S.txns.findIndex(t=>t.id===tmEditId);if(i>=0){txn.src=S.txns[i].src;S.txns[i]=txn}}
  else S.txns.push(txn);
  save();syncCloud();closeModal('txnModal');
  toast(tmEditId?'העסקה עודכנה':'העסקה נוספה');render();
};

    <button onclick="openImportModal()" class="text-[11px] font-bold px-3 py-1.5 rounded-lg cursor-pointer mr-auto" style="background:var(--surface2);color:var(--text4);border:1px solid var(--border)">חזרה</button>
  </div>
  <div class="text-[10px] mb-2" style="color:var(--text5)">העתק את זה ושלח לי — לפי זה אכייל את הפענוח.</div>
  <textarea id="rawText" readonly dir="ltr" class="w-full font-mono text-[10px] p-3 rounded-xl" style="height:52vh;background:var(--surface2);border:1px solid var(--border);color:var(--text2);white-space:pre;overflow:auto"></textarea>`;
  document.getElementById('rawText').value=raw;
  document.getElementById('rawCopy').onclick=()=>{const t=document.getElementById('rawText');t.select();try{document.execCommand('copy')}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText(raw).catch(()=>{});toast('הועתק')};
};

window.openImportModal=function(){
  document.getElementById('importModal').style.display='flex';
  document.getElementById('importArea').style.display='block';
  document.getElementById('importLoading').style.display='none';
  document.getElementById('importPreview').style.display='none';
  document.getElementById('importActions').style.display='none';
  document.getElementById('pdfInput').value='';
};
document.getElementById('importModal').onclick=e=>{if(e.target.id==='importModal')closeModal('importModal')};

const dropZone=document.getElementById('importDropZone');
['dragenter','dragover'].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.style.borderColor='var(--sage)'}));
['dragleave','drop'].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.style.borderColor='var(--border)'}));
dropZone.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')processPDF(f)});
document.getElementById('pdfInput').onchange=e=>{const f=e.target.files[0];if(f)processPDF(f)};

async function processPDF(file){
  document.getElementById('importArea').style.display='none';
  document.getElementById('importLoading').style.display='block';
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
    let fullText='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const content=await page.getTextContent();
      const lineMap={};
      content.items.forEach(item=>{
        const y=Math.round(item.transform[5]/3)*3;
        if(!lineMap[y])lineMap[y]=[];
        lineMap[y].push({x:item.transform[4],str:item.str});
      });
      Object.keys(lineMap).map(Number).sort((a,b)=>b-a).forEach(y=>{
        fullText+=lineMap[y].sort((a,b)=>a.x-b.x).map(i=>i.str).join(' ')+'\n';
      });
    }
    window._iRaw=fullText;
    const txns=extractTxns(fullText);
    if(!txns.length){
      document.getElementById('importLoading').style.display='none';
      document.getElementById('importArea').style.display='block';
      showRawDebug();
      return toast('לא נמצאו עסקאות — נפתח הטקסט הגולמי');
    }
    showImportPreview(txns);
  }catch(err){
    console.error('PDF parse error:',err);
    document.getElementById('importLoading').style.display='none';
    document.getElementById('importArea').style.display='block';
    toast('שגיאה בקריאת הקובץ');
  }
}

// Parse amount tokens: supports "1,234.56", "-1,234.56", "1,234.56-" (trailing minus = credit/refund)
function parseAmounts(line){
  const out=[];
  const re=/(-?)([\d,]+\.\d{2})(-?)/g;let m;
  while((m=re.exec(line))!==null){
    let v=parseFloat(m[2].replace(/,/g,''));
    if(m[1]==='-'||m[3]==='-')v=-v;
    out.push(v);
  }
  return out;
}

function extractTxns(text){
  const txns=[],lines=text.split('\n'),dateRe=/(\d{2})\/(\d{2})\/(\d{2,4})/;
  for(const line of lines){
    const dm=line.match(dateRe);
    if(!dm)continue;
    if(line.includes('תאריך')||line.includes('מועד חיוב')||line.includes('פירוט')||line.includes('סה"כ')||line.includes('סה״כ'))continue;
    const amounts=parseAmounts(line);
    if(!amounts.length)continue;
    // Last amount on the line = billed amount. Negative = refund/credit.
    const amt=amounts[amounts.length-1];
    if(amt===0)continue;
    let ic='שונות',lc='other';
    for(const c of IC_CATS){if(line.includes(c)){ic=c;lc=IC_MAP[c];break}}
    let biz=line.replace(dateRe,'').replace(/(-?)([\d,]+\.\d{2})(-?)/g,'').replace(/הוצג לא|נייד\.תש|קבע\.ה|זיכוי/g,'');
    for(const c of IC_CATS)biz=biz.replace(c,'');
    biz=biz.replace(/\s+/g,' ').trim();
    if(biz.length>40)biz=biz.substring(0,40)+'…';
    const dd=dm[1],mo=parseInt(dm[2])-1;
    let yr=dm[3];if(yr.length===2)yr='20'+yr;
    const iso=yr+'-'+String(mo+1).padStart(2,'0')+'-'+dd;
    const moKey=MO[mo]+' '+yr;
    txns.push({date:iso,dateDisp:dd+'/'+dm[2]+'/'+yr.slice(2),biz,ic,lc,amt,moKey});
  }
  return txns;
}

function findSelfDuplicates(txns){
  const seen=new Map(),dupes=new Set();
  txns.forEach((t,i)=>{
    const fp=t.date+'|'+Math.round(Math.abs(t.amt)*100)+'|'+(t.biz||'').replace(/\s/g,'').slice(0,20);
    if(seen.has(fp))dupes.add(i);else seen.set(fp,i);
  });
  return dupes;
}

function showImportPreview(txns){
  const fps=existingFps();
  const selfDupes=findSelfDuplicates(txns);
  let total=0;
  txns.forEach((t,i)=>{
    const fp=t.date+'|'+Math.round(Math.abs(t.amt)*100)+'|'+(t.biz||'').replace(/\s/g,'').slice(0,20);
    t.dup=fps.has(fp);
    t.selfDup=selfDupes.has(i);
    t.include=!t.dup&&!t.selfDup;
    if(t.include)total+=t.amt;
  });
  const dupCount=txns.filter(t=>t.dup||t.selfDup).length;
  const refundCount=txns.filter(t=>t.amt<0).length;

  let h=`<div class="flex items-center gap-2 mb-4 flex-wrap">
    <div class="text-[11px] font-bold px-3 py-1.5 rounded-lg" style="background:var(--income-bg);color:var(--income)">נמצאו ${txns.length} עסקאות</div>`;
  if(refundCount)h+=`<div class="text-[11px] font-bold px-3 py-1.5 rounded-lg" style="background:var(--income-bg);color:var(--income)">${refundCount} החזרים</div>`;
  if(dupCount)h+=`<div class="text-[11px] font-bold px-3 py-1.5 rounded-lg" style="background:var(--warn-bg);color:var(--warn)">⚠ ${dupCount} כבר יובאו בעבר</div>`;
  h+=`<button onclick="showRawDebug()" class="text-[11px] font-bold px-3 py-1.5 rounded-lg mr-auto cursor-pointer" style="background:var(--surface2);color:var(--text4);border:1px solid var(--border)">טקסט גולמי</button>`;
  h+=`</div>`;

  h+='<div class="max-h-[48vh] overflow-y-auto rounded-xl" style="border:1px solid var(--border)"><table class="w-full text-[11px]">';
  h+=`<thead class="sticky top-0 z-10" style="background:var(--surface)"><tr>`;
  h+='<th class="p-2.5 text-center w-8"><input type="checkbox" id="icAll" checked class="cursor-pointer"></th>';
  h+='<th class="text-right p-2.5 text-[9px] font-semibold" style="color:var(--text5)">תאריך</th>';
  h+='<th class="text-right p-2.5 text-[9px] font-semibold" style="color:var(--text5)">בית עסק</th>';
  h+='<th class="text-right p-2.5 text-[9px] font-semibold" style="color:var(--text5)">קטגוריה</th>';
  h+='<th class="text-left p-2.5 text-[9px] font-semibold" style="color:var(--text5)">סכום</th>';
  h+='<th class="p-2.5 w-14"></th>';
  h+='</tr></thead><tbody>';
  txns.forEach((t,i)=>{
    const warn=t.dup||t.selfDup,refund=t.amt<0;
    h+=`<tr style="${warn?'background:var(--warn-bg);':''}border-top:1px solid var(--border2)">
      <td class="p-2.5 text-center"><input type="checkbox" class="ic-chk cursor-pointer" data-i="${i}" ${t.include?'checked':''}></td>
      <td class="p-2.5 text-[10px]" style="color:var(--text4)" dir="ltr">${t.dateDisp}</td>
      <td class="p-2.5" style="color:var(--text2)">${t.biz||'—'}</td>
      <td class="p-2.5"><select class="ic-sel rounded-lg px-2 py-1 text-[10px] outline-none cursor-pointer" data-i="${i}" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2)">
        ${CATS.map(c=>`<option value="${c.key}" ${c.key===t.lc?'selected':''}>${c.he}</option>`).join('')}
      </select></td>
      <td class="p-2.5 text-left font-bold" style="color:${refund?'var(--income)':'var(--text)'}">${refund?'+':''}${fmt(t.amt)}</td>
      <td class="p-2.5 text-center">
        ${refund?'<span class="text-[9px] font-bold px-1.5 py-0.5 rounded" style="background:var(--income-bg);color:var(--income)">החזר</span>':''}
        ${warn?'<span class="text-[9px] font-bold" style="color:var(--warn)" title="'+(t.dup?'יובאה בעבר':'כפולה בדוח')+'">כפול</span>':''}
      </td></tr>`;
  });
  h+=`<tr class="font-bold" style="border-top:2px solid var(--border)"><td class="p-2.5"></td><td colspan="3" class="p-2.5" style="color:var(--text3)">סה״כ לייבוא (נטו)</td><td class="p-2.5 text-left" style="color:var(--copper)" id="impTotal">${fmt(total)}</td><td></td></tr>`;
  h+='</tbody></table></div>';

  document.getElementById('importPreview').innerHTML=h;
  document.getElementById('importLoading').style.display='none';
  document.getElementById('importPreview').style.display='block';
  document.getElementById('importActions').style.display='flex';
  window._iTxns=txns;

  function updateTotal(){
    let t=0;window._iTxns.forEach(x=>{if(x.include)t+=x.amt});
    const el=document.getElementById('impTotal');if(el)el.textContent=fmt(t);
  }
  document.querySelectorAll('.ic-sel').forEach(sel=>{sel.onchange=()=>{window._iTxns[+sel.dataset.i].lc=sel.value}});
  document.querySelectorAll('.ic-chk').forEach(chk=>{chk.onchange=()=>{window._iTxns[+chk.dataset.i].include=chk.checked;updateTotal();
    const allEl=document.getElementById('icAll');if(allEl)allEl.checked=window._iTxns.every(x=>x.include)}});
  const allChk=document.getElementById('icAll');
  if(allChk)allChk.onchange=()=>{const v=allChk.checked;window._iTxns.forEach(x=>x.include=v);document.querySelectorAll('.ic-chk').forEach(c=>c.checked=v);updateTotal()};
}

document.getElementById('confirmImport').onclick=()=>{
  const txns=(window._iTxns||[]).filter(t=>t.include);
  if(!txns.length)return toast('לא נבחרו עסקאות');
  txns.forEach(t=>{
    S.txns.push({id:newId(),date:t.date,month:t.moKey,type:'expense',cat:t.lc,biz:t.biz,amount:t.amt,src:'isracard'});
  });
  save();syncCloud();closeModal('importModal');
  toast('יובאו '+txns.length+' עסקאות');render();
};

document.querySelectorAll('.nav-item').forEach(item=>item.onclick=()=>switchView(item.dataset.view));
render();
if(GAS)loadCloud().then(()=>{CATS=S.cats;render()});
})();
</script>
